<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arw" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>
  <rect width="720" height="320" rx="16" fill="#fafafa" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="360" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">Batch Processing: Why We Need W^T</text>

  <!-- Input matrix -->
  <rect x="20" y="55" width="195" height="110" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="117" y="50" text-anchor="middle" font-size="12" font-weight="600" fill="#3730a3">X (3×4) — 3 batches</text>
  <text x="117" y="82" text-anchor="middle" font-size="10" fill="#3730a3" font-family="Consolas, monospace">[ 1.0  2.0  3.0  2.5]  B1</text>
  <text x="117" y="102" text-anchor="middle" font-size="10" fill="#3730a3" font-family="Consolas, monospace">[ 2.0  5.0 -1.0  2.0]  B2</text>
  <text x="117" y="122" text-anchor="middle" font-size="10" fill="#3730a3" font-family="Consolas, monospace">[-1.5  2.7  3.3 -0.8]  B3</text>
  <text x="117" y="152" text-anchor="middle" font-size="10" fill="#6366f1">Each row = one sample</text>

  <!-- × -->
  <text x="232" y="110" text-anchor="middle" font-size="20" fill="#475569">×</text>

  <!-- Weight Transpose -->
  <rect x="250" y="55" width="150" height="110" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="325" y="50" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">W^T (4×3)</text>
  <text x="325" y="82" text-anchor="middle" font-size="10" fill="#065f46" font-family="Consolas, monospace">W1  W2  W3</text>
  <text x="325" y="98" text-anchor="middle" font-size="10" fill="#065f46" font-family="Consolas, monospace"> ↓   ↓   ↓</text>
  <text x="325" y="116" text-anchor="middle" font-size="10" fill="#065f46">Each column =</text>
  <text x="325" y="132" text-anchor="middle" font-size="10" fill="#065f46">one neuron's weights</text>
  <text x="325" y="152" text-anchor="middle" font-size="10" fill="#10b981">4 rows × 3 cols</text>

  <!-- + biases -->
  <text x="418" y="110" text-anchor="middle" font-size="18" fill="#475569">+</text>
  <rect x="435" y="80" width="50" height="55" rx="6" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="460" y="105" text-anchor="middle" font-size="10" fill="#ec4899" font-weight="600">b</text>
  <text x="460" y="122" text-anchor="middle" font-size="9" fill="#ec4899">(1×3)</text>

  <!-- = -->
  <text x="505" y="110" text-anchor="middle" font-size="20" fill="#475569">=</text>

  <!-- Result -->
  <rect x="525" y="55" width="175" height="110" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="612" y="50" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">Output (3×3)</text>
  <text x="612" y="82" text-anchor="middle" font-size="10" fill="#92400e" font-family="Consolas, monospace">[ 4.8   1.21  2.385]</text>
  <text x="612" y="102" text-anchor="middle" font-size="10" fill="#92400e" font-family="Consolas, monospace">[ 8.9  -1.81  0.2  ]</text>
  <text x="612" y="122" text-anchor="middle" font-size="10" fill="#92400e" font-family="Consolas, monospace">[ 1.41  1.051 0.026]</text>
  <text x="612" y="152" text-anchor="middle" font-size="10" fill="#f59e0b">Row = sample, Col = neuron</text>

  <!-- Dimension flow -->
  <rect x="30" y="195" width="660" height="50" rx="8" fill="#eff6ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="360" y="216" text-anchor="middle" font-size="12" font-weight="600" fill="#3730a3">Dimension Check:  (3 × 4) · (4 × 3) + (1 × 3)  =  (3 × 3)</text>
  <text x="360" y="236" text-anchor="middle" font-size="11" fill="#6366f1">Inner dims match ✓     Bias broadcasts across rows ✓</text>

  <!-- Code -->
  <rect x="30" y="260" width="660" height="45" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="360" y="288" text-anchor="middle" font-size="13" fill="#1e40af" font-family="Consolas, monospace">outputs = np.dot(inputs, np.array(weights).T) + biases</text>
</svg>
