<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow2" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="900" height="440" rx="20" fill="#fafafa" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Why Batches Need weights.T</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#64748b">Watch: first the shapes clash, then the transpose fixes everything.</text>

  <!-- ===== PHASE 1: THE MISMATCH (visible 0-45%, hidden 45-100%) ===== -->
  <g opacity="1">
    <animate attributeName="opacity" values="1;1;0;0;0;1" keyTimes="0;0.4;0.45;0.95;0.97;1" dur="8s" repeatCount="indefinite"/>

    <!-- Inputs card -->
    <rect x="100" y="80" width="220" height="200" rx="14" fill="#fff" stroke="#dbeafe" stroke-width="1.5" filter="url(#shadow2)"/>
    <text x="210" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">Inputs</text>
    <rect x="130" y="120" width="160" height="90" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="210" y="148" text-anchor="middle" font-size="11" fill="#1d4ed8" font-family="Consolas, monospace">[ 1.0  2.0  3.0  2.5]</text>
    <text x="210" y="168" text-anchor="middle" font-size="11" fill="#1d4ed8" font-family="Consolas, monospace">[ 2.0  5.0 -1.0  2.0]</text>
    <text x="210" y="188" text-anchor="middle" font-size="11" fill="#1d4ed8" font-family="Consolas, monospace">[-1.5  2.7  3.3 -0.8]</text>
    <text x="210" y="230" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">(3 × 4)</text>
    <text x="210" y="250" text-anchor="middle" font-size="11" fill="#64748b">3 samples, 4 features</text>

    <!-- dot symbol -->
    <text x="355" y="175" text-anchor="middle" font-size="28" font-weight="700" fill="#475569">·</text>

    <!-- Weights card (not transposed) -->
    <rect x="400" y="80" width="220" height="200" rx="14" fill="#fff" stroke="#fee2e2" stroke-width="1.5" filter="url(#shadow2)"/>
    <text x="510" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#b91c1c">Weights</text>
    <rect x="430" y="120" width="160" height="90" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="510" y="148" text-anchor="middle" font-size="11" fill="#b91c1c" font-family="Consolas, monospace">[ 0.2  0.8 -0.5  1.0]</text>
    <text x="510" y="168" text-anchor="middle" font-size="11" fill="#b91c1c" font-family="Consolas, monospace">[ 0.5 -0.9  0.3 -0.5]</text>
    <text x="510" y="188" text-anchor="middle" font-size="11" fill="#b91c1c" font-family="Consolas, monospace">[-0.3 -0.3  0.2  0.9]</text>
    <text x="510" y="230" text-anchor="middle" font-size="13" font-weight="700" fill="#b91c1c">(3 × 4)</text>
    <text x="510" y="250" text-anchor="middle" font-size="11" fill="#64748b">3 neurons, 4 weights</text>

    <!-- Dimension check: FAIL -->
    <rect x="660" y="110" width="200" height="130" rx="14" fill="#fff" stroke="#fecaca" stroke-width="2" filter="url(#shadow2)">
      <animate attributeName="stroke" values="#fecaca;#ef4444;#fecaca" dur="1.2s" repeatCount="indefinite"/>
    </rect>
    <text x="760" y="142" text-anchor="middle" font-size="36" fill="#ef4444">✗</text>
    <text x="760" y="168" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">Shape mismatch!</text>
    <text x="760" y="192" text-anchor="middle" font-size="12" fill="#dc2626">(3×4) · (3×4)</text>
    <text x="760" y="212" text-anchor="middle" font-size="11" fill="#dc2626">Inner: 4 ≠ 3</text>
    <text x="760" y="230" text-anchor="middle" font-size="10" fill="#991b1b">Cannot multiply!</text>

    <!-- Pulsing red highlights on the clashing inner dimensions -->
    <!-- Highlight the "4" in inputs' (3 × 4) — right side of first operand -->
    <rect x="217" y="218" width="14" height="16" rx="4" fill="#ef4444" opacity="0.15">
      <animate attributeName="opacity" values="0.08;0.35;0.08" dur="1.2s" repeatCount="indefinite"/>
    </rect>
    <!-- Highlight the "3" in weights' (3 × 4) — left side of second operand -->
    <rect x="496" y="218" width="14" height="16" rx="4" fill="#ef4444" opacity="0.15">
      <animate attributeName="opacity" values="0.08;0.35;0.08" dur="1.2s" repeatCount="indefinite"/>
    </rect>

    <!-- Bottom message phase 1 -->
    <rect x="120" y="310" width="660" height="50" rx="12" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
    <text x="450" y="332" text-anchor="middle" font-size="13" font-weight="600" fill="#dc2626">Problem: (3×4) · (3×4) fails because inner dimensions 4 and 3 don't match.</text>
    <text x="450" y="350" text-anchor="middle" font-size="12" fill="#991b1b">We need to reshape the weights so the 4 lines up with the 4...</text>
  </g>

  <!-- ===== PHASE 2: THE FIX (hidden 0-45%, visible 45-100%) ===== -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;1;0" keyTimes="0;0.4;0.5;0.95;0.97;1" dur="8s" repeatCount="indefinite"/>

    <!-- Inputs card -->
    <rect x="50" y="80" width="200" height="200" rx="14" fill="#fff" stroke="#dbeafe" stroke-width="1.5" filter="url(#shadow2)"/>
    <text x="150" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">Inputs</text>
    <rect x="70" y="120" width="160" height="90" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="150" y="148" text-anchor="middle" font-size="11" fill="#1d4ed8" font-family="Consolas, monospace">[ 1.0  2.0  3.0  2.5]</text>
    <text x="150" y="168" text-anchor="middle" font-size="11" fill="#1d4ed8" font-family="Consolas, monospace">[ 2.0  5.0 -1.0  2.0]</text>
    <text x="150" y="188" text-anchor="middle" font-size="11" fill="#1d4ed8" font-family="Consolas, monospace">[-1.5  2.7  3.3 -0.8]</text>
    <text x="150" y="230" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">(3 × 4)</text>
    <text x="150" y="250" text-anchor="middle" font-size="11" fill="#64748b">3 samples, 4 features</text>

    <!-- dot symbol -->
    <text x="280" y="175" text-anchor="middle" font-size="28" font-weight="700" fill="#475569">·</text>

    <!-- Transposed weights card -->
    <rect x="310" y="80" width="200" height="200" rx="14" fill="#fff" stroke="#bbf7d0" stroke-width="2" filter="url(#shadow2)">
      <animate attributeName="stroke-width" values="1.5;2.5;1.5" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="410" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">weights.T</text>
    <rect x="345" y="118" width="130" height="116" rx="8" fill="#dcfce7" stroke="#10b981" stroke-width="2"/>
    <text x="410" y="140" text-anchor="middle" font-size="10" fill="#047857" font-family="Consolas, monospace">[ 0.2  0.5 -0.3]</text>
    <text x="410" y="158" text-anchor="middle" font-size="10" fill="#047857" font-family="Consolas, monospace">[ 0.8 -0.9 -0.3]</text>
    <text x="410" y="176" text-anchor="middle" font-size="10" fill="#047857" font-family="Consolas, monospace">[-0.5  0.3  0.2]</text>
    <text x="410" y="194" text-anchor="middle" font-size="10" fill="#047857" font-family="Consolas, monospace">[ 1.0 -0.5  0.9]</text>
    <text x="410" y="218" text-anchor="middle" font-size="10" fill="#64748b">Rows and columns flipped</text>
    <text x="410" y="238" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">(4 × 3)</text>
    <text x="410" y="258" text-anchor="middle" font-size="11" fill="#64748b">4 features, 3 neurons</text>

    <!-- equals -->
    <text x="540" y="175" text-anchor="middle" font-size="28" font-weight="700" fill="#475569">=</text>

    <!-- Result card -->
    <rect x="575" y="80" width="180" height="200" rx="14" fill="#fff" stroke="#fef3c7" stroke-width="1.5" filter="url(#shadow2)"/>
    <text x="665" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">Output</text>
    <rect x="595" y="120" width="140" height="90" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="665" y="148" text-anchor="middle" font-size="11" fill="#92400e" font-family="Consolas, monospace">[ 4.8   1.21  2.39]</text>
    <text x="665" y="168" text-anchor="middle" font-size="11" fill="#92400e" font-family="Consolas, monospace">[ 8.9  -1.81  0.20]</text>
    <text x="665" y="188" text-anchor="middle" font-size="11" fill="#92400e" font-family="Consolas, monospace">[ 1.41  1.05  0.03]</text>
    <text x="665" y="230" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">(3 × 3)</text>
    <text x="665" y="250" text-anchor="middle" font-size="11" fill="#64748b">3 samples, 3 neurons</text>

    <!-- Dimension check: PASS -->
    <rect x="788" y="120" width="90" height="90" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow2)">
      <animate attributeName="stroke-width" values="2;3;2" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <text x="833" y="160" text-anchor="middle" font-size="36" fill="#16a34a">✓</text>
    <text x="833" y="185" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a">4 = 4</text>
    <text x="833" y="200" text-anchor="middle" font-size="10" fill="#15803d">Match!</text>

    <!-- Green dashed line connecting the matching inner dimensions -->
    <!-- Left vertical from the "4" in inputs' (3 × 4) centered at x=150 -->
    <line x1="160" y1="232" x2="160" y2="272" stroke="#16a34a" stroke-width="2"/>
    <!-- Horizontal connector -->
    <line x1="160" y1="272" x2="400" y2="272" stroke="#16a34a" stroke-width="2" stroke-dasharray="5,3">
      <animate attributeName="stroke-dashoffset" values="0;-16" dur="1s" repeatCount="indefinite"/>
    </line>
    <!-- Right vertical to the "4" in weights.T's (4 × 3) centered at x=410 -->
    <line x1="400" y1="240" x2="400" y2="272" stroke="#16a34a" stroke-width="2"/>
    <text x="280" y="268" text-anchor="middle" font-size="10" font-weight="700" fill="#16a34a">inner dims match!</text>

    <!-- Bottom message phase 2 -->
    <rect x="120" y="310" width="660" height="50" rx="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
    <text x="450" y="332" text-anchor="middle" font-size="13" font-weight="600" fill="#16a34a">Fix: Transpose weights from (3×4) to (4×3) so inner dimensions both equal 4.</text>
    <text x="450" y="350" text-anchor="middle" font-size="12" fill="#15803d">np.dot(inputs, np.array(weights).T) + biases</text>
  </g>

  <!-- Phase indicator labels that swap -->
  <text x="390" y="400" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626" opacity="1">
    Step 1: The Mismatch
    <animate attributeName="opacity" values="1;1;0;0;0;1" keyTimes="0;0.4;0.45;0.95;0.97;1" dur="8s" repeatCount="indefinite"/>
  </text>
  <text x="390" y="400" text-anchor="middle" font-size="11" font-weight="700" fill="#16a34a" opacity="0">
    Step 2: Transpose Fixes It
    <animate attributeName="opacity" values="0;0;1;1;1;0" keyTimes="0;0.4;0.5;0.95;0.97;1" dur="8s" repeatCount="indefinite"/>
  </text>

  <!-- Progress bar -->
  <rect x="120" y="420" width="660" height="4" rx="2" fill="#e5e7eb"/>
  <rect x="120" y="420" width="0" height="4" rx="2" fill="#94a3b8" opacity="0.5">
    <animate attributeName="width" values="0;660" dur="8s" repeatCount="indefinite"/>
  </rect>
</svg>