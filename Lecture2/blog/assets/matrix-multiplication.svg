<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="Segoe UI, Arial, sans-serif">
  <rect width="700" height="380" rx="16" fill="#fafafa" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="350" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Matrix Multiplication: Rows × Columns</text>

  <!-- Matrix A -->
  <rect x="30" y="60" width="180" height="130" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="120" y="55" text-anchor="middle" font-size="12" font-weight="700" fill="#3730a3">A (3×4)</text>
  <text x="120" y="90" text-anchor="middle" font-size="12" fill="#3730a3" font-family="Consolas, monospace">[ 1   2   3   4 ]</text>
  <text x="120" y="120" text-anchor="middle" font-size="12" fill="#3730a3" font-family="Consolas, monospace">[ 5   6   7   8 ]</text>
  <text x="120" y="150" text-anchor="middle" font-size="12" fill="#3730a3" font-family="Consolas, monospace">[ 9  10  11  12 ]</text>
  <text x="120" y="178" text-anchor="middle" font-size="10" fill="#6366f1">R1, R2, R3</text>

  <!-- × symbol -->
  <text x="228" y="125" text-anchor="middle" font-size="24" fill="#475569">×</text>

  <!-- Matrix B -->
  <rect x="250" y="60" width="140" height="130" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="320" y="55" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">B (4×3)</text>
  <text x="320" y="90" text-anchor="middle" font-size="12" fill="#065f46" font-family="Consolas, monospace">[ 1  2  3 ]</text>
  <text x="320" y="110" text-anchor="middle" font-size="12" fill="#065f46" font-family="Consolas, monospace">[ 4  5  6 ]</text>
  <text x="320" y="130" text-anchor="middle" font-size="12" fill="#065f46" font-family="Consolas, monospace">[ 7  8  9 ]</text>
  <text x="320" y="150" text-anchor="middle" font-size="12" fill="#065f46" font-family="Consolas, monospace">[10 11 12 ]</text>
  <text x="320" y="178" text-anchor="middle" font-size="10" fill="#10b981">C1, C2, C3</text>

  <!-- = symbol -->
  <text x="410" y="125" text-anchor="middle" font-size="24" fill="#475569">=</text>

  <!-- Result Matrix -->
  <rect x="435" y="60" width="240" height="130" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="555" y="55" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Result (3×3)</text>
  <text x="555" y="90" text-anchor="middle" font-size="12" fill="#92400e" font-family="Consolas, monospace">[ R1·C1  R1·C2  R1·C3 ]</text>
  <text x="555" y="120" text-anchor="middle" font-size="12" fill="#92400e" font-family="Consolas, monospace">[ R2·C1  R2·C2  R2·C3 ]</text>
  <text x="555" y="150" text-anchor="middle" font-size="12" fill="#92400e" font-family="Consolas, monospace">[ R3·C1  R3·C2  R3·C3 ]</text>
  <text x="555" y="178" text-anchor="middle" font-size="10" fill="#f59e0b">Each entry = dot product</text>

  <!-- Rule box -->
  <rect x="50" y="220" width="600" height="55" rx="10" fill="#fff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="350" y="242" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">The Golden Rule of Matrix Multiplication</text>
  <text x="350" y="262" text-anchor="middle" font-size="12" fill="#475569">Columns of A must equal Rows of B:  (m × <tspan font-weight="700" fill="#dc2626">n</tspan>) × (<tspan font-weight="700" fill="#dc2626">n</tspan> × p) = (m × p)</text>

  <!-- Dimension check -->
  <rect x="50" y="290" width="290" height="70" rx="8" fill="#dcfce7" stroke="#10b981" stroke-width="1.5"/>
  <text x="195" y="315" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">✓ Valid: (3×4) × (4×3) = (3×3)</text>
  <text x="195" y="338" text-anchor="middle" font-size="11" fill="#065f46">Inner dimensions match (4 = 4)</text>

  <rect x="360" y="290" width="290" height="70" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="505" y="315" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">✗ Invalid: (3×4) × (3×4)</text>
  <text x="505" y="338" text-anchor="middle" font-size="11" fill="#dc2626">Inner dimensions don't match (4 ≠ 3)</text>
</svg>
