<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arw3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>
  <rect width="700" height="200" rx="16" fill="#fafafa" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="350" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">Layer Output = np.dot(W, X) + b</text>

  <!-- W matrix -->
  <rect x="30" y="50" width="155" height="90" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="107" y="43" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">W (3├Ч4)</text>
  <text x="107" y="72" text-anchor="middle" font-size="10" fill="#065f46" font-family="Consolas, monospace">[ wтВБтВБ wтВБтВВ wтВБтВГ wтВБтВД ] тЖТ N1</text>
  <text x="107" y="92" text-anchor="middle" font-size="10" fill="#065f46" font-family="Consolas, monospace">[ wтВВтВБ wтВВтВВ wтВВтВГ wтВВтВД ] тЖТ N2</text>
  <text x="107" y="112" text-anchor="middle" font-size="10" fill="#065f46" font-family="Consolas, monospace">[ wтВГтВБ wтВГтВВ wтВГтВГ wтВГтВД ] тЖТ N3</text>

  <!-- ┬╖ -->
  <text x="200" y="96" text-anchor="middle" font-size="18" fill="#475569">┬╖</text>

  <!-- X vector -->
  <rect x="218" y="55" width="60" height="80" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="248" y="43" text-anchor="middle" font-size="11" font-weight="600" fill="#3730a3">X (4├Ч1)</text>
  <text x="248" y="78" text-anchor="middle" font-size="10" fill="#3730a3" font-family="Consolas, monospace">xтВБ</text>
  <text x="248" y="93" text-anchor="middle" font-size="10" fill="#3730a3" font-family="Consolas, monospace">xтВВ</text>
  <text x="248" y="108" text-anchor="middle" font-size="10" fill="#3730a3" font-family="Consolas, monospace">xтВГ</text>
  <text x="248" y="123" text-anchor="middle" font-size="10" fill="#3730a3" font-family="Consolas, monospace">xтВД</text>

  <!-- + -->
  <text x="300" y="96" text-anchor="middle" font-size="18" fill="#475569">+</text>

  <!-- b vector -->
  <rect x="318" y="60" width="48" height="70" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
  <text x="342" y="53" text-anchor="middle" font-size="11" font-weight="600" fill="#ec4899">b (3├Ч1)</text>
  <text x="342" y="85" text-anchor="middle" font-size="10" fill="#ec4899" font-family="Consolas, monospace">bтВБ</text>
  <text x="342" y="100" text-anchor="middle" font-size="10" fill="#ec4899" font-family="Consolas, monospace">bтВВ</text>
  <text x="342" y="115" text-anchor="middle" font-size="10" fill="#ec4899" font-family="Consolas, monospace">bтВГ</text>

  <!-- = -->
  <text x="385" y="96" text-anchor="middle" font-size="18" fill="#475569">=</text>

  <!-- Result -->
  <rect x="405" y="50" width="275" height="90" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="542" y="43" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Output (3├Ч1)</text>
  <text x="542" y="72" text-anchor="middle" font-size="10" fill="#92400e">WтВБ┬╖X + bтВБ = xтВБwтВБтВБ+xтВВwтВБтВВ+xтВГwтВБтВГ+xтВДwтВБтВД+bтВБ</text>
  <text x="542" y="92" text-anchor="middle" font-size="10" fill="#92400e">WтВВ┬╖X + bтВВ = xтВБwтВВтВБ+xтВВwтВВтВВ+xтВГwтВВтВГ+xтВДwтВВтВД+bтВВ</text>
  <text x="542" y="112" text-anchor="middle" font-size="10" fill="#92400e">WтВГ┬╖X + bтВГ = xтВБwтВГтВБ+xтВВwтВГтВВ+xтВГwтВГтВГ+xтВДwтВГтВД+bтВГ</text>

  <!-- Footer -->
  <text x="350" y="168" text-anchor="middle" font-size="12" fill="#475569">One line of NumPy replaces 3 separate neuron calculations</text>
  <rect x="100" y="178" width="500" height="18" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="350" y="192" text-anchor="middle" font-size="10" fill="#1e40af" font-family="Consolas, monospace">layer_output = np.dot(weights, inputs) + biases</text>
</svg>
