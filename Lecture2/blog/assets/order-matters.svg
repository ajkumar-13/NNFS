<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 310" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arw2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>
  <rect width="700" height="310" rx="16" fill="#fafafa" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="350" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">Vector · Matrix: Order Matters!</text>

  <!-- Case 1: np.dot(a, B) -->
  <rect x="20" y="50" width="320" height="240" rx="12" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="180" y="75" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">np.dot(a, B)   →   ✓ Correct</text>
  
  <text x="40" y="105" font-size="11" fill="#065f46" font-family="Consolas, monospace">a = [1, 2, 3]       (1×3)</text>
  <text x="40" y="130" font-size="11" fill="#065f46" font-family="Consolas, monospace">B = [[4, 5, 6],     (3×3)</text>
  <text x="40" y="148" font-size="11" fill="#065f46" font-family="Consolas, monospace">     [7, 8, 9],</text>
  <text x="40" y="166" font-size="11" fill="#065f46" font-family="Consolas, monospace">     [10,11,12]]</text>
  
  <text x="40" y="196" font-size="11" fill="#065f46">Row a × Column B₁ = 1·4+2·7+3·10 = </text>
  <text x="308" y="196" font-size="11" font-weight="700" fill="#065f46">48</text>
  <text x="40" y="214" font-size="11" fill="#065f46">Row a × Column B₂ = 1·5+2·8+3·11 = </text>
  <text x="308" y="214" font-size="11" font-weight="700" fill="#065f46">54</text>
  <text x="40" y="232" font-size="11" fill="#065f46">Row a × Column B₃ = 1·6+2·9+3·12 = </text>
  <text x="308" y="232" font-size="11" font-weight="700" fill="#065f46">60</text>
  
  <text x="180" y="268" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">Result: [48, 54, 60]</text>

  <!-- Case 2: np.dot(B, a) -->
  <rect x="360" y="50" width="320" height="240" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="520" y="75" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">np.dot(B, a)   →   Different!</text>
  
  <text x="380" y="105" font-size="11" fill="#dc2626" font-family="Consolas, monospace">B = [[4, 5, 6],     (3×3)</text>
  <text x="380" y="123" font-size="11" fill="#dc2626" font-family="Consolas, monospace">     [7, 8, 9],</text>
  <text x="380" y="141" font-size="11" fill="#dc2626" font-family="Consolas, monospace">     [10,11,12]]</text>
  <text x="380" y="166" font-size="11" fill="#dc2626" font-family="Consolas, monospace">a = [1, 2, 3]       (3×1)</text>
  
  <text x="380" y="196" font-size="11" fill="#dc2626">Row B₁ × Col a = 4·1+5·2+6·3 = </text>
  <text x="638" y="196" font-size="11" font-weight="700" fill="#dc2626">32</text>
  <text x="380" y="214" font-size="11" fill="#dc2626">Row B₂ × Col a = 7·1+8·2+9·3 = </text>
  <text x="638" y="214" font-size="11" font-weight="700" fill="#dc2626">50</text>
  <text x="380" y="232" font-size="11" fill="#dc2626">Row B₃ × Col a = 10·1+11·2+12·3 = </text>
  <text x="648" y="232" font-size="11" font-weight="700" fill="#dc2626">68</text>
  
  <text x="520" y="268" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">Result: [32, 50, 68]</text>
</svg>
