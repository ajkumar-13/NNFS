<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="Segoe UI, Arial, sans-serif">
  <rect width="720" height="300" rx="16" fill="#fafafa" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="360" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Three Types of Dot Product in NumPy</text>

  <!-- Vector · Vector -->
  <rect x="20" y="50" width="215" height="230" rx="12" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="127" y="78" text-anchor="middle" font-size="13" font-weight="700" fill="#3730a3">Vector · Vector</text>
  <text x="127" y="100" text-anchor="middle" font-size="11" fill="#3730a3" font-family="Consolas, monospace">np.dot(a, b)</text>
  <text x="127" y="130" text-anchor="middle" font-size="11" fill="#3730a3">[a₁, a₂, a₃] · [b₁, b₂, b₃]</text>
  <text x="127" y="155" text-anchor="middle" font-size="11" fill="#475569">= a₁b₁ + a₂b₂ + a₃b₃</text>
  <text x="127" y="185" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">→ scalar</text>
  <rect x="40" y="200" width="175" height="32" rx="6" fill="#c7d2fe" stroke="#6366f1" stroke-width="1"/>
  <text x="127" y="221" text-anchor="middle" font-size="10" font-weight="600" fill="#3730a3">Used for: Single Neuron</text>
  <text x="127" y="256" text-anchor="middle" font-size="10" fill="#6366f1">np.dot(a,b) = np.dot(b,a) ✓</text>

  <!-- Vector · Matrix -->
  <rect x="252" y="50" width="215" height="230" rx="12" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="360" y="78" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">Vector · Matrix</text>
  <text x="360" y="100" text-anchor="middle" font-size="11" fill="#065f46" font-family="Consolas, monospace">np.dot(a, B)</text>
  <text x="360" y="130" text-anchor="middle" font-size="11" fill="#065f46">(1×3) · (3×3) = (1×3)</text>
  <text x="360" y="155" text-anchor="middle" font-size="11" fill="#475569">Row × each Column</text>
  <text x="360" y="185" text-anchor="middle" font-size="12" font-weight="600" fill="#047857">→ vector</text>
  <rect x="272" y="200" width="175" height="32" rx="6" fill="#a7f3d0" stroke="#10b981" stroke-width="1"/>
  <text x="360" y="221" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">Used for: Layer of Neurons</text>
  <text x="360" y="256" text-anchor="middle" font-size="10" fill="#dc2626">np.dot(a,B) ≠ np.dot(B,a) ✗</text>

  <!-- Matrix · Matrix -->
  <rect x="484" y="50" width="215" height="230" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="592" y="78" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">Matrix · Matrix</text>
  <text x="592" y="100" text-anchor="middle" font-size="11" fill="#92400e" font-family="Consolas, monospace">np.dot(A, B)</text>
  <text x="592" y="130" text-anchor="middle" font-size="11" fill="#92400e">(3×4) · (4×3) = (3×3)</text>
  <text x="592" y="155" text-anchor="middle" font-size="11" fill="#475569">Each Row × each Column</text>
  <text x="592" y="185" text-anchor="middle" font-size="12" font-weight="600" fill="#b45309">→ matrix</text>
  <rect x="504" y="200" width="175" height="32" rx="6" fill="#fde68a" stroke="#f59e0b" stroke-width="1"/>
  <text x="592" y="221" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">Used for: Batch of Data</text>
  <text x="592" y="256" text-anchor="middle" font-size="10" fill="#dc2626">np.dot(A,B) ≠ np.dot(B,A) ✗</text>
</svg>
