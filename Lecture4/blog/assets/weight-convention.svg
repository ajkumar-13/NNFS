<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260">
  <rect width="800" height="260" fill="#fafafa" rx="16"/>

  <text x="400" y="30" text-anchor="middle" font-family="Segoe UI" font-size="18" font-weight="bold" fill="#1e293b">Weight Convention: Old vs New</text>

  <!-- Old convention -->
  <rect x="30" y="55" width="350" height="185" rx="12" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="205" y="80" text-anchor="middle" font-family="Segoe UI" font-weight="bold" font-size="14" fill="#991b1b">Old Convention</text>

  <text x="205" y="108" text-anchor="middle" font-family="Consolas" font-size="13" fill="#374151">W shape: (neurons × inputs)</text>
  <rect x="65" y="118" width="280" height="48" rx="6" fill="white" stroke="#fca5a5" stroke-width="1"/>
  <text x="205" y="138" text-anchor="middle" font-family="Consolas" font-size="12" fill="#374151">[[w₁₁ w₁₂ w₁₃ w₁₄],  ← neuron 1</text>
  <text x="205" y="156" text-anchor="middle" font-family="Consolas" font-size="12" fill="#374151"> [w₂₁ w₂₂ w₂₃ w₂₄]]  ← neuron 2</text>

  <text x="205" y="185" text-anchor="middle" font-family="Consolas" font-size="13" fill="#dc2626">np.dot(X, W.T) + b</text>
  <text x="205" y="206" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#991b1b">Requires transpose every time ✗</text>
  <text x="205" y="228" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#64748b">Rows = neurons, Cols = inputs</text>

  <!-- New convention -->
  <rect x="420" y="55" width="350" height="185" rx="12" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="595" y="80" text-anchor="middle" font-family="Segoe UI" font-weight="bold" font-size="14" fill="#065f46">New Convention ✓</text>

  <text x="595" y="108" text-anchor="middle" font-family="Consolas" font-size="13" fill="#374151">W shape: (inputs × neurons)</text>
  <rect x="455" y="118" width="280" height="48" rx="6" fill="white" stroke="#6ee7b7" stroke-width="1"/>
  <text x="595" y="138" text-anchor="middle" font-family="Consolas" font-size="12" fill="#374151">[[w₁₁ w₂₁],  ← input 1 weights</text>
  <text x="595" y="156" text-anchor="middle" font-family="Consolas" font-size="12" fill="#374151"> [w₁₂ w₂₂]]  ← input 2 weights</text>

  <text x="595" y="185" text-anchor="middle" font-family="Consolas" font-size="13" fill="#047857">np.dot(X, W) + b</text>
  <text x="595" y="206" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#065f46">No transpose needed ✓</text>
  <text x="595" y="228" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#64748b">Rows = inputs, Cols = neurons</text>

  <!-- Arrow between -->
  <text x="400" y="155" text-anchor="middle" font-family="Segoe UI" font-size="24" fill="#64748b">→</text>
</svg>