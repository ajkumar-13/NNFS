<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460">
  <rect width="800" height="460" fill="#fafafa" rx="16"/>

  <text x="400" y="30" text-anchor="middle" font-family="Segoe UI" font-size="18" font-weight="bold" fill="#1e293b">Layer_Dense Class: Blueprint for Every Layer</text>

  <!-- Class box -->
  <rect x="50" y="55" width="700" height="380" rx="14" fill="#f8fafc" stroke="#6366f1" stroke-width="2"/>
  <rect x="50" y="55" width="700" height="40" rx="14" fill="#6366f1"/>
  <rect x="50" y="80" width="700" height="15" fill="#6366f1"/>
  <text x="400" y="80" text-anchor="middle" font-family="Consolas" font-size="16" font-weight="bold" fill="white">class Layer_Dense</text>

  <!-- __init__ method -->
  <rect x="80" y="110" width="310" height="265" rx="10" fill="#e0e7ff" stroke="#818cf8" stroke-width="1.5"/>
  <text x="235" y="135" text-anchor="middle" font-family="Consolas" font-weight="bold" font-size="14" fill="#4338ca">__init__(n_inputs, n_neurons)</text>
  <text x="235" y="158" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#64748b">Called automatically on creation</text>

  <!-- Weights box -->
  <rect x="100" y="175" width="270" height="80" rx="8" fill="white" stroke="#a5b4fc" stroke-width="1"/>
  <text x="235" y="197" text-anchor="middle" font-family="Consolas" font-size="12" fill="#4338ca">self.weights =</text>
  <text x="235" y="217" text-anchor="middle" font-family="Consolas" font-size="11" fill="#374151">0.01 * np.random.randn(</text>
  <text x="235" y="237" text-anchor="middle" font-family="Consolas" font-size="11" fill="#374151">  n_inputs, n_neurons)</text>

  <!-- Biases box -->
  <rect x="100" y="268" width="270" height="55" rx="8" fill="white" stroke="#a5b4fc" stroke-width="1"/>
  <text x="235" y="290" text-anchor="middle" font-family="Consolas" font-size="12" fill="#4338ca">self.biases =</text>
  <text x="235" y="310" text-anchor="middle" font-family="Consolas" font-size="11" fill="#374151">np.zeros((1, n_neurons))</text>

  <text x="235" y="395" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#64748b">W shape: (n_inputs × n_neurons)</text>
  <text x="235" y="413" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#64748b">b shape: (1 × n_neurons)</text>

  <!-- forward method -->
  <rect x="420" y="110" width="310" height="265" rx="10" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="575" y="135" text-anchor="middle" font-family="Consolas" font-weight="bold" font-size="14" fill="#047857">forward(inputs)</text>
  <text x="575" y="158" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#64748b">Called to compute layer output</text>

  <!-- Formula box -->
  <rect x="440" y="175" width="270" height="80" rx="8" fill="white" stroke="#86efac" stroke-width="1"/>
  <text x="575" y="197" text-anchor="middle" font-family="Consolas" font-size="12" fill="#047857">self.output =</text>
  <text x="575" y="220" text-anchor="middle" font-family="Consolas" font-size="12" fill="#374151">np.dot(inputs,</text>
  <text x="575" y="240" text-anchor="middle" font-family="Consolas" font-size="12" fill="#374151">  self.weights) + self.biases</text>

  <!-- No transpose note -->
  <rect x="440" y="268" width="270" height="55" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="575" y="290" text-anchor="middle" font-family="Segoe UI" font-weight="600" font-size="12" fill="#b45309">No transpose needed!</text>
  <text x="575" y="310" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#92400e">W is (inputs×neurons) not (neurons×inputs)</text>

  <!-- Output shape -->
  <text x="575" y="395" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#64748b">Input: (batch × n_inputs)</text>
  <text x="575" y="413" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#64748b">Output: (batch × n_neurons)</text>

  <!-- Arrow between methods -->
  <path d="M390 240 L420 240" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#classarr)"/>
  <defs>
    <marker id="classarr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>