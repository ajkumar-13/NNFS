<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Segoe UI, sans-serif">
  <defs>
  </defs>

  <rect width="900" height="500" rx="18" fill="#fafafa"/>

  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1e1b4b">Validation vs Testing — Two Distinct Roles</text>

  <!-- Case 1: Lots of data -->
  <rect x="30" y="55" width="410" height="200" rx="14" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="235" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">Case 1 — Lots of Data</text>

  <!-- Three buckets -->
  <rect x="55" y="96" width="100" height="50" rx="8" fill="#6366f1" opacity="0.85"/>
  <text x="105" y="125" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Training</text>

  <rect x="175" y="96" width="100" height="50" rx="8" fill="#f59e0b" opacity="0.85"/>
  <text x="225" y="125" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Validation</text>

  <rect x="295" y="96" width="100" height="50" rx="8" fill="#ec4899" opacity="0.85"/>
  <text x="345" y="125" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Test</text>

  <!-- Flow arrows -->
  <text x="55" y="170" font-size="11" fill="#065f46">1. Try hyperparams on validation</text>
  <text x="55" y="188" font-size="11" fill="#065f46">2. Pick best → train on training set</text>
  <text x="55" y="206" font-size="11" fill="#065f46">3. Final evaluation on test set</text>
  <text x="55" y="230" font-size="11" fill="#10b981" font-weight="600">Three separate subsets needed</text>

  <!-- Case 2: Limited data -->
  <rect x="460" y="55" width="410" height="200" rx="14" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="665" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#4338ca">Case 2 — Limited Data (K-Fold CV)</text>

  <!-- Two buckets -->
  <rect x="490" y="96" width="140" height="50" rx="8" fill="#6366f1" opacity="0.85"/>
  <text x="560" y="125" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Training (80%)</text>

  <rect x="650" y="96" width="100" height="50" rx="8" fill="#ec4899" opacity="0.85"/>
  <text x="700" y="125" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Test (20%)</text>

  <text x="490" y="170" font-size="11" fill="#4338ca">Validation comes FROM training via</text>
  <text x="490" y="188" font-size="11" fill="#4338ca">rotating folds (k=5 or k=10)</text>
  <text x="490" y="206" font-size="11" fill="#4338ca">Avg error across folds → pick best HP</text>
  <text x="490" y="230" font-size="11" fill="#6366f1" font-weight="600">No separate validation set needed</text>

  <!-- K-Fold illustration -->
  <rect x="30" y="275" width="540" height="200" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="300" y="300" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">5-Fold Cross-Validation</text>

  <!-- Fold rows -->
  <!-- Fold 1 -->
  <text x="50" y="330" font-size="11" fill="#64748b">Fold 1</text>
  <rect x="100" y="318" width="60" height="18" rx="4" fill="#f59e0b"/>
  <text x="130" y="331" text-anchor="middle" font-size="9" fill="#fff">Val A</text>
  <rect x="164" y="318" width="60" height="18" rx="4" fill="#6366f1"/>
  <rect x="228" y="318" width="60" height="18" rx="4" fill="#6366f1"/>
  <rect x="292" y="318" width="60" height="18" rx="4" fill="#6366f1"/>
  <rect x="356" y="318" width="60" height="18" rx="4" fill="#6366f1"/>
  <text x="440" y="331" font-size="11" fill="#64748b">→ E₁</text>

  <!-- Fold 2 -->
  <text x="50" y="355" font-size="11" fill="#64748b">Fold 2</text>
  <rect x="100" y="343" width="60" height="18" rx="4" fill="#6366f1"/>
  <rect x="164" y="343" width="60" height="18" rx="4" fill="#f59e0b"/>
  <text x="194" y="356" text-anchor="middle" font-size="9" fill="#fff">Val B</text>
  <rect x="228" y="343" width="60" height="18" rx="4" fill="#6366f1"/>
  <rect x="292" y="343" width="60" height="18" rx="4" fill="#6366f1"/>
  <rect x="356" y="343" width="60" height="18" rx="4" fill="#6366f1"/>
  <text x="440" y="356" font-size="11" fill="#64748b">→ E₂</text>

  <!-- Fold 3 -->
  <text x="50" y="380" font-size="11" fill="#64748b">Fold 3</text>
  <rect x="100" y="368" width="60" height="18" rx="4" fill="#6366f1"/>
  <rect x="164" y="368" width="60" height="18" rx="4" fill="#6366f1"/>
  <rect x="228" y="368" width="60" height="18" rx="4" fill="#f59e0b"/>
  <text x="258" y="381" text-anchor="middle" font-size="9" fill="#fff">Val C</text>
  <rect x="292" y="368" width="60" height="18" rx="4" fill="#6366f1"/>
  <rect x="356" y="368" width="60" height="18" rx="4" fill="#6366f1"/>
  <text x="440" y="381" font-size="11" fill="#64748b">→ E₃</text>

  <!-- Fold 4 -->
  <text x="50" y="405" font-size="11" fill="#64748b">Fold 4</text>
  <rect x="100" y="393" width="60" height="18" rx="4" fill="#6366f1"/>
  <rect x="164" y="393" width="60" height="18" rx="4" fill="#6366f1"/>
  <rect x="228" y="393" width="60" height="18" rx="4" fill="#6366f1"/>
  <rect x="292" y="393" width="60" height="18" rx="4" fill="#f59e0b"/>
  <text x="322" y="406" text-anchor="middle" font-size="9" fill="#fff">Val D</text>
  <rect x="356" y="393" width="60" height="18" rx="4" fill="#6366f1"/>
  <text x="440" y="406" font-size="11" fill="#64748b">→ E₄</text>

  <!-- Fold 5 -->
  <text x="50" y="430" font-size="11" fill="#64748b">Fold 5</text>
  <rect x="100" y="418" width="60" height="18" rx="4" fill="#6366f1"/>
  <rect x="164" y="418" width="60" height="18" rx="4" fill="#6366f1"/>
  <rect x="228" y="418" width="60" height="18" rx="4" fill="#6366f1"/>
  <rect x="292" y="418" width="60" height="18" rx="4" fill="#6366f1"/>
  <rect x="356" y="418" width="60" height="18" rx="4" fill="#f59e0b"/>
  <text x="386" y="431" text-anchor="middle" font-size="9" fill="#fff">Val E</text>
  <text x="440" y="431" font-size="11" fill="#64748b">→ E₅</text>

  <!-- Final error -->
  <text x="300" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Mean Validation Error = (E₁+E₂+E₃+E₄+E₅) / 5</text>

  <!-- Legend -->
  <rect x="470" y="330" width="14" height="14" rx="3" fill="#6366f1"/>
  <text x="490" y="342" font-size="11" fill="#4338ca">Training partition</text>
  <rect x="470" y="352" width="14" height="14" rx="3" fill="#f59e0b"/>
  <text x="490" y="364" font-size="11" fill="#92400e">Validation partition</text>

  <!-- Data leakage warning -->
  <rect x="600" y="290" width="270" height="170" rx="14" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="735" y="316" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">⚠ Data Leakage</text>
  <text x="620" y="342" font-size="11" fill="#991b1b">Training and test data must</text>
  <text x="620" y="360" font-size="11" fill="#991b1b">be completely separate.</text>
  <text x="620" y="388" font-size="11" fill="#7f1d1d">If test info leaks into training:</text>
  <text x="620" y="406" font-size="11" fill="#7f1d1d">• Model learns shortcuts</text>
  <text x="620" y="424" font-size="11" fill="#7f1d1d">• Training accuracy is inflated</text>
  <text x="620" y="442" font-size="11" fill="#7f1d1d">• Fails on truly new data</text>
</svg>