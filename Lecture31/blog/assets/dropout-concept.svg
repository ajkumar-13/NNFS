<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Segoe UI, sans-serif">
  <defs>
  </defs>

  <rect width="900" height="520" rx="18" fill="#fafafa"/>

  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1e1b4b">Dropout — Randomly Disabling Neurons</text>

  <!-- Before dropout (all neurons active) -->
  <rect x="30" y="55" width="260" height="200" rx="14" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="160" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#4338ca">Without Dropout</text>

  <!-- Neurons - all active -->
  <circle cx="80" cy="120" r="16" fill="#6366f1" stroke="#4338ca" stroke-width="1.5"/>
  <text x="80" y="125" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">N1</text>
  <circle cx="140" cy="120" r="16" fill="#6366f1" stroke="#4338ca" stroke-width="1.5"/>
  <text x="140" y="125" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">N2</text>
  <circle cx="200" cy="120" r="16" fill="#6366f1" stroke="#4338ca" stroke-width="1.5"/>
  <text x="200" y="125" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">N3</text>
  <circle cx="260" cy="120" r="16" fill="#6366f1" stroke="#4338ca" stroke-width="1.5"/>
  <text x="260" y="125" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">N4</text>

  <text x="160" y="165" text-anchor="middle" font-size="11" fill="#4338ca">All neurons active</text>
  <text x="160" y="183" text-anchor="middle" font-size="11" fill="#4338ca">N2 may just copy N1</text>
  <text x="160" y="201" text-anchor="middle" font-size="11" fill="#4338ca">(co-adaptation problem)</text>
  <text x="160" y="226" text-anchor="middle" font-size="11" fill="#ef4444" font-weight="600">Risk: memorization + overfitting</text>

  <!-- Arrow -->
  <path d="M295 155 L325 155" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arr31)"/>
  <defs><marker id="arr31" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#64748b"/></marker></defs>

  <!-- With dropout -->
  <rect x="330" y="55" width="260" height="200" rx="14" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="460" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">With Dropout (rate=0.5)</text>

  <!-- Neurons - some disabled -->
  <circle cx="380" cy="120" r="16" fill="#10b981" stroke="#065f46" stroke-width="1.5"/>
  <text x="380" y="125" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">N1</text>
  <circle cx="420" cy="120" r="16" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="420" y="125" text-anchor="middle" font-size="10" fill="#94a3b8" font-weight="600">N2</text>
  <line x1="410" y1="110" x2="430" y2="130" stroke="#ef4444" stroke-width="2"/>
  <circle cx="500" cy="120" r="16" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="500" y="125" text-anchor="middle" font-size="10" fill="#94a3b8" font-weight="600">N3</text>
  <line x1="490" y1="110" x2="510" y2="130" stroke="#ef4444" stroke-width="2"/>
  <circle cx="540" cy="120" r="16" fill="#10b981" stroke="#065f46" stroke-width="1.5"/>
  <text x="540" y="125" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">N4</text>

  <text x="460" y="165" text-anchor="middle" font-size="11" fill="#065f46">~50% neurons disabled randomly</text>
  <text x="460" y="183" text-anchor="middle" font-size="11" fill="#065f46">Each must learn independently</text>
  <text x="460" y="201" text-anchor="middle" font-size="11" fill="#065f46">Different neurons each iteration</text>
  <text x="460" y="226" text-anchor="middle" font-size="11" fill="#10b981" font-weight="600">Result: better generalization</text>

  <!-- Implementation -->
  <rect x="620" y="55" width="255" height="200" rx="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="747" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">Implementation</text>

  <text x="638" y="106" font-size="11" fill="#78350f" font-weight="600">Binary mask via binomial:</text>
  <text x="638" y="125" font-size="10" font-family="Consolas, monospace" fill="#78350f">np.random.binomial(</text>
  <text x="638" y="141" font-size="10" font-family="Consolas, monospace" fill="#78350f">  1, 1-dropout, size)</text>

  <text x="638" y="166" font-size="11" fill="#78350f" font-weight="600">Scale to preserve magnitude:</text>
  <text x="638" y="185" font-size="10" font-family="Consolas, monospace" fill="#78350f">mask / (1 - dropout)</text>

  <text x="638" y="210" font-size="11" fill="#78350f" font-weight="600">Forward:</text>
  <text x="638" y="226" font-size="10" font-family="Consolas, monospace" fill="#78350f">output = input × mask</text>
  <text x="638" y="244" font-size="11" fill="#78350f" font-weight="600">Backward:</text>
  <text x="638" y="260" font-size="10" font-family="Consolas, monospace" fill="#78350f">dinputs = dvalues × mask</text>

  <!-- Why scaling matters -->
  <rect x="30" y="278" width="430" height="115" rx="14" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="245" y="302" text-anchor="middle" font-size="14" font-weight="700" fill="#9d174d">Why Scale by 1/(1−dropout)?</text>

  <text x="50" y="326" font-size="11" fill="#831843">5 neurons output: [1, 1, 1, 1, 1]  →  sum = 5</text>
  <text x="50" y="346" font-size="11" fill="#831843">After dropout 0.2: [0, 1, 1, 1, 1]  →  sum = 4  (too low!)</text>
  <text x="50" y="366" font-size="11" fill="#831843">Scaled ÷ 0.8:   [0, 1.25, 1.25, 1.25, 1.25]  →  sum = 5  ✓</text>
  <text x="50" y="386" font-size="11" fill="#9d174d" font-weight="600">Keeps output magnitude consistent between training &amp; testing</text>

  <!-- Two problems solved -->
  <rect x="30" y="410" width="430" height="90" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="245" y="434" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">Two Problems Dropout Solves</text>

  <text x="50" y="458" font-size="12" fill="#1e293b">1. Co-adaptation — neurons can't copy each other</text>
  <text x="50" y="480" font-size="12" fill="#1e293b">2. Memorization — model can't use fixed neurons to memorize data</text>

  <!-- Training config & results -->
  <rect x="480" y="278" width="390" height="222" rx="14" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5"/>
  <text x="675" y="302" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">Full Pipeline Results</text>

  <text x="500" y="326" font-size="11" fill="#065f46" font-weight="600">Config:</text>
  <text x="500" y="344" font-size="11" fill="#065f46">1000 samples, 64 neurons, Adam (α=0.05)</text>
  <text x="500" y="362" font-size="11" fill="#065f46">L2 reg (λ=5e-4) + Dropout (rate=0.1)</text>

  <line x1="500" y1="374" x2="850" y2="374" stroke="#a7f3d0" stroke-width="1"/>

  <text x="500" y="396" font-size="12" fill="#065f46">Training accuracy:    66.6%</text>
  <text x="500" y="416" font-size="12" fill="#065f46" font-weight="700">Validation accuracy:  &gt; 66.6%</text>

  <rect x="500" y="430" width="350" height="55" rx="8" fill="#d1fae5"/>
  <text x="675" y="452" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">First time validation &gt; training!</text>
  <text x="675" y="472" text-anchor="middle" font-size="11" fill="#065f46">Dropout prevents overfitting so well that the</text>
  <text x="675" y="486" text-anchor="middle" font-size="11" fill="#065f46">model generalizes better than it trains.</text>
</svg>