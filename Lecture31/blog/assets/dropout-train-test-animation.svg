<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 430" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow31" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="940" height="430" rx="20" fill="#fafafa" stroke="#e5e7eb" stroke-width="1.5"/>

  <text x="470" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Dropout: Training vs Testing</text>
  <text x="470" y="56" text-anchor="middle" font-size="12" fill="#64748b">Drop neurons only during training. Turn dropout off during validation and testing.</text>

  <rect x="42" y="96" width="388" height="254" rx="18" fill="#ffffff" stroke="#fee2e2" stroke-width="1.5"/>
  <text x="236" y="122" text-anchor="middle" font-size="14" font-weight="700" fill="#b91c1c">Training mode</text>
  <text x="236" y="142" text-anchor="middle" font-size="11" fill="#64748b">Random mask sampled every forward pass.</text>
  <rect x="84" y="156" width="92" height="30" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.2"/>
  <text x="130" y="175" text-anchor="middle" font-size="11" font-weight="700" fill="#b91c1c">dropout ON</text>
  <line x1="124" y1="232" x2="198" y2="232" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow31)"/>
  <line x1="278" y1="232" x2="352" y2="232" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow31)"/>
  <circle cx="104" cy="232" r="18" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="104" y="237" text-anchor="middle" font-size="11" font-weight="700" fill="#1d4ed8">x</text>
  <circle cx="218" cy="186" r="16" fill="#dcfce7" stroke="#10b981" stroke-width="2"/>
  <circle cx="218" cy="232" r="16" fill="#f3f4f6" stroke="#94a3b8" stroke-width="2" opacity="0.35">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="218" cy="278" r="16" fill="#dcfce7" stroke="#10b981" stroke-width="2"/>
  <circle cx="268" cy="209" r="16" fill="#f3f4f6" stroke="#94a3b8" stroke-width="2" opacity="0.35">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="1.4s" begin="0.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="268" cy="255" r="16" fill="#dcfce7" stroke="#10b981" stroke-width="2"/>
  <text x="218" y="191" text-anchor="middle" font-size="10" font-weight="700" fill="#047857">1.25</text>
  <text x="218" y="283" text-anchor="middle" font-size="10" font-weight="700" fill="#047857">1.25</text>
  <text x="268" y="260" text-anchor="middle" font-size="10" font-weight="700" fill="#047857">1.25</text>
  <line x1="104" y1="232" x2="218" y2="186" stroke="#3b82f6" stroke-width="2" opacity="0.7"/>
  <line x1="104" y1="232" x2="218" y2="232" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="5 4"/>
  <line x1="104" y1="232" x2="218" y2="278" stroke="#3b82f6" stroke-width="2" opacity="0.7"/>
  <line x1="104" y1="232" x2="268" y2="209" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="5 4"/>
  <line x1="104" y1="232" x2="268" y2="255" stroke="#3b82f6" stroke-width="2" opacity="0.7"/>
  <circle cx="372" cy="232" r="18" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="372" y="237" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">y</text>
  <text x="236" y="318" text-anchor="middle" font-size="11" fill="#475569">Active neurons are scaled by 1 / keep_prob.</text>

  <rect x="510" y="96" width="388" height="254" rx="18" fill="#ffffff" stroke="#dcfce7" stroke-width="1.5"/>
  <text x="704" y="122" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">Validation / testing mode</text>
  <text x="704" y="142" text-anchor="middle" font-size="11" fill="#64748b">No random mask. Use the full network deterministically.</text>
  <rect x="554" y="156" width="96" height="30" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.2"/>
  <text x="602" y="175" text-anchor="middle" font-size="11" font-weight="700" fill="#047857">dropout OFF</text>
  <circle cx="572" cy="232" r="18" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="572" y="237" text-anchor="middle" font-size="11" font-weight="700" fill="#1d4ed8">x</text>
  <circle cx="686" cy="186" r="16" fill="#dcfce7" stroke="#10b981" stroke-width="2"/>
  <circle cx="686" cy="232" r="16" fill="#dcfce7" stroke="#10b981" stroke-width="2"/>
  <circle cx="686" cy="278" r="16" fill="#dcfce7" stroke="#10b981" stroke-width="2"/>
  <circle cx="736" cy="209" r="16" fill="#dcfce7" stroke="#10b981" stroke-width="2"/>
  <circle cx="736" cy="255" r="16" fill="#dcfce7" stroke="#10b981" stroke-width="2"/>
  <line x1="572" y1="232" x2="686" y2="186" stroke="#3b82f6" stroke-width="2" opacity="0.7"/>
  <line x1="572" y1="232" x2="686" y2="232" stroke="#3b82f6" stroke-width="2" opacity="0.7"/>
  <line x1="572" y1="232" x2="686" y2="278" stroke="#3b82f6" stroke-width="2" opacity="0.7"/>
  <line x1="572" y1="232" x2="736" y2="209" stroke="#3b82f6" stroke-width="2" opacity="0.7"/>
  <line x1="572" y1="232" x2="736" y2="255" stroke="#3b82f6" stroke-width="2" opacity="0.7"/>
  <line x1="592" y1="232" x2="666" y2="232" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow31)"/>
  <line x1="746" y1="232" x2="820" y2="232" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow31)"/>
  <circle cx="840" cy="232" r="18" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="840" y="237" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">y</text>
  <text x="704" y="318" text-anchor="middle" font-size="11" fill="#475569">All neurons contribute. No extra scaling step is needed here.</text>

  <rect x="122" y="374" width="696" height="30" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="470" y="393" text-anchor="middle" font-size="11" fill="#334155">Training uses random masks to regularize. Testing turns dropout off because the training-time scaling already preserved the expected magnitude.</text>
</svg>