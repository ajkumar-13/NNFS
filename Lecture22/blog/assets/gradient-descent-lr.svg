<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 500" font-family="Segoe UI, sans-serif">
  <rect width="860" height="500" rx="16" fill="#fafafa" stroke="#e2e8f0"/>
  <text x="430" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">Gradient Descent — Learning Rate Effects</text>

  <!-- Loss landscape -->
  <g transform="translate(30,50)">
    <text x="200" y="0" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">Loss Landscape</text>
    <!-- Landscape curve -->
    <path d="M20,220 Q60,200 80,180 Q100,100 130,160 Q150,200 170,140 Q185,100 200,50 Q215,100 235,140 Q255,200 280,160 Q300,100 320,180 Q340,200 380,220" fill="none" stroke="#94a3b8" stroke-width="2"/>
    <!-- Fill under curve -->
    <path d="M20,220 Q60,200 80,180 Q100,100 130,160 Q150,200 170,140 Q185,100 200,50 Q215,100 235,140 Q255,200 280,160 Q300,100 320,180 Q340,200 380,220 L380,240 L20,240 Z" fill="#e2e8f0" opacity=".4"/>
    <!-- Local minima dots -->
    <circle cx="130" cy="160" r="6" fill="#f59e0b" stroke="#fff" stroke-width="2"/>
    <text x="130" y="185" text-anchor="middle" font-size="10" fill="#f59e0b">Local</text>
    <circle cx="280" cy="160" r="6" fill="#f59e0b" stroke="#fff" stroke-width="2"/>
    <text x="280" y="185" text-anchor="middle" font-size="10" fill="#f59e0b">Local</text>
    <!-- Global minimum -->
    <circle cx="200" cy="50" r="7" fill="#10b981" stroke="#fff" stroke-width="2"/>
    <text x="200" y="40" text-anchor="middle" font-size="10" font-weight="600" fill="#10b981">Global Min</text>
    <!-- Starting point -->
    <circle cx="60" cy="198" r="5" fill="#ef4444"/>
    <text x="60" y="218" text-anchor="middle" font-size="9" fill="#ef4444">Start</text>
    <!-- Axis labels -->
    <text x="200" y="258" text-anchor="middle" font-size="10" fill="#94a3b8">Parameters (W, B)</text>
    <text x="5" y="130" text-anchor="middle" font-size="10" fill="#94a3b8" transform="rotate(-90,5,130)">Loss</text>
  </g>

  <!-- Three learning rate scenarios -->
  <g transform="translate(440,50)">
    <text x="200" y="0" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">Learning Rate Comparison</text>

    <!-- LR too high -->
    <g transform="translate(0,20)">
      <rect width="390" height="65" rx="8" fill="#fef2f2" stroke="#ef4444"/>
      <text x="15" y="20" font-size="12" font-weight="600" fill="#ef4444">α too high</text>
      <text x="15" y="38" font-size="10" fill="#7f1d1d">• Oscillates wildly across loss surface</text>
      <text x="15" y="54" font-size="10" fill="#7f1d1d">• Explores landscape but can't settle</text>
      <!-- Zigzag arrow -->
      <polyline points="330,15 350,45 360,15 370,45 380,15" fill="none" stroke="#ef4444" stroke-width="2"/>
    </g>

    <!-- LR too low -->
    <g transform="translate(0,100)">
      <rect width="390" height="65" rx="8" fill="#fefce8" stroke="#f59e0b"/>
      <text x="15" y="20" font-size="12" font-weight="600" fill="#f59e0b">α too low</text>
      <text x="15" y="38" font-size="10" fill="#78350f">• Stuck in local minima forever</text>
      <text x="15" y="54" font-size="10" fill="#78350f">• Never discovers better regions</text>
      <!-- Flat arrow -->
      <line x1="330" y1="32" x2="380" y2="32" stroke="#f59e0b" stroke-width="2"/>
      <circle cx="380" cy="32" r="4" fill="#f59e0b"/>
    </g>

    <!-- LR with momentum -->
    <g transform="translate(0,180)">
      <rect width="390" height="65" rx="8" fill="#f0fdf4" stroke="#10b981"/>
      <text x="15" y="20" font-size="12" font-weight="600" fill="#10b981">α + Momentum ✓</text>
      <text x="15" y="38" font-size="10" fill="#14532d">• Escapes local minima with inertia</text>
      <text x="15" y="54" font-size="10" fill="#14532d">• Converges to global minimum</text>
      <!-- Smooth arrow -->
      <path d="M330,32 Q350,20 360,32 Q370,44 380,28" fill="none" stroke="#10b981" stroke-width="2"/>
      <circle cx="380" cy="28" r="4" fill="#10b981"/>
    </g>
  </g>

  <!-- Update rule -->
  <g transform="translate(30,320)">
    <rect width="800" height="70" rx="12" fill="#eef2ff" stroke="#6366f1"/>
    <text x="400" y="24" text-anchor="middle" font-size="15" font-weight="700" fill="#6366f1">Gradient Descent Update Rule</text>
    <text x="200" y="52" text-anchor="middle" font-size="14" font-family="Consolas" fill="#312e81">W_new = W − α × ∂L/∂W</text>
    <text x="600" y="52" text-anchor="middle" font-size="14" font-family="Consolas" fill="#312e81">B_new = B − α × ∂L/∂B</text>
  </g>

  <!-- Optimizer class -->
  <g transform="translate(30,410)">
    <rect width="800" height="70" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-dasharray="4,2"/>
    <text x="20" y="22" font-size="12" font-weight="600" fill="#475569">Optimizer_SGD class:</text>
    <text x="20" y="44" font-size="11" font-family="Consolas" fill="#64748b">__init__(learning_rate=1.0)  →  stores α</text>
    <text x="20" y="62" font-size="11" font-family="Consolas" fill="#64748b">update_params(layer)        →  layer.weights -= α × layer.dweights;  layer.biases -= α × layer.dbiases</text>
  </g>
</svg>