<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 545" font-family="Segoe UI, Arial, sans-serif">
  <rect width="800" height="545" fill="#fafafa" rx="16"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Complete Forward Pass Pipeline</text>
  <text x="400" y="50" text-anchor="middle" font-size="12" fill="#64748b">Data flows top → bottom through 4 stages</text>

  <!-- Input -->
  <rect x="260" y="68" width="280" height="52" rx="10" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="400" y="90" text-anchor="middle" font-size="14" font-weight="600" fill="#4338ca">Input: Spiral Data</text>
  <text x="400" y="108" text-anchor="middle" font-size="11" fill="#64748b">X shape: (300, 2) — 300 samples, 2 features</text>

  <!-- Arrow 1 -->
  <line x1="400" y1="120" x2="400" y2="148" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="490" y="140" font-size="11" fill="#64748b" font-style="italic">np.dot(X, W₁) + b₁</text>

  <!-- Dense 1 -->
  <rect x="220" y="152" width="360" height="62" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="400" y="174" text-anchor="middle" font-size="14" font-weight="600" fill="#1d4ed8">Dense Layer 1 (2 → 3 neurons)</text>
  <text x="400" y="192" text-anchor="middle" font-size="11" fill="#374151">W₁: (2×3), b₁: (1×3)  →  output: (300, 3)</text>

  <!-- Arrow 2 -->
  <line x1="400" y1="214" x2="400" y2="242" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="490" y="234" font-size="11" fill="#64748b" font-style="italic">max(0, z)</text>

  <!-- ReLU -->
  <rect x="220" y="246" width="360" height="52" rx="10" fill="#dcfce7" stroke="#10b981" stroke-width="1.5"/>
  <text x="400" y="268" text-anchor="middle" font-size="14" font-weight="600" fill="#047857">ReLU Activation</text>
  <text x="400" y="286" text-anchor="middle" font-size="11" fill="#374151">Zeros out negatives → adds non-linearity  |  (300, 3)</text>

  <!-- Arrow 3 -->
  <line x1="400" y1="298" x2="400" y2="326" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="490" y="318" font-size="11" fill="#64748b" font-style="italic">np.dot(F₁, W₂) + b₂</text>

  <!-- Dense 2 -->
  <rect x="220" y="330" width="360" height="62" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="400" y="352" text-anchor="middle" font-size="14" font-weight="600" fill="#1d4ed8">Dense Layer 2 (3 → 3 neurons)</text>
  <text x="400" y="370" text-anchor="middle" font-size="11" fill="#374151">W₂: (3×3), b₂: (1×3)  →  output: (300, 3)</text>

  <!-- Arrow 4 -->
  <line x1="400" y1="392" x2="400" y2="420" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="490" y="412" font-size="11" fill="#64748b" font-style="italic">eˣ / Σeˣ</text>

  <!-- Softmax -->
  <rect x="220" y="424" width="360" height="52" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="400" y="446" text-anchor="middle" font-size="14" font-weight="600" fill="#b45309">Softmax Activation</text>
  <text x="400" y="464" text-anchor="middle" font-size="11" fill="#374151">Scores → probabilities (sum = 1.0)  |  (300, 3)</text>

  <!-- Arrow 5 -->
  <line x1="400" y1="476" x2="400" y2="494" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="260" y="497" width="280" height="32" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="400" y="518" text-anchor="middle" font-size="12" font-weight="600" fill="#9d174d">Output: [0.333, 0.333, 0.334] (random guessing)</text>

  <!-- Side labels -->
  <text x="195" y="185" text-anchor="end" font-size="10" fill="#3b82f6">Linear</text>
  <text x="195" y="274" text-anchor="end" font-size="10" fill="#10b981">Non-linear</text>
  <text x="195" y="363" text-anchor="end" font-size="10" fill="#3b82f6">Linear</text>
  <text x="195" y="452" text-anchor="end" font-size="10" fill="#f59e0b">Normalize</text>
</svg>