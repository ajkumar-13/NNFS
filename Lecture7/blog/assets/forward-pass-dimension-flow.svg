<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 340" font-family="Segoe UI, Arial, sans-serif">
  <rect width="780" height="340" fill="#fafafa" rx="16"/>
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#64748b"/>
    </marker>
  </defs>

  <text x="390" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Dimension Flow Through the Forward Pass</text>

  <!-- X box -->
  <rect x="20" y="55" width="110" height="50" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="75" y="76" text-anchor="middle" font-size="13" font-weight="600" fill="#4338ca">X</text>
  <text x="75" y="94" text-anchor="middle" font-size="11" fill="#64748b">(300 × 2)</text>

  <!-- Arrow -->
  <line x1="130" y1="80" x2="160" y2="80" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Dense1 -->
  <rect x="164" y="50" width="120" height="60" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="224" y="72" text-anchor="middle" font-size="13" font-weight="600" fill="#1d4ed8">Dense 1</text>
  <text x="224" y="89" text-anchor="middle" font-size="11" fill="#374151">W₁: (2×3)</text>
  <text x="224" y="104" text-anchor="middle" font-size="10" fill="#64748b">→ (300×3)</text>

  <!-- Arrow -->
  <line x1="284" y1="80" x2="314" y2="80" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ReLU -->
  <rect x="318" y="55" width="100" height="50" rx="8" fill="#dcfce7" stroke="#10b981" stroke-width="1.5"/>
  <text x="368" y="76" text-anchor="middle" font-size="13" font-weight="600" fill="#047857">ReLU</text>
  <text x="368" y="94" text-anchor="middle" font-size="11" fill="#64748b">(300×3)</text>

  <!-- Arrow -->
  <line x1="418" y1="80" x2="448" y2="80" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Dense2 -->
  <rect x="452" y="50" width="120" height="60" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="512" y="72" text-anchor="middle" font-size="13" font-weight="600" fill="#1d4ed8">Dense 2</text>
  <text x="512" y="89" text-anchor="middle" font-size="11" fill="#374151">W₂: (3×3)</text>
  <text x="512" y="104" text-anchor="middle" font-size="10" fill="#64748b">→ (300×3)</text>

  <!-- Arrow -->
  <line x1="572" y1="80" x2="602" y2="80" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Softmax -->
  <rect x="606" y="55" width="110" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="661" y="76" text-anchor="middle" font-size="13" font-weight="600" fill="#b45309">Softmax</text>
  <text x="661" y="94" text-anchor="middle" font-size="11" fill="#64748b">(300×3)</text>

  <!-- Shape tracking section -->
  <text x="390" y="148" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">Shape Tracking: Inner Dimensions Must Match</text>

  <rect x="40" y="168" width="700" height="155" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Step 1 -->
  <text x="130" y="196" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">Step 1</text>
  <text x="130" y="220" text-anchor="middle" font-size="12" fill="#374151">(300×<tspan font-weight="700" fill="#dc2626">2</tspan>) · (<tspan font-weight="700" fill="#dc2626">2</tspan>×3) = <tspan font-weight="700" fill="#047857">(300×3)</tspan></text>
  <text x="130" y="240" text-anchor="middle" font-size="10" fill="#dc2626">↑ match ↑</text>

  <!-- Step 2 -->
  <text x="390" y="196" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">Step 2 (ReLU)</text>
  <text x="390" y="220" text-anchor="middle" font-size="12" fill="#374151">(300×3) → <tspan font-weight="700" fill="#047857">(300×3)</tspan></text>
  <text x="390" y="240" text-anchor="middle" font-size="10" fill="#64748b">element-wise, shape unchanged</text>

  <!-- Step 3 -->
  <text x="390" y="268" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">Step 3</text>
  <text x="390" y="288" text-anchor="middle" font-size="12" fill="#374151">(300×<tspan font-weight="700" fill="#dc2626">3</tspan>) · (<tspan font-weight="700" fill="#dc2626">3</tspan>×3) = <tspan font-weight="700" fill="#047857">(300×3)</tspan></text>
  <text x="390" y="306" text-anchor="middle" font-size="10" fill="#dc2626">↑ match ↑</text>

  <!-- Step 4 -->
  <text x="640" y="268" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">Step 4 (Softmax)</text>
  <text x="640" y="288" text-anchor="middle" font-size="12" fill="#374151">(300×3) → <tspan font-weight="700" fill="#047857">(300×3)</tspan></text>
  <text x="640" y="306" text-anchor="middle" font-size="10" fill="#64748b">per-row normalize, shape unchanged</text>
</svg>