<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 400" font-family="Segoe UI, sans-serif">
  <rect width="780" height="400" rx="16" fill="#fafafa" stroke="#e2e8f0"/>
  <text x="390" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e293b">Gradient Descent: Layer — Loss Drops from 466 to ≈0</text>

  <!-- Loss curve -->
  <g transform="translate(80,55)">
    <rect width="620" height="260" rx="8" fill="white" stroke="#e2e8f0"/>
    <!-- Axes -->
    <line x1="50" y1="230" x2="590" y2="230" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="50" y1="10" x2="50" y2="230" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="320" y="255" text-anchor="middle" font-size="12" fill="#64748b">Iteration</text>
    <text x="20" y="130" text-anchor="middle" font-size="12" fill="#64748b" transform="rotate(-90,20,130)">Loss</text>

    <!-- Tick marks -->
    <text x="50" y="248" text-anchor="middle" font-size="10" fill="#94a3b8">0</text>
    <text x="185" y="248" text-anchor="middle" font-size="10" fill="#94a3b8">50</text>
    <text x="320" y="248" text-anchor="middle" font-size="10" fill="#94a3b8">100</text>
    <text x="455" y="248" text-anchor="middle" font-size="10" fill="#94a3b8">150</text>
    <text x="590" y="248" text-anchor="middle" font-size="10" fill="#94a3b8">200</text>

    <!-- Loss curve (exponential decay shape) -->
    <path d="M50,20 Q70,25 80,50 Q100,110 140,160 Q180,195 230,210 Q300,222 400,226 Q500,228 590,229"
          fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Key points -->
    <circle cx="50" cy="20" r="4" fill="#ef4444"/>
    <text x="58" y="18" font-size="11" fill="#ef4444" font-weight="600">466.56</text>

    <circle cx="80" cy="50" r="3" fill="#ef4444"/>
    <text x="88" y="48" font-size="10" fill="#ef4444">309.14</text>

    <circle cx="590" cy="229" r="4" fill="#10b981"/>
    <text x="545" y="222" font-size="11" fill="#10b981" font-weight="600">≈ 0</text>
  </g>

  <!-- Update rule -->
  <g transform="translate(80,340)">
    <rect width="620" height="45" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-dasharray="4,2"/>
    <text x="310" y="18" text-anchor="middle" font-size="13" fill="#6366f1" font-weight="600">Update Rule</text>
    <text x="310" y="36" text-anchor="middle" font-size="12" font-family="Consolas, monospace" fill="#4338ca">W_new = W_old − 0.001 × ∂L/∂W    |    B_new = B_old − 0.001 × ∂L/∂B</text>
  </g>
</svg>