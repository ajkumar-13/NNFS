<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 430" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow13" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="940" height="430" rx="20" fill="#fafafa"/>

  <text x="470" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Backprop Through a Layer</text>
  <text x="470" y="56" text-anchor="middle" font-size="12" fill="#64748b">One upstream loss signal is reused across all neurons, then each neuron scales it by the same input row.</text>

  <rect x="40" y="98" width="220" height="130" rx="16" fill="#ffffff" stroke="#dbeafe" stroke-width="1.5"/>
  <text x="150" y="124" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">Input row X</text>
  <text x="150" y="144" text-anchor="middle" font-size="11" fill="#64748b">The same row is reused for every neuron.</text>
  <rect x="74" y="166" width="152" height="42" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2">
    <animate attributeName="stroke-width" values="2;3;2" dur="1.8s" repeatCount="indefinite"/>
  </rect>
  <text x="150" y="193" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">[1, 2, 3, 4]</text>

  <rect x="320" y="98" width="300" height="234" rx="16" fill="#ffffff" stroke="#fee2e2" stroke-width="1.5"/>
  <text x="470" y="124" text-anchor="middle" font-size="14" font-weight="700" fill="#b91c1c">Shared upstream gradient</text>
  <rect x="390" y="142" width="160" height="40" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="2">
    <animate attributeName="opacity" values="1;0.55;1" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <text x="470" y="167" text-anchor="middle" font-size="13" font-weight="700" fill="#b91c1c">dL/dY = 43.2</text>
  <line x1="470" y1="182" x2="470" y2="210" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow13)"/>
  <rect x="360" y="220" width="220" height="28" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="1.2">
    <animate attributeName="opacity" values="1;0.35;0.35;1" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text x="470" y="238" text-anchor="middle" font-size="11" font-weight="700" fill="#c2410c">Neuron 1 sees 43.2</text>
  <rect x="360" y="254" width="220" height="28" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="1.2">
    <animate attributeName="opacity" values="0.35;1;0.35;0.35" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text x="470" y="272" text-anchor="middle" font-size="11" font-weight="700" fill="#c2410c">Neuron 2 sees 43.2</text>
  <rect x="360" y="288" width="220" height="28" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="1.2">
    <animate attributeName="opacity" values="0.35;0.35;1;0.35" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text x="470" y="306" text-anchor="middle" font-size="11" font-weight="700" fill="#c2410c">Neuron 3 sees 43.2</text>

  <rect x="680" y="98" width="220" height="234" rx="16" fill="#ffffff" stroke="#dcfce7" stroke-width="1.5"/>
  <text x="790" y="124" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">Gradient matrix dL/dW</text>
  <text x="790" y="144" text-anchor="middle" font-size="11" fill="#64748b">Each row is 43.2 times the input row.</text>
  <rect x="726" y="166" width="128" height="112" rx="12" fill="#dcfce7" stroke="#10b981" stroke-width="2"/>
  <g stroke="#86efac" stroke-width="1">
    <line x1="758" y1="166" x2="758" y2="278"/>
    <line x1="790" y1="166" x2="790" y2="278"/>
    <line x1="822" y1="166" x2="822" y2="278"/>
    <line x1="726" y1="203" x2="854" y2="203"/>
    <line x1="726" y1="240" x2="854" y2="240"/>
  </g>
  <rect x="726" y="166" width="128" height="37" rx="12" fill="#10b981" opacity="0.12">
    <animate attributeName="opacity" values="0.12;0.3;0.12;0.12" dur="3s" repeatCount="indefinite"/>
  </rect>
  <rect x="726" y="203" width="128" height="37" rx="12" fill="#10b981" opacity="0.12">
    <animate attributeName="opacity" values="0.12;0.12;0.3;0.12" dur="3s" repeatCount="indefinite"/>
  </rect>
  <rect x="726" y="240" width="128" height="38" rx="12" fill="#10b981" opacity="0.12">
    <animate attributeName="opacity" values="0.12;0.12;0.12;0.3" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text x="742" y="190" text-anchor="middle" font-size="10" fill="#047857">43.2</text>
  <text x="774" y="190" text-anchor="middle" font-size="10" fill="#047857">86.4</text>
  <text x="806" y="190" text-anchor="middle" font-size="10" fill="#047857">129.6</text>
  <text x="838" y="190" text-anchor="middle" font-size="10" fill="#047857">172.8</text>
  <text x="742" y="227" text-anchor="middle" font-size="10" fill="#047857">43.2</text>
  <text x="774" y="227" text-anchor="middle" font-size="10" fill="#047857">86.4</text>
  <text x="806" y="227" text-anchor="middle" font-size="10" fill="#047857">129.6</text>
  <text x="838" y="227" text-anchor="middle" font-size="10" fill="#047857">172.8</text>
  <text x="742" y="264" text-anchor="middle" font-size="10" fill="#047857">43.2</text>
  <text x="774" y="264" text-anchor="middle" font-size="10" fill="#047857">86.4</text>
  <text x="806" y="264" text-anchor="middle" font-size="10" fill="#047857">129.6</text>
  <text x="838" y="264" text-anchor="middle" font-size="10" fill="#047857">172.8</text>

  <line x1="260" y1="190" x2="320" y2="190" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow13)"/>
  <line x1="620" y1="190" x2="680" y2="190" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow13)"/>

  <rect x="90" y="360" width="760" height="30" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="470" y="379" text-anchor="middle" font-size="11" fill="#334155">Layer backprop is still the chain rule: shared upstream factor times local derivative times the connected input value.</text>
</svg>