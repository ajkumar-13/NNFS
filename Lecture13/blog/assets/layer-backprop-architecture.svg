<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Segoe UI, sans-serif">
  <defs>
    <marker id="arrowF" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6Z" fill="#6366f1"/>
    </marker>
    <marker id="arrowB" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6Z" fill="#ef4444"/>
    </marker>
  </defs>
  <rect width="900" height="520" rx="16" fill="#fafafa" stroke="#e2e8f0"/>

  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Backpropagation Through a Layer — 4 Inputs, 3 Neurons</text>

  <!-- Inputs -->
  <g transform="translate(60,80)">
    <rect width="50" height="36" rx="8" fill="#6366f1" opacity=".15" stroke="#6366f1"/>
    <text x="25" y="23" text-anchor="middle" font-size="14" fill="#6366f1" font-weight="600">X₁</text>
  </g>
  <g transform="translate(60,140)">
    <rect width="50" height="36" rx="8" fill="#6366f1" opacity=".15" stroke="#6366f1"/>
    <text x="25" y="23" text-anchor="middle" font-size="14" fill="#6366f1" font-weight="600">X₂</text>
  </g>
  <g transform="translate(60,200)">
    <rect width="50" height="36" rx="8" fill="#6366f1" opacity=".15" stroke="#6366f1"/>
    <text x="25" y="23" text-anchor="middle" font-size="14" fill="#6366f1" font-weight="600">X₃</text>
  </g>
  <g transform="translate(60,260)">
    <rect width="50" height="36" rx="8" fill="#6366f1" opacity=".15" stroke="#6366f1"/>
    <text x="25" y="23" text-anchor="middle" font-size="14" fill="#6366f1" font-weight="600">X₄</text>
  </g>

  <!-- Neuron 1 -->
  <g transform="translate(260,70)">
    <rect width="100" height="50" rx="12" fill="#ec4899" opacity=".15" stroke="#ec4899"/>
    <text x="50" y="20" text-anchor="middle" font-size="12" fill="#ec4899" font-weight="600">Neuron 1</text>
    <text x="50" y="38" text-anchor="middle" font-size="11" fill="#64748b">Z₁ → ReLU → A₁</text>
  </g>
  <!-- Neuron 2 -->
  <g transform="translate(260,180)">
    <rect width="100" height="50" rx="12" fill="#10b981" opacity=".15" stroke="#10b981"/>
    <text x="50" y="20" text-anchor="middle" font-size="12" fill="#10b981" font-weight="600">Neuron 2</text>
    <text x="50" y="38" text-anchor="middle" font-size="11" fill="#64748b">Z₂ → ReLU → A₂</text>
  </g>
  <!-- Neuron 3 -->
  <g transform="translate(260,290)">
    <rect width="100" height="50" rx="12" fill="#f59e0b" opacity=".15" stroke="#f59e0b"/>
    <text x="50" y="20" text-anchor="middle" font-size="12" fill="#f59e0b" font-weight="600">Neuron 3</text>
    <text x="50" y="38" text-anchor="middle" font-size="11" fill="#64748b">Z₃ → ReLU → A₃</text>
  </g>

  <!-- Sum neuron -->
  <g transform="translate(480,170)">
    <rect width="90" height="60" rx="12" fill="#8b5cf6" opacity=".15" stroke="#8b5cf6"/>
    <text x="45" y="22" text-anchor="middle" font-size="12" fill="#8b5cf6" font-weight="600">Σ</text>
    <text x="45" y="40" text-anchor="middle" font-size="11" fill="#64748b">Y=A₁+A₂+A₃</text>
  </g>

  <!-- Loss -->
  <g transform="translate(660,175)">
    <rect width="90" height="50" rx="12" fill="#ef4444" opacity=".15" stroke="#ef4444"/>
    <text x="45" y="20" text-anchor="middle" font-size="12" fill="#ef4444" font-weight="600">Loss</text>
    <text x="45" y="38" text-anchor="middle" font-size="11" fill="#64748b">L = Y²</text>
  </g>

  <!-- Forward arrows: inputs to neurons -->
  <line x1="110" y1="98" x2="258" y2="95" stroke="#6366f1" stroke-width="1.2" marker-end="url(#arrowF)" opacity=".4"/>
  <line x1="110" y1="98" x2="258" y2="205" stroke="#6366f1" stroke-width="1.2" marker-end="url(#arrowF)" opacity=".4"/>
  <line x1="110" y1="98" x2="258" y2="315" stroke="#6366f1" stroke-width="1.2" marker-end="url(#arrowF)" opacity=".4"/>

  <line x1="110" y1="158" x2="258" y2="95" stroke="#6366f1" stroke-width="1.2" marker-end="url(#arrowF)" opacity=".4"/>
  <line x1="110" y1="158" x2="258" y2="205" stroke="#6366f1" stroke-width="1.2" marker-end="url(#arrowF)" opacity=".4"/>
  <line x1="110" y1="158" x2="258" y2="315" stroke="#6366f1" stroke-width="1.2" marker-end="url(#arrowF)" opacity=".4"/>

  <line x1="110" y1="218" x2="258" y2="95" stroke="#6366f1" stroke-width="1.2" marker-end="url(#arrowF)" opacity=".4"/>
  <line x1="110" y1="218" x2="258" y2="205" stroke="#6366f1" stroke-width="1.2" marker-end="url(#arrowF)" opacity=".4"/>
  <line x1="110" y1="218" x2="258" y2="315" stroke="#6366f1" stroke-width="1.2" marker-end="url(#arrowF)" opacity=".4"/>

  <line x1="110" y1="278" x2="258" y2="95" stroke="#6366f1" stroke-width="1.2" marker-end="url(#arrowF)" opacity=".4"/>
  <line x1="110" y1="278" x2="258" y2="205" stroke="#6366f1" stroke-width="1.2" marker-end="url(#arrowF)" opacity=".4"/>
  <line x1="110" y1="278" x2="258" y2="315" stroke="#6366f1" stroke-width="1.2" marker-end="url(#arrowF)" opacity=".4"/>

  <!-- Forward arrows: neurons to sum -->
  <line x1="360" y1="95" x2="478" y2="195" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowF)"/>
  <line x1="360" y1="205" x2="478" y2="200" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowF)"/>
  <line x1="360" y1="315" x2="478" y2="210" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowF)"/>

  <!-- Forward arrows: sum to loss -->
  <line x1="570" y1="200" x2="658" y2="200" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowF)"/>

  <!-- Backward arrows (red, dashed) -->
  <line x1="658" y1="210" x2="572" y2="210" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowB)"/>
  <text x="615" y="228" text-anchor="middle" font-size="10" fill="#ef4444">∂L/∂Y = 2Y</text>

  <line x1="478" y1="188" x2="362" y2="100" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrowB)"/>
  <line x1="478" y1="198" x2="362" y2="198" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrowB)"/>
  <line x1="478" y1="215" x2="362" y2="310" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrowB)"/>

  <!-- Parameter counts -->
  <g transform="translate(180,400)">
    <rect width="540" height="100" rx="12" fill="#f0fdf4" stroke="#10b981" stroke-dasharray="4,2"/>
    <text x="270" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="#10b981">15 Learnable Parameters</text>
    <text x="270" y="48" text-anchor="middle" font-size="12" fill="#64748b">12 weights (4 inputs × 3 neurons) + 3 biases (1 per neuron)</text>
    <text x="270" y="70" text-anchor="middle" font-size="12" fill="#64748b">All gradients computed via chain rule: ∂L/∂W = 2Y · 1 · ReLU'(Z) · X</text>
    <text x="270" y="88" text-anchor="middle" font-size="12" fill="#64748b">All bias gradients: ∂L/∂B = 2Y · 1 · ReLU'(Z)</text>
  </g>
</svg>