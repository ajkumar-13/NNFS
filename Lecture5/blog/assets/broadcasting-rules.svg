  <!-- ===== Rules box ===== -->
  <rect x="555" y="50" width="245" height="275" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="677" y="78" text-anchor="middle" font-family="Segoe UI" font-weight="bold" font-size="15" fill="#1e293b">Broadcasting Rules</text>

  <text x="577" y="104" font-family="Segoe UI" font-size="12" fill="#374151">Compare dims right to left.</text>
  <text x="577" y="122" font-family="Segoe UI" font-size="12" fill="#374151">Each pair must satisfy one of:</text>

  <rect x="570" y="136" width="215" height="30" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="677" y="156" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#047857">✓ Dimensions are equal</text>

  <rect x="570" y="174" width="215" height="30" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="677" y="194" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#1d4ed8">✓ One of them is 1</text>

  <rect x="570" y="212" width="215" height="30" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="677" y="232" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#b45309">✓ One doesn't exist</text>

  <rect x="570" y="256" width="215" height="34" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="677" y="278" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#dc2626">✗ Otherwise: Error!</text>

  <!-- Quick examples -->
  <text x="677" y="308" text-anchor="middle" font-family="Consolas" font-size="10" fill="#047857">(3,3)+(3,1) ✓  (3,3)+(1,3) ✓</text>
  <text x="677" y="322" text-anchor="middle" font-family="Consolas" font-size="10" fill="#dc2626">(3,3)+(2,3) ✗  3≠2, neither=1</text>
