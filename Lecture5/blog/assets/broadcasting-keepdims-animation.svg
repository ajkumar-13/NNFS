<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="Segoe UI, Arial, sans-serif">
  <rect width="900" height="400" rx="16" fill="#fafafa"/>

  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Broadcasting + keepdims: Same Numbers, Different Shape</text>
  <text x="450" y="50" text-anchor="middle" font-size="12" fill="#64748b">Task: subtract each row's max from that row. Watch how shape changes the result.</text>

  <!-- ===== LEFT: Original matrix ===== -->
  <rect x="24" y="68" width="210" height="310" rx="14" fill="#fff" stroke="#dbeafe" stroke-width="1.5"/>
  <text x="129" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">Original array a</text>
  <text x="129" y="110" text-anchor="middle" font-size="11" fill="#64748b">shape: (3 x 3)</text>

  <!-- 3x3 grid with numbers -->
  <g transform="translate(54,120)">
    <rect x="0" y="0" width="50" height="36" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
    <rect x="50" y="0" width="50" height="36" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
    <rect x="100" y="0" width="50" height="36" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
    <rect x="0" y="36" width="50" height="36" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
    <rect x="50" y="36" width="50" height="36" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
    <rect x="100" y="36" width="50" height="36" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
    <rect x="0" y="72" width="50" height="36" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
    <rect x="50" y="72" width="50" height="36" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
    <rect x="100" y="72" width="50" height="36" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
    <text x="25" y="23" text-anchor="middle" font-family="Consolas" font-size="15" fill="#1e40af">1</text>
    <text x="75" y="23" text-anchor="middle" font-family="Consolas" font-size="15" fill="#1e40af">2</text>
    <text x="125" y="23" text-anchor="middle" font-family="Consolas" font-size="15" fill="#1e40af">3</text>
    <text x="25" y="59" text-anchor="middle" font-family="Consolas" font-size="15" fill="#1e40af">4</text>
    <text x="75" y="59" text-anchor="middle" font-family="Consolas" font-size="15" fill="#1e40af">5</text>
    <text x="125" y="59" text-anchor="middle" font-family="Consolas" font-size="15" fill="#1e40af">6</text>
    <text x="25" y="95" text-anchor="middle" font-family="Consolas" font-size="15" fill="#1e40af">7</text>
    <text x="75" y="95" text-anchor="middle" font-family="Consolas" font-size="15" fill="#1e40af">8</text>
    <text x="125" y="95" text-anchor="middle" font-family="Consolas" font-size="15" fill="#1e40af">9</text>
  </g>

  <text x="129" y="252" text-anchor="middle" font-size="12" fill="#475569">Row maxes: 3, 6, 9</text>
  <text x="129" y="270" text-anchor="middle" font-size="11" fill="#64748b">Subtract each row's max</text>

  <!-- Max arrow labels -->
  <text x="180" y="148" font-family="Consolas" font-size="11" font-weight="600" fill="#ef4444">← max=3</text>
  <text x="180" y="184" font-family="Consolas" font-size="11" font-weight="600" fill="#ef4444">← max=6</text>
  <text x="180" y="220" font-family="Consolas" font-size="11" font-weight="600" fill="#ef4444">← max=9</text>

  <!-- ===== MIDDLE: Without keepdims (WRONG) ===== -->
  <rect x="252" y="68" width="300" height="310" rx="14" fill="#fff" stroke="#fecaca" stroke-width="1.5"/>
  <text x="402" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#b91c1c">Without keepdims ✗</text>
  <text x="402" y="110" text-anchor="middle" font-size="11" fill="#64748b">np.max(a, axis=1) → shape (3,)</text>

  <!-- Max values shown as 1D row -->
  <g transform="translate(317,122)">
    <rect x="0" y="0" width="56" height="30" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="56" y="0" width="56" height="30" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="112" y="0" width="56" height="30" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="28" y="20" text-anchor="middle" font-family="Consolas" font-size="14" font-weight="700" fill="#b91c1c">3</text>
    <text x="84" y="20" text-anchor="middle" font-family="Consolas" font-size="14" font-weight="700" fill="#b91c1c">6</text>
    <text x="140" y="20" text-anchor="middle" font-family="Consolas" font-size="14" font-weight="700" fill="#b91c1c">9</text>
  </g>

  <!-- Animated red arrows going DOWN (column-wise stretch) -->
  <g opacity="0.8">
    <line x1="345" y1="155" x2="345" y2="155" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round">
      <animate attributeName="y2" values="155;190;155" dur="1.8s" repeatCount="indefinite"/>
    </line>
    <line x1="401" y1="155" x2="401" y2="155" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round">
      <animate attributeName="y2" values="155;190;155" dur="1.8s" begin="0.3s" repeatCount="indefinite"/>
    </line>
    <line x1="457" y1="155" x2="457" y2="155" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round">
      <animate attributeName="y2" values="155;190;155" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>
    </line>
  </g>

  <text x="402" y="206" text-anchor="middle" font-size="10" font-weight="600" fill="#b91c1c">Treated as (1x3) row, stretches ↓</text>

  <!-- Wrong result matrix -->
  <g transform="translate(322,216)">
    <rect x="0" y="0" width="54" height="30" rx="5" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
    <rect x="54" y="0" width="54" height="30" rx="5" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
    <rect x="108" y="0" width="54" height="30" rx="5" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
    <rect x="0" y="30" width="54" height="30" rx="5" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
    <rect x="54" y="30" width="54" height="30" rx="5" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
    <rect x="108" y="30" width="54" height="30" rx="5" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
    <rect x="0" y="60" width="54" height="30" rx="5" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
    <rect x="54" y="60" width="54" height="30" rx="5" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
    <rect x="108" y="60" width="54" height="30" rx="5" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
    <text x="27" y="20" text-anchor="middle" font-family="Consolas" font-size="13" fill="#b91c1c">-2</text>
    <text x="81" y="20" text-anchor="middle" font-family="Consolas" font-size="13" fill="#b91c1c">-4</text>
    <text x="135" y="20" text-anchor="middle" font-family="Consolas" font-size="13" fill="#b91c1c">-6</text>
    <text x="27" y="50" text-anchor="middle" font-family="Consolas" font-size="13" fill="#b91c1c">1</text>
    <text x="81" y="50" text-anchor="middle" font-family="Consolas" font-size="13" fill="#b91c1c">-1</text>
    <text x="135" y="50" text-anchor="middle" font-family="Consolas" font-size="13" fill="#b91c1c">-3</text>
    <text x="27" y="80" text-anchor="middle" font-family="Consolas" font-size="13" fill="#b91c1c">4</text>
    <text x="81" y="80" text-anchor="middle" font-family="Consolas" font-size="13" fill="#b91c1c">2</text>
    <text x="135" y="80" text-anchor="middle" font-family="Consolas" font-size="13" fill="#b91c1c">0</text>
  </g>

  <text x="402" y="322" text-anchor="middle" font-size="11" font-weight="600" fill="#b91c1c">Each column got a different max!</text>
  <text x="402" y="340" text-anchor="middle" font-size="10" fill="#991b1b">Col 1 − 3, Col 2 − 6, Col 3 − 9</text>

  <!-- ===== RIGHT: With keepdims (CORRECT) ===== -->
  <rect x="570" y="68" width="310" height="310" rx="14" fill="#fff" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="725" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">With keepdims=True ✓</text>
  <text x="725" y="110" text-anchor="middle" font-size="11" fill="#64748b">np.max(a, axis=1, keepdims=True) → shape (3,1)</text>

  <!-- Max values shown as column vector -->
  <g transform="translate(596,122)">
    <rect x="0" y="0" width="40" height="30" rx="6" fill="#dcfce7" stroke="#10b981" stroke-width="1.5"/>
    <rect x="0" y="30" width="40" height="30" rx="6" fill="#dcfce7" stroke="#10b981" stroke-width="1.5"/>
    <rect x="0" y="60" width="40" height="30" rx="6" fill="#dcfce7" stroke="#10b981" stroke-width="1.5"/>
    <text x="20" y="20" text-anchor="middle" font-family="Consolas" font-size="14" font-weight="700" fill="#047857">3</text>
    <text x="20" y="50" text-anchor="middle" font-family="Consolas" font-size="14" font-weight="700" fill="#047857">6</text>
    <text x="20" y="80" text-anchor="middle" font-family="Consolas" font-size="14" font-weight="700" fill="#047857">9</text>
  </g>

  <!-- Animated green arrows going RIGHT (row-wise stretch) -->
  <g opacity="0.8">
    <line x1="640" y1="137" x2="640" y2="137" stroke="#10b981" stroke-width="2.5" stroke-linecap="round">
      <animate attributeName="x2" values="640;700;640" dur="1.8s" repeatCount="indefinite"/>
    </line>
    <line x1="640" y1="167" x2="640" y2="167" stroke="#10b981" stroke-width="2.5" stroke-linecap="round">
      <animate attributeName="x2" values="640;700;640" dur="1.8s" begin="0.3s" repeatCount="indefinite"/>
    </line>
    <line x1="640" y1="197" x2="640" y2="197" stroke="#10b981" stroke-width="2.5" stroke-linecap="round">
      <animate attributeName="x2" values="640;700;640" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>
    </line>
  </g>

  <text x="725" y="206" text-anchor="middle" font-size="10" font-weight="600" fill="#047857">Shape (3,1) column, stretches →</text>

  <!-- Correct result matrix -->
  <g transform="translate(640,216)">
    <rect x="0" y="0" width="54" height="30" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
    <rect x="54" y="0" width="54" height="30" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
    <rect x="108" y="0" width="54" height="30" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
    <rect x="0" y="30" width="54" height="30" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
    <rect x="54" y="30" width="54" height="30" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
    <rect x="108" y="30" width="54" height="30" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
    <rect x="0" y="60" width="54" height="30" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
    <rect x="54" y="60" width="54" height="30" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
    <rect x="108" y="60" width="54" height="30" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
    <text x="27" y="20" text-anchor="middle" font-family="Consolas" font-size="13" fill="#047857">-2</text>
    <text x="81" y="20" text-anchor="middle" font-family="Consolas" font-size="13" fill="#047857">-1</text>
    <text x="135" y="20" text-anchor="middle" font-family="Consolas" font-size="13" fill="#047857">0</text>
    <text x="27" y="50" text-anchor="middle" font-family="Consolas" font-size="13" fill="#047857">-2</text>
    <text x="81" y="50" text-anchor="middle" font-family="Consolas" font-size="13" fill="#047857">-1</text>
    <text x="135" y="50" text-anchor="middle" font-family="Consolas" font-size="13" fill="#047857">0</text>
    <text x="27" y="80" text-anchor="middle" font-family="Consolas" font-size="13" fill="#047857">-2</text>
    <text x="81" y="80" text-anchor="middle" font-family="Consolas" font-size="13" fill="#047857">-1</text>
    <text x="135" y="80" text-anchor="middle" font-family="Consolas" font-size="13" fill="#047857">0</text>
  </g>

  <text x="725" y="322" text-anchor="middle" font-size="11" font-weight="600" fill="#047857">Each row got its own max!</text>
  <text x="725" y="340" text-anchor="middle" font-size="10" fill="#065f46">Row 1 − 3, Row 2 − 6, Row 3 − 9</text>

  <!-- Bottom takeaway -->
  <rect x="80" y="370" width="740" height="24" rx="10" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="450" y="387" text-anchor="middle" font-size="11" fill="#334155">Shape (3,) aligns as (1x3) row. keepdims=True gives (3,1) column — broadcasting goes the right way.</text>
</svg>
