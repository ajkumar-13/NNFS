  <g transform="translate(230,264)">
    <rect width="55" height="26" fill="#e0e7ff" stroke="#6366f1" stroke-width="1" rx="3"/>
    <text x="28" y="18" text-anchor="middle" font-family="Consolas" font-size="12" fill="#4338ca">3</text>
    <rect width="55" y="28" height="26" fill="#d1fae5" stroke="#10b981" stroke-width="1" rx="3"/>
    <text x="28" y="46" text-anchor="middle" font-family="Consolas" font-size="12" fill="#047857">6</text>
