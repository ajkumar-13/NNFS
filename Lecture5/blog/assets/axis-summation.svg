    <text x="25" y="20" text-anchor="middle" font-family="Consolas" font-size="14" fill="#4338ca">1</text>
    <text x="77" y="20" text-anchor="middle" font-family="Consolas" font-size="14" fill="#4338ca">2</text>
    <text x="129" y="20" text-anchor="middle" font-family="Consolas" font-size="14" fill="#4338ca">3</text>
    <text x="25" y="52" text-anchor="middle" font-family="Consolas" font-size="14" fill="#047857">4</text>
    <text x="77" y="52" text-anchor="middle" font-family="Consolas" font-size="14" fill="#047857">5</text>
    <text x="129" y="52" text-anchor="middle" font-family="Consolas" font-size="14" fill="#047857">6</text>
    <text x="25" y="84" text-anchor="middle" font-family="Consolas" font-size="14" fill="#b45309">7</text>
