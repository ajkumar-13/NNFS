<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#fafafa" rx="16"/>

  <text x="400" y="30" text-anchor="middle" font-family="Segoe UI" font-size="18" font-weight="bold" fill="#1e293b">np.sum() — axis=0 vs axis=1</text>

