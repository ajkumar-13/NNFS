    <rect width="55" y="56" height="26" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" rx="3"/>
    <text x="28" y="74" text-anchor="middle" font-family="Consolas" font-size="12" fill="#b45309">8</text>
    <text x="28" y="96" text-anchor="middle" font-family="Consolas" font-weight="bold" font-size="13" fill="#1e293b">= 15</text>
