    <text x="21" y="20" text-anchor="middle" font-family="Consolas" font-size="12" fill="#4338ca">1</text>
    <rect x="44" width="42" height="30" fill="#e0e7ff" stroke="#6366f1" stroke-width="1" rx="3"/>
    <text x="65" y="20" text-anchor="middle" font-family="Consolas" font-size="12" fill="#4338ca">2</text>
    <rect x="88" width="42" height="30" fill="#e0e7ff" stroke="#6366f1" stroke-width="1" rx="3"/>
    <text x="109" y="20" text-anchor="middle" font-family="Consolas" font-size="12" fill="#4338ca">3</text>
    <text x="155" y="20" text-anchor="middle" font-family="Consolas" font-weight="bold" font-size="13" fill="#1e293b">= 6</text>
  </g>
  <g transform="translate(450,302)">
    <rect width="42" height="30" fill="#d1fae5" stroke="#10b981" stroke-width="1" rx="3"/>
    <text x="21" y="20" text-anchor="middle" font-family="Consolas" font-size="12" fill="#047857">4</text>
    <rect x="44" width="42" height="30" fill="#d1fae5" stroke="#10b981" stroke-width="1" rx="3"/>
    <text x="65" y="20" text-anchor="middle" font-family="Consolas" font-size="12" fill="#047857">5</text>
    <rect x="88" width="42" height="30" fill="#d1fae5" stroke="#10b981" stroke-width="1" rx="3"/>
    <text x="109" y="20" text-anchor="middle" font-family="Consolas" font-size="12" fill="#047857">6</text>
    <text x="155" y="20" text-anchor="middle" font-family="Consolas" font-weight="bold" font-size="13" fill="#1e293b">= 15</text>
  </g>
  <g transform="translate(450,336)">
    <rect width="42" height="30" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" rx="3"/>
    <text x="21" y="20" text-anchor="middle" font-family="Consolas" font-size="12" fill="#b45309">7</text>
    <rect x="44" width="42" height="30" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" rx="3"/>
    <text x="65" y="20" text-anchor="middle" font-family="Consolas" font-size="12" fill="#b45309">8</text>
    <rect x="88" width="42" height="30" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" rx="3"/>
    <text x="109" y="20" text-anchor="middle" font-family="Consolas" font-size="12" fill="#b45309">9</text>
    <text x="155" y="20" text-anchor="middle" font-family="Consolas" font-weight="bold" font-size="13" fill="#1e293b">= 24</text>
