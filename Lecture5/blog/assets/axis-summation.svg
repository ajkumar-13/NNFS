  <rect x="420" y="200" width="350" height="180" rx="12" fill="#fefce8" stroke="#facc15" stroke-width="1.5"/>
  <text x="595" y="225" text-anchor="middle" font-family="Consolas" font-weight="bold" font-size="14" fill="#a16207">axis=1 → Sum columns →</text>

  <text x="595" y="252" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#64748b">"Collapse columns together"</text>

