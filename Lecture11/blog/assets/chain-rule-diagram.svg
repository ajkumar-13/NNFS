<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380">
  <defs>
    <marker id="crArr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#6366f1"/>
    </marker>
  </defs>
  <rect width="700" height="380" rx="16" fill="#fafafa"/>
  <text x="350" y="30" text-anchor="middle" font-family="Segoe UI" font-size="17" font-weight="700" fill="#1e1e2e">The Chain Rule: Derivatives Through Composed Functions</text>

  <!-- Chain: x → g → z → f → y -->
  <rect x="40" y="60" width="80" height="50" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="80" y="82" text-anchor="middle" font-family="Consolas" font-size="16" font-weight="700" fill="#3730a3">x</text>
  <text x="80" y="100" text-anchor="middle" font-family="Segoe UI" font-size="9" fill="#64748b">input</text>

  <line x1="124" y1="85" x2="172" y2="85" stroke="#6366f1" stroke-width="2" marker-end="url(#crArr)"/>

  <rect x="180" y="60" width="120" height="50" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="240" y="82" text-anchor="middle" font-family="Consolas" font-size="14" font-weight="700" fill="#92400e">g(x)</text>
  <text x="240" y="100" text-anchor="middle" font-family="Segoe UI" font-size="9" fill="#92400e">inner function</text>

  <line x1="304" y1="85" x2="352" y2="85" stroke="#6366f1" stroke-width="2" marker-end="url(#crArr)"/>
  <text x="328" y="78" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#64748b">z</text>

  <rect x="360" y="60" width="120" height="50" rx="10" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="420" y="82" text-anchor="middle" font-family="Consolas" font-size="14" font-weight="700" fill="#065f46">f(z)</text>
  <text x="420" y="100" text-anchor="middle" font-family="Segoe UI" font-size="9" fill="#065f46">outer function</text>

  <line x1="484" y1="85" x2="532" y2="85" stroke="#6366f1" stroke-width="2" marker-end="url(#crArr)"/>

  <rect x="540" y="60" width="80" height="50" rx="10" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="580" y="82" text-anchor="middle" font-family="Consolas" font-size="16" font-weight="700" fill="#9d174d">y</text>
  <text x="580" y="100" text-anchor="middle" font-family="Segoe UI" font-size="9" fill="#64748b">output</text>

  <!-- Combined -->
  <text x="350" y="140" text-anchor="middle" font-family="Consolas" font-size="14" fill="#64748b">y = f(g(x))</text>

  <!-- The rule -->
  <rect x="100" y="160" width="500" height="54" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="350" y="184" text-anchor="middle" font-family="Consolas" font-size="16" fill="#3730a3">dy/dx = f'(z) · g'(x)</text>
  <text x="350" y="204" text-anchor="middle" font-family="Consolas" font-size="12" fill="#64748b">       = f'(g(x)) · g'(x)</text>

  <!-- Annotations -->
  <line x1="248" y1="186" x2="248" y2="230" stroke="#10b981" stroke-width="1.5" stroke-dasharray="3,3"/>
  <rect x="168" y="230" width="160" height="30" rx="8" fill="#d1fae5" stroke="#10b981"/>
  <text x="248" y="250" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#065f46">outer derivative</text>

  <line x1="438" y1="186" x2="438" y2="230" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="3,3"/>
  <rect x="358" y="230" width="160" height="30" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="438" y="250" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#92400e">inner derivative</text>

  <!-- Extended chain rule -->
  <rect x="40" y="280" width="620" height="80" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="350" y="304" text-anchor="middle" font-family="Segoe UI" font-size="13" font-weight="700" fill="#1e1e2e">Extended Chain Rule (many layers)</text>
  <text x="350" y="328" text-anchor="middle" font-family="Consolas" font-size="13" fill="#64748b">d/dx f(g(h(m(x)))) = f' · g' · h' · m'</text>
  <text x="350" y="348" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#6366f1">Each layer contributes its local derivative, they all multiply together</text>
</svg>