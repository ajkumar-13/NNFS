<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="Segoe UI, Arial, sans-serif">

  <rect width="900" height="380" rx="20" fill="#fafafa"/>

  <text x="450" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Chain Rule as Gradient Flow</text>
  <text x="450" y="56" text-anchor="middle" font-size="12" fill="#64748b">Forward computes values. Backward multiplies local derivatives in reverse order.</text>

  <rect x="70" y="88" width="760" height="70" rx="16" fill="#ffffff" stroke="#dbeafe" stroke-width="1.5"/>
  <text x="140" y="116" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">Forward</text>
  <text x="140" y="134" text-anchor="middle" font-size="11" fill="#64748b">values move right</text>
  <line x1="200" y1="124" x2="700" y2="124" stroke="#94a3b8" stroke-width="3"/>
  <circle cx="250" cy="124" r="26" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="430" cy="124" r="26" fill="#dcfce7" stroke="#10b981" stroke-width="2"/>
  <circle cx="610" cy="124" r="26" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="250" y="130" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8">x</text>
  <text x="430" y="130" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">z</text>
  <text x="610" y="130" text-anchor="middle" font-size="15" font-weight="700" fill="#92400e">a</text>
  <circle r="7" fill="#2563eb">
    <animateMotion dur="5s" repeatCount="indefinite" path="M250 124 L430 124 L610 124 L700 124"/>
  </circle>

  <rect x="70" y="190" width="760" height="86" rx="16" fill="#ffffff" stroke="#fee2e2" stroke-width="1.5"/>
  <text x="150" y="218" text-anchor="middle" font-size="13" font-weight="700" fill="#c2410c">Backward</text>
  <text x="150" y="236" text-anchor="middle" font-size="11" fill="#64748b">gradients move left</text>
  <line x1="700" y1="232" x2="200" y2="232" stroke="#f97316" stroke-width="3" stroke-dasharray="8 6"/>
  <circle cx="700" cy="232" r="24" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="700" y="238" text-anchor="middle" font-size="14" font-weight="700" fill="#b91c1c">L</text>
  <rect x="510" y="212" width="96" height="40" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="558" y="237" text-anchor="middle" font-size="12" font-weight="700" fill="#c2410c">dL/da</text>
  <rect x="330" y="212" width="96" height="40" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="378" y="237" text-anchor="middle" font-size="12" font-weight="700" fill="#c2410c">da/dz</text>
  <rect x="150" y="212" width="96" height="40" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="198" y="237" text-anchor="middle" font-size="12" font-weight="700" fill="#c2410c">dz/dx</text>
  <circle r="7" fill="#ea580c">
    <animateMotion dur="5s" begin="2.5s" repeatCount="indefinite" path="M700 232 L558 232 L378 232 L198 232"/>
  </circle>

  <rect x="160" y="304" width="580" height="42" rx="14" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="450" y="330" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">dL/dx = (dL/da) x (da/dz) x (dz/dx)</text>
  <text x="450" y="362" text-anchor="middle" font-size="11" fill="#64748b">Each block contributes one local derivative. Backpropagation multiplies them into one upstream signal.</text>
</svg>