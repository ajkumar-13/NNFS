<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#fafafa" rx="16"/>

  <text x="400" y="32" text-anchor="middle" font-family="Segoe UI" font-size="18" font-weight="bold" fill="#1e293b">Multi-Layer Architecture: Input(4) → Hidden₁(3) → Hidden₂(3)</text>

  <!-- Input Layer -->
  <text x="100" y="70" text-anchor="middle" font-family="Segoe UI" font-size="13" font-weight="600" fill="#6366f1">Input Layer</text>
  <circle cx="100" cy="110" r="22" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="100" y="115" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#6366f1">x₁</text>
  <circle cx="100" cy="170" r="22" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="100" y="175" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#6366f1">x₂</text>
  <circle cx="100" cy="230" r="22" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="100" y="235" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#6366f1">x₃</text>
  <circle cx="100" cy="290" r="22" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="100" y="295" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#6366f1">x₄</text>

  <!-- Hidden Layer 1 -->
  <text x="370" y="70" text-anchor="middle" font-family="Segoe UI" font-size="13" font-weight="600" fill="#10b981">Hidden Layer 1</text>
  <circle cx="370" cy="140" r="26" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="370" y="145" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#047857">h₁</text>
  <circle cx="370" cy="210" r="26" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="370" y="215" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#047857">h₂</text>
  <circle cx="370" cy="280" r="26" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="370" y="285" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#047857">h₃</text>

  <!-- Hidden Layer 2 -->
  <text x="640" y="70" text-anchor="middle" font-family="Segoe UI" font-size="13" font-weight="600" fill="#f59e0b">Hidden Layer 2</text>
  <circle cx="640" cy="140" r="26" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="640" y="145" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#b45309">o₁</text>
  <circle cx="640" cy="210" r="26" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="640" y="215" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#b45309">o₂</text>
  <circle cx="640" cy="280" r="26" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="640" y="285" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#b45309">o₃</text>

  <!-- Connections Input → Hidden 1 -->
  <g stroke="#a5b4fc" stroke-width="1" opacity="0.5">
    <line x1="122" y1="110" x2="344" y2="140"/>
    <line x1="122" y1="110" x2="344" y2="210"/>
    <line x1="122" y1="110" x2="344" y2="280"/>
    <line x1="122" y1="170" x2="344" y2="140"/>
    <line x1="122" y1="170" x2="344" y2="210"/>
    <line x1="122" y1="170" x2="344" y2="280"/>
    <line x1="122" y1="230" x2="344" y2="140"/>
    <line x1="122" y1="230" x2="344" y2="210"/>
    <line x1="122" y1="230" x2="344" y2="280"/>
    <line x1="122" y1="290" x2="344" y2="140"/>
    <line x1="122" y1="290" x2="344" y2="210"/>
    <line x1="122" y1="290" x2="344" y2="280"/>
  </g>

  <!-- Connections Hidden 1 → Hidden 2 -->
  <g stroke="#6ee7b7" stroke-width="1" opacity="0.5">
    <line x1="396" y1="140" x2="614" y2="140"/>
    <line x1="396" y1="140" x2="614" y2="210"/>
    <line x1="396" y1="140" x2="614" y2="280"/>
    <line x1="396" y1="210" x2="614" y2="140"/>
    <line x1="396" y1="210" x2="614" y2="210"/>
    <line x1="396" y1="210" x2="614" y2="280"/>
    <line x1="396" y1="280" x2="614" y2="140"/>
    <line x1="396" y1="280" x2="614" y2="210"/>
    <line x1="396" y1="280" x2="614" y2="280"/>
  </g>

  <!-- Dimension labels -->
  <rect x="175" y="335" width="120" height="38" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1"/>
  <text x="235" y="359" text-anchor="middle" font-family="Consolas" font-size="12" fill="#6366f1">W₁: (3×4)</text>

  <rect x="450" y="335" width="120" height="38" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="510" y="359" text-anchor="middle" font-family="Consolas" font-size="12" fill="#047857">W₂: (3×3)</text>

  <!-- Arrows indicating data flow -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
  <line x1="140" y1="375" x2="330" y2="375" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="410" y1="375" x2="600" y2="375" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="235" y="393" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#64748b">np.dot(X, W₁ᵀ) + b₁</text>
  <text x="505" y="393" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#64748b">np.dot(F₁, W₂ᵀ) + b₂</text>
</svg>