<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320">
  <rect width="800" height="320" fill="#fafafa" rx="16"/>

  <text x="400" y="30" text-anchor="middle" font-family="Segoe UI" font-size="18" font-weight="bold" fill="#1e293b">Forward Pass: Dimension Flow Through Layers</text>

  <!-- X Box -->
  <rect x="30" y="80" width="100" height="80" rx="10" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="80" y="115" text-anchor="middle" font-family="Segoe UI" font-weight="bold" font-size="16" fill="#6366f1">X</text>
  <text x="80" y="140" text-anchor="middle" font-family="Consolas" font-size="13" fill="#4f46e5">(3 × 4)</text>

  <!-- Arrow 1 -->
  <line x1="130" y1="120" x2="170" y2="120" stroke="#64748b" stroke-width="2" marker-end="url(#fparrow)"/>

  <!-- dot W1T box -->
  <rect x="170" y="65" width="130" height="110" rx="10" fill="#f0fdf4" stroke="#10b981" stroke-width="2"/>
  <text x="235" y="95" text-anchor="middle" font-family="Consolas" font-size="12" fill="#047857">np.dot(X, W₁ᵀ)</text>
  <text x="235" y="115" text-anchor="middle" font-family="Consolas" font-size="11" fill="#047857">(3×4)·(4×3)</text>
  <text x="235" y="140" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#047857">+ b₁ (3,)</text>
  <text x="235" y="162" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#64748b">= Layer 1</text>

  <!-- Arrow 2 -->
  <line x1="300" y1="120" x2="340" y2="120" stroke="#64748b" stroke-width="2" marker-end="url(#fparrow)"/>

  <!-- F1 Box -->
  <rect x="340" y="80" width="100" height="80" rx="10" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="390" y="115" text-anchor="middle" font-family="Segoe UI" font-weight="bold" font-size="16" fill="#10b981">F₁</text>
  <text x="390" y="140" text-anchor="middle" font-family="Consolas" font-size="13" fill="#047857">(3 × 3)</text>

  <!-- Arrow 3 -->
  <line x1="440" y1="120" x2="480" y2="120" stroke="#64748b" stroke-width="2" marker-end="url(#fparrow)"/>

  <!-- dot W2T box -->
  <rect x="480" y="65" width="130" height="110" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <text x="545" y="95" text-anchor="middle" font-family="Consolas" font-size="12" fill="#b45309">np.dot(F₁, W₂ᵀ)</text>
  <text x="545" y="115" text-anchor="middle" font-family="Consolas" font-size="11" fill="#b45309">(3×3)·(3×3)</text>
  <text x="545" y="140" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#b45309">+ b₂ (3,)</text>
  <text x="545" y="162" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#64748b">= Layer 2</text>

  <!-- Arrow 4 -->
  <line x1="610" y1="120" x2="650" y2="120" stroke="#64748b" stroke-width="2" marker-end="url(#fparrow)"/>

  <!-- F2 Box -->
  <rect x="650" y="80" width="100" height="80" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="700" y="115" text-anchor="middle" font-family="Segoe UI" font-weight="bold" font-size="16" fill="#f59e0b">F₂</text>
  <text x="700" y="140" text-anchor="middle" font-family="Consolas" font-size="13" fill="#b45309">(3 × 3)</text>

  <!-- General formula -->
  <rect x="120" y="220" width="560" height="70" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="400" y="248" text-anchor="middle" font-family="Segoe UI" font-weight="bold" font-size="14" fill="#1e293b">General Pattern for Any Layer n:</text>
  <text x="400" y="273" text-anchor="middle" font-family="Consolas" font-size="14" fill="#6366f1">Fₙ = np.dot(Fₙ₋₁, Wₙᵀ) + bₙ</text>

  <defs>
    <marker id="fparrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
</svg>