<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <rect width="800" height="300" fill="#fafafa" rx="16"/>

  <text x="400" y="30" text-anchor="middle" font-family="Segoe UI" font-size="18" font-weight="bold" fill="#1e293b">Dimension Matching Across Layers</text>

  <!-- Layer Input -->
  <rect x="30" y="70" width="140" height="50" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="100" y="100" text-anchor="middle" font-family="Consolas" font-size="14" fill="#6366f1">X: (3 × 4)</text>

  <!-- W1 -->
  <rect x="210" y="55" width="120" height="35" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="270" y="78" text-anchor="middle" font-family="Consolas" font-size="12" fill="#047857">W₁: (3 × 4)</text>
  <rect x="210" y="93" width="120" height="30" rx="6" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5"/>
  <text x="270" y="113" text-anchor="middle" font-family="Consolas" font-size="12" fill="#047857">W₁ᵀ: (4 × 3)</text>

  <!-- F1 result -->
  <rect x="370" y="70" width="140" height="50" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="440" y="100" text-anchor="middle" font-family="Consolas" font-size="14" fill="#047857">F₁: (3 × 3)</text>

  <!-- W2 -->
  <rect x="550" y="55" width="120" height="35" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="610" y="78" text-anchor="middle" font-family="Consolas" font-size="12" fill="#b45309">W₂: (3 × 3)</text>
  <rect x="550" y="93" width="120" height="30" rx="6" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="610" y="113" text-anchor="middle" font-family="Consolas" font-size="12" fill="#b45309">W₂ᵀ: (3 × 3)</text>

  <!-- F2 result -->
  <rect x="710" y="70" width="70" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="745" y="100" text-anchor="middle" font-family="Consolas" font-size="13" fill="#b45309">(3×3)</text>

  <!-- Arrows -->
  <defs>
    <marker id="darrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
  <line x1="170" y1="95" x2="207" y2="95" stroke="#64748b" stroke-width="2" marker-end="url(#darrow)"/>
  <line x1="333" y1="95" x2="367" y2="95" stroke="#64748b" stroke-width="2" marker-end="url(#darrow)"/>
  <line x1="510" y1="95" x2="547" y2="95" stroke="#64748b" stroke-width="2" marker-end="url(#darrow)"/>
  <line x1="673" y1="95" x2="707" y2="95" stroke="#64748b" stroke-width="2" marker-end="url(#darrow)"/>

  <!-- Dimension check annotations -->
  <rect x="60" y="160" width="320" height="120" rx="10" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5"/>
  <text x="220" y="185" text-anchor="middle" font-family="Segoe UI" font-weight="bold" font-size="13" fill="#047857">Layer 1 Dimension Check</text>
  <text x="220" y="210" text-anchor="middle" font-family="Consolas" font-size="13" fill="#374151">X · W₁ᵀ = (3×4)·(4×3) = (3×3) ✓</text>
  <text x="220" y="235" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#64748b">Inner dims: 4 = 4 → match!</text>
  <text x="220" y="258" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#64748b">Result: 3 batches × 3 neurons</text>

  <rect x="420" y="160" width="320" height="120" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="580" y="185" text-anchor="middle" font-family="Segoe UI" font-weight="bold" font-size="13" fill="#b45309">Layer 2 Dimension Check</text>
  <text x="580" y="210" text-anchor="middle" font-family="Consolas" font-size="13" fill="#374151">F₁ · W₂ᵀ = (3×3)·(3×3) = (3×3) ✓</text>
  <text x="580" y="235" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#64748b">Inner dims: 3 = 3 → match!</text>
  <text x="580" y="258" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#64748b">Result: 3 batches × 3 neurons</text>
</svg>