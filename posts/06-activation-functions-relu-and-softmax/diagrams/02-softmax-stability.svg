<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" role="img" aria-labelledby="t d">
  <title id="t">Softmax stability: subtracting the per-row max keeps every exponent safe</title>
  <desc id="d">Two side-by-side worked examples comparing the naive softmax formula and the numerically stable version that subtracts the per-row max before exponentiating. The left panel uses the raw logits 1000, 1001, 999 and shows that the exponentials overflow to infinity, producing nan probabilities. The right panel subtracts the maximum 1001 from each logit, giving -1, 0, -2, whose exponentials are tiny safe numbers; the resulting probabilities 0.245, 0.665, 0.090 are correct and unchanged from what the mathematics says. A bottom band shows the algebraic identity proving the two formulas are equivalent.</desc>

  <style><![CDATA[
    :root{
      --ce-bg:#FAFAF7;--ce-surface:#FFFFFF;--ce-ink:#1A1A1A;--ce-ink-muted:#5C5C5C;--ce-ink-subtle:#9A9A9A;
      --ce-border:#D9D9D4;--ce-primary:#5B7FBF;--ce-accent:#D98E5F;
      --ce-success:#5C9E78;--ce-warn:#B8895A;--ce-alert:#C66B5E;--ce-neutral-1:#EAEAE4;
    }
    @media (prefers-color-scheme: dark){
      :root{
        --ce-bg:#0E0F12;--ce-surface:#16181C;--ce-ink:#F2F2EE;--ce-ink-muted:#B4B4AE;--ce-ink-subtle:#6E6E68;
        --ce-border:#2A2D33;--ce-primary:#8BA8E0;--ce-accent:#E8B088;
        --ce-success:#7FBF9B;--ce-warn:#D4B58A;--ce-alert:#D88880;--ce-neutral-1:#1F2229;
      }
    }
    text{font-family:Inter,system-ui,sans-serif;}
    .mono{font-family:"JetBrains Mono",ui-monospace,monospace;font-size:12px;fill:var(--ce-ink);}
    .bg{fill:var(--ce-bg);}
    .title{font-weight:600;font-size:22px;fill:var(--ce-ink);}
    .subtitle{font-size:13px;fill:var(--ce-ink-muted);}
    .footer{font-size:11px;fill:var(--ce-ink-subtle);}
    .panel-bad{fill:var(--ce-alert);fill-opacity:0.06;stroke:var(--ce-alert);stroke-width:1.5;}
    .panel-ok {fill:var(--ce-success);fill-opacity:0.07;stroke:var(--ce-success);stroke-width:1.5;}
    .pill-bad{fill:var(--ce-alert);}
    .pill-ok {fill:var(--ce-success);}
    .head-bad{font-weight:700;font-size:15px;fill:var(--ce-alert);}
    .head-ok{font-weight:700;font-size:15px;fill:var(--ce-success);}
    .panel-sub{font-size:11px;fill:var(--ce-ink-muted);}
    .row-label{font-weight:600;font-size:11px;fill:var(--ce-ink-muted);text-transform:uppercase;letter-spacing:0.06em;}
    .cell-base{fill:var(--ce-neutral-1);stroke:var(--ce-border);stroke-width:1;}
    .cell-bad{fill:var(--ce-alert);fill-opacity:0.20;stroke:var(--ce-alert);stroke-width:1.2;}
    .cell-ok{fill:var(--ce-success);fill-opacity:0.20;stroke:var(--ce-success);stroke-width:1.2;}
    .cell-num{font-family:"JetBrains Mono",ui-monospace,monospace;font-size:12px;font-weight:600;fill:var(--ce-ink);}
    .arrow{stroke:var(--ce-ink-muted);stroke-width:1.5;fill:none;}
    .arrow-head{fill:var(--ce-ink-muted);}
    .verdict-bad{font-size:13px;font-weight:700;fill:var(--ce-alert);}
    .verdict-ok{font-size:13px;font-weight:700;fill:var(--ce-success);}
    .identity-band{fill:var(--ce-primary);fill-opacity:0.08;stroke:var(--ce-primary);stroke-width:1.5;}
    .identity-head{font-weight:700;font-size:13px;fill:var(--ce-primary);}
    .identity-body{font-family:"JetBrains Mono",ui-monospace,monospace;font-size:13px;fill:var(--ce-ink);}
  ]]></style>

  <defs>
    <marker id="aM" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" class="arrow-head"/>
    </marker>
  </defs>

  <rect class="bg" width="960" height="480"/>

  <text class="title"    x="48" y="48">Softmax numerical stability</text>
  <text class="subtitle" x="48" y="70">Subtract the per-row max before exponentiating. Same probabilities, vastly safer arithmetic.</text>

  <!-- =============== LEFT PANEL: NAIVE =============== -->
  <rect class="panel-bad" x="48" y="96" width="424" height="240" rx="12"/>
  <rect class="pill-bad"  x="48" y="96" width="6"   height="240" rx="3"/>
  <text class="head-bad" x="68" y="124">Naive: exp(logits)</text>
  <text class="panel-sub" x="68" y="142">overflows for any logit above ~700</text>

  <!-- Logits row -->
  <text class="row-label" x="68" y="174">logits</text>
  <g transform="translate(160, 160)">
    <rect class="cell-base" x="0"   y="0" width="60" height="28"/>
    <rect class="cell-base" x="60"  y="0" width="60" height="28"/>
    <rect class="cell-base" x="120" y="0" width="60" height="28"/>
    <text class="cell-num" x="30"  y="19" text-anchor="middle">1000</text>
    <text class="cell-num" x="90"  y="19" text-anchor="middle">1001</text>
    <text class="cell-num" x="150" y="19" text-anchor="middle">999</text>
  </g>

  <line class="arrow" x1="250" y1="194" x2="250" y2="216" marker-end="url(#aM)"/>
  <text class="row-label" x="68" y="232">exp(·)</text>

  <g transform="translate(160, 220)">
    <rect class="cell-bad" x="0"   y="0" width="60" height="28"/>
    <rect class="cell-bad" x="60"  y="0" width="60" height="28"/>
    <rect class="cell-bad" x="120" y="0" width="60" height="28"/>
    <text class="cell-num" x="30"  y="19" text-anchor="middle">inf</text>
    <text class="cell-num" x="90"  y="19" text-anchor="middle">inf</text>
    <text class="cell-num" x="150" y="19" text-anchor="middle">inf</text>
  </g>

  <line class="arrow" x1="250" y1="252" x2="250" y2="276" marker-end="url(#aM)"/>
  <text class="row-label" x="68" y="292">softmax</text>

  <g transform="translate(160, 280)">
    <rect class="cell-bad" x="0"   y="0" width="60" height="28"/>
    <rect class="cell-bad" x="60"  y="0" width="60" height="28"/>
    <rect class="cell-bad" x="120" y="0" width="60" height="28"/>
    <text class="cell-num" x="30"  y="19" text-anchor="middle">nan</text>
    <text class="cell-num" x="90"  y="19" text-anchor="middle">nan</text>
    <text class="cell-num" x="150" y="19" text-anchor="middle">nan</text>
  </g>

  <text class="verdict-bad" x="68" y="362">inf / inf → nan. Training corrupts silently.</text>

  <!-- =============== RIGHT PANEL: STABLE =============== -->
  <rect class="panel-ok" x="488" y="96" width="424" height="240" rx="12"/>
  <rect class="pill-ok"  x="488" y="96" width="6"   height="240" rx="3"/>
  <text class="head-ok" x="508" y="124">Stable: exp(logits − max)</text>
  <text class="panel-sub" x="508" y="142">max = 1001; every exponent ≤ 0; every e^x ≤ 1</text>

  <text class="row-label" x="508" y="174">logits − max</text>
  <g transform="translate(600, 160)">
    <rect class="cell-base" x="0"   y="0" width="60" height="28"/>
    <rect class="cell-base" x="60"  y="0" width="60" height="28"/>
    <rect class="cell-base" x="120" y="0" width="60" height="28"/>
    <text class="cell-num" x="30"  y="19" text-anchor="middle">-1</text>
    <text class="cell-num" x="90"  y="19" text-anchor="middle">0</text>
    <text class="cell-num" x="150" y="19" text-anchor="middle">-2</text>
  </g>

  <line class="arrow" x1="690" y1="194" x2="690" y2="216" marker-end="url(#aM)"/>
  <text class="row-label" x="508" y="232">exp(·)</text>

  <g transform="translate(600, 220)">
    <rect class="cell-ok" x="0"   y="0" width="60" height="28"/>
    <rect class="cell-ok" x="60"  y="0" width="60" height="28"/>
    <rect class="cell-ok" x="120" y="0" width="60" height="28"/>
    <text class="cell-num" x="30"  y="19" text-anchor="middle">0.368</text>
    <text class="cell-num" x="90"  y="19" text-anchor="middle">1.000</text>
    <text class="cell-num" x="150" y="19" text-anchor="middle">0.135</text>
  </g>

  <line class="arrow" x1="690" y1="252" x2="690" y2="276" marker-end="url(#aM)"/>
  <text class="row-label" x="508" y="292">softmax</text>

  <g transform="translate(600, 280)">
    <rect class="cell-ok" x="0"   y="0" width="60" height="28"/>
    <rect class="cell-ok" x="60"  y="0" width="60" height="28"/>
    <rect class="cell-ok" x="120" y="0" width="60" height="28"/>
    <text class="cell-num" x="30"  y="19" text-anchor="middle">0.245</text>
    <text class="cell-num" x="90"  y="19" text-anchor="middle">0.665</text>
    <text class="cell-num" x="150" y="19" text-anchor="middle">0.090</text>
  </g>

  <text class="verdict-ok" x="508" y="362">Probabilities sum to 1.0 and are identical to the naive math.</text>

  <!-- =============== Identity band =============== -->
  <rect class="identity-band" x="48" y="380" width="864" height="76" rx="12"/>
  <text class="identity-head" x="68" y="406">Why this is the same formula:</text>
  <text class="identity-body" x="68" y="430">exp(oᵢ − c) / Σⱼ exp(oⱼ − c)  =  e^(−c) · exp(oᵢ)  /  e^(−c) · Σⱼ exp(oⱼ)  =  exp(oᵢ) / Σⱼ exp(oⱼ)</text>
</svg>
