<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="t d">
  <title id="t">Backpropagation through a layer of three neurons sharing four inputs</title>
  <desc id="d">A horizontal diagram of a single layer with four inputs and three neurons. The top portion shows the forward pass: inputs X1 through X4 enter each of three neurons (computing Z1, Z2, Z3) which pass through ReLU to give A1, A2, A3; these are summed into Y and squared into the loss L. The bottom portion shows the backward pass: a single upstream gradient 2Y = 43.2 is broadcast back into all three neurons; each neuron's ReLU gate (here all equal to 1) preserves the signal; the per-weight gradient becomes the upstream value times the corresponding input X_j. A side panel shows the resulting 12 weight gradients in a 3-by-4 table and the 3 bias gradients, all equal to 43.2.</desc>

  <style><![CDATA[
    :root{
      --ce-bg:#FAFAF7;--ce-surface:#FFFFFF;--ce-ink:#1A1A1A;--ce-ink-muted:#5C5C5C;--ce-ink-subtle:#9A9A9A;
      --ce-border:#D9D9D4;--ce-primary:#5B7FBF;--ce-accent:#D98E5F;
      --ce-success:#5C9E78;--ce-warn:#B8895A;--ce-alert:#C66B5E;--ce-neutral-1:#EAEAE4;
    }
    @media (prefers-color-scheme: dark){
      :root{
        --ce-bg:#0E0F12;--ce-surface:#16181C;--ce-ink:#F2F2EE;--ce-ink-muted:#B4B4AE;--ce-ink-subtle:#6E6E68;
        --ce-border:#2A2D33;--ce-primary:#8BA8E0;--ce-accent:#E8B088;
        --ce-success:#7FBF9B;--ce-warn:#D4B58A;--ce-alert:#D88880;--ce-neutral-1:#1F2229;
      }
    }
    text{font-family:Inter,system-ui,sans-serif;}
    .mono{font-family:"JetBrains Mono",ui-monospace,monospace;}
    .bg{fill:var(--ce-bg);}
    .title{font-weight:600;font-size:22px;fill:var(--ce-ink);}
    .subtitle{font-size:13px;fill:var(--ce-ink-muted);}
    .footer{font-size:11px;fill:var(--ce-ink-subtle);}
    .input-pill{fill:var(--ce-primary);fill-opacity:0.18;stroke:var(--ce-primary);stroke-width:1.5;}
    .var-name{font-weight:700;font-size:12px;fill:var(--ce-ink);font-family:"JetBrains Mono",ui-monospace,monospace;}
    .neuron-n1{fill:var(--ce-accent);fill-opacity:0.18;stroke:var(--ce-accent);stroke-width:1.5;}
    .neuron-n2{fill:var(--ce-success);fill-opacity:0.18;stroke:var(--ce-success);stroke-width:1.5;}
    .neuron-n3{fill:var(--ce-primary);fill-opacity:0.18;stroke:var(--ce-primary);stroke-width:1.5;}
    .neuron-text{font-family:"JetBrains Mono",ui-monospace,monospace;font-size:11px;font-weight:700;fill:var(--ce-ink);}
    .conn1{stroke:var(--ce-accent);stroke-width:1.1;fill:none;opacity:0.6;}
    .conn2{stroke:var(--ce-success);stroke-width:1.1;fill:none;opacity:0.6;}
    .conn3{stroke:var(--ce-primary);stroke-width:1.1;fill:none;opacity:0.6;}
    .merge-arrow{stroke:var(--ce-ink-muted);stroke-width:1.5;fill:none;}
    .arrow-head{fill:var(--ce-ink-muted);}
    .sum-box{fill:var(--ce-surface);stroke:var(--ce-ink);stroke-width:1.5;stroke-dasharray:5 3;}
    .op-name{font-weight:700;font-size:12px;fill:var(--ce-ink);font-family:"JetBrains Mono",ui-monospace,monospace;}
    .op-sub{font-size:10px;fill:var(--ce-ink-muted);}
    .out-pill{fill:var(--ce-success);fill-opacity:0.20;stroke:var(--ce-success);stroke-width:1.5;}
    .upstream-tag{font-family:"JetBrains Mono",ui-monospace,monospace;font-size:13px;font-weight:700;fill:var(--ce-alert);}
    .row-label{font-weight:700;font-size:12px;fill:var(--ce-ink-muted);text-transform:uppercase;letter-spacing:0.06em;}
    .grad-panel{fill:var(--ce-surface);stroke:var(--ce-border);stroke-width:1;}
    .grad-table-head{font-weight:700;font-size:11px;fill:var(--ce-ink-muted);text-transform:uppercase;letter-spacing:0.06em;}
    .grad-cell{fill:var(--ce-alert);fill-opacity:0.16;stroke:var(--ce-alert);stroke-width:1;}
    .grad-cell-text{font-family:"JetBrains Mono",ui-monospace,monospace;font-size:11px;font-weight:600;fill:var(--ce-ink);}
    .grad-info{font-size:11px;fill:var(--ce-ink-muted);}
  ]]></style>

  <defs>
    <marker id="aM" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" class="arrow-head"/>
    </marker>
  </defs>

  <rect class="bg" width="960" height="540"/>

  <text class="title"    x="48" y="48">Backprop through a layer of three neurons</text>
  <text class="subtitle" x="48" y="70">Forward (top): inputs fan into 3 neurons. Backward (bottom): one upstream gradient is shared by all 15 parameters.</text>

  <!-- ============================ FORWARD ROW ============================ -->
  <text class="row-label" x="48" y="110">forward (left to right)</text>

  <!-- Inputs column -->
  <circle class="input-pill" cx="80" cy="148" r="18"/>
  <text class="var-name" x="80" y="152" text-anchor="middle">X₁=1</text>
  <circle class="input-pill" cx="80" cy="200" r="18"/>
  <text class="var-name" x="80" y="204" text-anchor="middle">X₂=2</text>
  <circle class="input-pill" cx="80" cy="252" r="18"/>
  <text class="var-name" x="80" y="256" text-anchor="middle">X₃=3</text>
  <circle class="input-pill" cx="80" cy="304" r="18"/>
  <text class="var-name" x="80" y="308" text-anchor="middle">X₄=4</text>

  <!-- Three neurons stacked -->
  <circle class="neuron-n1" cx="260" cy="160" r="28"/>
  <text class="neuron-text" x="260" y="158" text-anchor="middle">Σ+b₁</text>
  <text class="neuron-text" x="260" y="174" text-anchor="middle">Z₁=3.0</text>

  <circle class="neuron-n2" cx="260" cy="226" r="28"/>
  <text class="neuron-text" x="260" y="224" text-anchor="middle">Σ+b₂</text>
  <text class="neuron-text" x="260" y="240" text-anchor="middle">Z₂=7.2</text>

  <circle class="neuron-n3" cx="260" cy="292" r="28"/>
  <text class="neuron-text" x="260" y="290" text-anchor="middle">Σ+b₃</text>
  <text class="neuron-text" x="260" y="306" text-anchor="middle">Z₃=11.4</text>

  <!-- Connections: 4 inputs × 3 neurons = 12 lines, colour-coded by neuron -->
  <g>
    <line class="conn1" x1="98" y1="148" x2="232" y2="155"/>
    <line class="conn1" x1="98" y1="200" x2="232" y2="158"/>
    <line class="conn1" x1="98" y1="252" x2="232" y2="162"/>
    <line class="conn1" x1="98" y1="304" x2="232" y2="166"/>

    <line class="conn2" x1="98" y1="148" x2="232" y2="218"/>
    <line class="conn2" x1="98" y1="200" x2="232" y2="223"/>
    <line class="conn2" x1="98" y1="252" x2="232" y2="228"/>
    <line class="conn2" x1="98" y1="304" x2="232" y2="234"/>

    <line class="conn3" x1="98" y1="148" x2="232" y2="280"/>
    <line class="conn3" x1="98" y1="200" x2="232" y2="285"/>
    <line class="conn3" x1="98" y1="252" x2="232" y2="290"/>
    <line class="conn3" x1="98" y1="304" x2="232" y2="298"/>
  </g>

  <!-- ReLU + A_k labels -->
  <text class="op-sub" x="312" y="156" text-anchor="start">→ ReLU → A₁=3.0</text>
  <text class="op-sub" x="312" y="222" text-anchor="start">→ ReLU → A₂=7.2</text>
  <text class="op-sub" x="312" y="288" text-anchor="start">→ ReLU → A₃=11.4</text>

  <!-- Sum to Y -->
  <rect class="sum-box" x="488" y="200" width="84" height="52" rx="10"/>
  <text class="op-name" x="530" y="222" text-anchor="middle">Σ</text>
  <text class="op-sub"  x="530" y="240" text-anchor="middle">Y = ΣA</text>

  <!-- arrows from each A_k into Σ -->
  <line class="merge-arrow" x1="450" y1="160" x2="486" y2="216" marker-end="url(#aM)"/>
  <line class="merge-arrow" x1="450" y1="226" x2="486" y2="226" marker-end="url(#aM)"/>
  <line class="merge-arrow" x1="450" y1="292" x2="486" y2="236" marker-end="url(#aM)"/>

  <line class="merge-arrow" x1="576" y1="226" x2="608" y2="226" marker-end="url(#aM)"/>

  <!-- Y → loss -->
  <circle class="out-pill" cx="640" cy="226" r="26"/>
  <text class="var-name" x="640" y="230" text-anchor="middle">Y=21.6</text>

  <line class="merge-arrow" x1="668" y1="226" x2="700" y2="226" marker-end="url(#aM)"/>

  <rect class="sum-box" x="704" y="200" width="80" height="52" rx="10"/>
  <text class="op-name" x="744" y="222" text-anchor="middle">(·)²</text>
  <text class="op-sub"  x="744" y="240" text-anchor="middle">squared</text>

  <line class="merge-arrow" x1="788" y1="226" x2="820" y2="226" marker-end="url(#aM)"/>

  <circle class="out-pill" cx="852" cy="226" r="32"/>
  <text class="var-name" x="852" y="230" text-anchor="middle">L=466.56</text>

  <!-- ============================ BACKWARD: upstream label ============================ -->
  <text class="row-label" x="48" y="370">backward — upstream gradient (broadcast across all neurons)</text>
  <text class="upstream-tag" x="48" y="396">∂L/∂Y = 2Y = 43.2  (shared by all three neurons)</text>

  <!-- ============================ Right-side gradient panel ============================ -->
  <rect class="grad-panel" x="624" y="280" width="288" height="232" rx="12"/>
  <text class="grad-table-head" x="640" y="304">per-weight gradients</text>
  <text class="grad-info" x="640" y="324">∂L/∂W_{kj} = 43.2 · X_j</text>

  <!-- 3x4 grid of gradient cells -->
  <g transform="translate(640, 336)">
    <rect class="grad-cell" x="0"   y="0" width="60" height="22"/>
    <rect class="grad-cell" x="60"  y="0" width="60" height="22"/>
    <rect class="grad-cell" x="120" y="0" width="60" height="22"/>
    <rect class="grad-cell" x="180" y="0" width="60" height="22"/>
    <rect class="grad-cell" x="0"   y="22" width="60" height="22"/>
    <rect class="grad-cell" x="60"  y="22" width="60" height="22"/>
    <rect class="grad-cell" x="120" y="22" width="60" height="22"/>
    <rect class="grad-cell" x="180" y="22" width="60" height="22"/>
    <rect class="grad-cell" x="0"   y="44" width="60" height="22"/>
    <rect class="grad-cell" x="60"  y="44" width="60" height="22"/>
    <rect class="grad-cell" x="120" y="44" width="60" height="22"/>
    <rect class="grad-cell" x="180" y="44" width="60" height="22"/>

    <text class="grad-cell-text" x="30"  y="15" text-anchor="middle">43.2</text>
    <text class="grad-cell-text" x="90"  y="15" text-anchor="middle">86.4</text>
    <text class="grad-cell-text" x="150" y="15" text-anchor="middle">129.6</text>
    <text class="grad-cell-text" x="210" y="15" text-anchor="middle">172.8</text>
    <text class="grad-cell-text" x="30"  y="37" text-anchor="middle">43.2</text>
    <text class="grad-cell-text" x="90"  y="37" text-anchor="middle">86.4</text>
    <text class="grad-cell-text" x="150" y="37" text-anchor="middle">129.6</text>
    <text class="grad-cell-text" x="210" y="37" text-anchor="middle">172.8</text>
    <text class="grad-cell-text" x="30"  y="59" text-anchor="middle">43.2</text>
    <text class="grad-cell-text" x="90"  y="59" text-anchor="middle">86.4</text>
    <text class="grad-cell-text" x="150" y="59" text-anchor="middle">129.6</text>
    <text class="grad-cell-text" x="210" y="59" text-anchor="middle">172.8</text>
  </g>

  <!-- Column headers -->
  <text class="grad-info" x="670" y="332" text-anchor="middle">j=1</text>
  <text class="grad-info" x="730" y="332" text-anchor="middle">j=2</text>
  <text class="grad-info" x="790" y="332" text-anchor="middle">j=3</text>
  <text class="grad-info" x="850" y="332" text-anchor="middle">j=4</text>

  <!-- Row labels (neurons) -->
  <text class="grad-info" x="635" y="352" text-anchor="end">k=1</text>
  <text class="grad-info" x="635" y="374" text-anchor="end">k=2</text>
  <text class="grad-info" x="635" y="396" text-anchor="end">k=3</text>

  <text class="grad-table-head" x="640" y="428">per-bias gradients</text>
  <text class="grad-cell-text" x="640" y="450" style="font-size:13px;fill:var(--ce-alert);">∂L/∂B₁ = ∂L/∂B₂ = ∂L/∂B₃ = 43.2</text>
  <text class="grad-info" x="640" y="472">(every gate is 1; gradient equals upstream)</text>

  <!-- ============================ Footer / left panel insights ============================ -->
  <text class="grad-info" x="48" y="436" style="font-size:12px;fill:var(--ce-ink);font-weight:600;">Per-weight rule: ∂L/∂W_{kj} = (upstream · gate_k) · X_j</text>
  <text class="grad-info" x="48" y="456">Same upstream for all weights · per-neuron ReLU gate · per-weight input.</text>
  <text class="grad-info" x="48" y="472">Here every gate is 1, so weights in the same column share the same gradient.</text>

  <!-- Footer -->
  <text class="footer" x="48"  y="520">12 weight gradients + 3 bias gradients = 15 numbers total, all derived from one upstream value.</text>
</svg>
