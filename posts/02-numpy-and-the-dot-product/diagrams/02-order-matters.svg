<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" role="img" aria-labelledby="t d">
  <title id="t">Order of arguments matters: np.dot(a, B) versus np.dot(B, a)</title>
  <desc id="d">Two side-by-side panels show the same 3-by-3 matrix B and the same length-3 vector a, but with the arguments to np.dot swapped between the two panels. The left panel, np.dot(a, B), treats a as a row vector that walks across the columns of B and produces the result vector 48, 54, 60. The right panel, np.dot(B, a), treats a as a column vector that walks down the rows of B and produces the result vector 32, 50, 68. The two results are different even though the inputs are the same; the matrix-vector dot product is not commutative.</desc>

  <style><![CDATA[
    :root{
      --ce-bg:#FAFAF7;--ce-surface:#FFFFFF;--ce-ink:#1A1A1A;--ce-ink-muted:#5C5C5C;--ce-ink-subtle:#9A9A9A;
      --ce-border:#D9D9D4;--ce-primary:#5B7FBF;--ce-accent:#D98E5F;
      --ce-success:#5C9E78;--ce-warn:#B8895A;--ce-alert:#C66B5E;--ce-neutral-1:#EAEAE4;
    }
    @media (prefers-color-scheme: dark){
      :root{
        --ce-bg:#0E0F12;--ce-surface:#16181C;--ce-ink:#F2F2EE;--ce-ink-muted:#B4B4AE;--ce-ink-subtle:#6E6E68;
        --ce-border:#2A2D33;--ce-primary:#8BA8E0;--ce-accent:#E8B088;
        --ce-success:#7FBF9B;--ce-warn:#D4B58A;--ce-alert:#D88880;--ce-neutral-1:#1F2229;
      }
    }
    text{font-family:Inter,system-ui,sans-serif;}
    .mono{font-family:"JetBrains Mono",ui-monospace,monospace;}
    .bg{fill:var(--ce-bg);}
    .title{font-weight:600;font-size:22px;fill:var(--ce-ink);}
    .subtitle{font-size:13px;fill:var(--ce-ink-muted);}
    .footer{font-size:11px;fill:var(--ce-ink-subtle);}
    .panel{fill:var(--ce-surface);stroke:var(--ce-border);stroke-width:1;}
    .pill-prim{fill:var(--ce-primary);}
    .pill-acc{fill:var(--ce-accent);}
    .panel-head{font-weight:700;font-size:15px;fill:var(--ce-ink);font-family:"JetBrains Mono",ui-monospace,monospace;}
    .panel-sub{font-size:11px;fill:var(--ce-ink-muted);}
    .a-cell{fill:var(--ce-primary);fill-opacity:0.14;stroke:var(--ce-primary);stroke-width:1;}
    .b-cell{fill:var(--ce-accent);fill-opacity:0.16;stroke:var(--ce-accent);stroke-width:1;}
    .out-cell{fill:var(--ce-success);fill-opacity:0.20;stroke:var(--ce-success);stroke-width:1.2;}
    .cell-num{font-family:"JetBrains Mono",ui-monospace,monospace;font-size:11px;fill:var(--ce-ink);font-weight:600;}
    .op{font-weight:700;font-size:18px;fill:var(--ce-ink);}
    .arrow-hint{stroke:var(--ce-primary);stroke-width:1.2;fill:none;}
    .arrow-hint-2{stroke:var(--ce-accent);stroke-width:1.2;fill:none;}
    .arrow-head-prim{fill:var(--ce-primary);}
    .arrow-head-acc{fill:var(--ce-accent);}
    .hint-text{font-size:11px;fill:var(--ce-ink-muted);}
    .hint-text-strong{font-size:12px;font-weight:600;fill:var(--ce-ink);}
  ]]></style>

  <defs>
    <marker id="aP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" class="arrow-head-prim"/>
    </marker>
    <marker id="aA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" class="arrow-head-acc"/>
    </marker>
  </defs>

  <rect class="bg" width="960" height="500"/>

  <!-- Header -->
  <text class="title"    x="48" y="48">Order matters once a matrix is in the call</text>
  <text class="subtitle" x="48" y="70">Same inputs, swapped order, different answers. np.dot is not commutative with matrices.</text>

  <!-- ====================== LEFT PANEL: np.dot(a, B) ====================== -->
  <rect class="panel"     x="48" y="96" width="424" height="320" rx="12"/>
  <rect class="pill-prim" x="48" y="96" width="6"   height="320" rx="3"/>
  <text class="panel-head" x="68" y="124">np.dot(a, B)</text>
  <text class="panel-sub"  x="68" y="142">a is a row; walk across columns of B</text>

  <!-- a as a row of 3 cells -->
  <g transform="translate(80, 188)">
    <rect class="a-cell" x="0"  y="0" width="32" height="32"/>
    <rect class="a-cell" x="32" y="0" width="32" height="32"/>
    <rect class="a-cell" x="64" y="0" width="32" height="32"/>
    <text class="cell-num" x="16"  y="20" text-anchor="middle">1</text>
    <text class="cell-num" x="48"  y="20" text-anchor="middle">2</text>
    <text class="cell-num" x="80"  y="20" text-anchor="middle">3</text>
  </g>

  <text class="op" x="194" y="208" text-anchor="middle">·</text>

  <!-- B as 3x3 matrix -->
  <g transform="translate(208, 168)">
    <rect class="b-cell" x="0"  y="0"  width="32" height="32"/>
    <rect class="b-cell" x="32" y="0"  width="32" height="32"/>
    <rect class="b-cell" x="64" y="0"  width="32" height="32"/>
    <rect class="b-cell" x="0"  y="32" width="32" height="32"/>
    <rect class="b-cell" x="32" y="32" width="32" height="32"/>
    <rect class="b-cell" x="64" y="32" width="32" height="32"/>
    <rect class="b-cell" x="0"  y="64" width="32" height="32"/>
    <rect class="b-cell" x="32" y="64" width="32" height="32"/>
    <rect class="b-cell" x="64" y="64" width="32" height="32"/>
    <text class="cell-num" x="16" y="20" text-anchor="middle">4</text>
    <text class="cell-num" x="48" y="20" text-anchor="middle">5</text>
    <text class="cell-num" x="80" y="20" text-anchor="middle">6</text>
    <text class="cell-num" x="16" y="52" text-anchor="middle">7</text>
    <text class="cell-num" x="48" y="52" text-anchor="middle">8</text>
    <text class="cell-num" x="80" y="52" text-anchor="middle">9</text>
    <text class="cell-num" x="16" y="84" text-anchor="middle">10</text>
    <text class="cell-num" x="48" y="84" text-anchor="middle">11</text>
    <text class="cell-num" x="80" y="84" text-anchor="middle">12</text>
  </g>

  <text class="op" x="324" y="208" text-anchor="middle">=</text>

  <!-- Result row of 3 cells -->
  <g transform="translate(340, 188)">
    <rect class="out-cell" x="0"  y="0" width="36" height="32"/>
    <rect class="out-cell" x="36" y="0" width="36" height="32"/>
    <rect class="out-cell" x="72" y="0" width="36" height="32"/>
    <text class="cell-num" x="18"  y="20" text-anchor="middle">48</text>
    <text class="cell-num" x="54"  y="20" text-anchor="middle">54</text>
    <text class="cell-num" x="90"  y="20" text-anchor="middle">60</text>
  </g>

  <!-- Hint: arrow showing row dot column -->
  <line class="arrow-hint" x1="180" y1="204" x2="208" y2="184" marker-end="url(#aP)"/>
  <text class="hint-text" x="72"  y="262">row of a (length 3)</text>
  <text class="hint-text" x="208" y="290">walks down each column</text>
  <text class="hint-text" x="208" y="304">of B (3 columns → 3 outputs)</text>

  <text class="hint-text-strong" x="68" y="358">Result: [48, 54, 60]</text>
  <text class="hint-text"        x="68" y="378">column-1 · a = 4·1 + 7·2 + 10·3 = 48</text>
  <text class="hint-text"        x="68" y="394">column-2 · a = 5·1 + 8·2 + 11·3 = 54</text>

  <!-- ====================== RIGHT PANEL: np.dot(B, a) ====================== -->
  <rect class="panel"    x="488" y="96" width="424" height="320" rx="12"/>
  <rect class="pill-acc" x="488" y="96" width="6"   height="320" rx="3"/>
  <text class="panel-head" x="508" y="124">np.dot(B, a)</text>
  <text class="panel-sub"  x="508" y="142">a is a column; walk across rows of B</text>

  <!-- B as 3x3 matrix -->
  <g transform="translate(520, 168)">
    <rect class="b-cell" x="0"  y="0"  width="32" height="32"/>
    <rect class="b-cell" x="32" y="0"  width="32" height="32"/>
    <rect class="b-cell" x="64" y="0"  width="32" height="32"/>
    <rect class="b-cell" x="0"  y="32" width="32" height="32"/>
    <rect class="b-cell" x="32" y="32" width="32" height="32"/>
    <rect class="b-cell" x="64" y="32" width="32" height="32"/>
    <rect class="b-cell" x="0"  y="64" width="32" height="32"/>
    <rect class="b-cell" x="32" y="64" width="32" height="32"/>
    <rect class="b-cell" x="64" y="64" width="32" height="32"/>
    <text class="cell-num" x="16" y="20" text-anchor="middle">4</text>
    <text class="cell-num" x="48" y="20" text-anchor="middle">5</text>
    <text class="cell-num" x="80" y="20" text-anchor="middle">6</text>
    <text class="cell-num" x="16" y="52" text-anchor="middle">7</text>
    <text class="cell-num" x="48" y="52" text-anchor="middle">8</text>
    <text class="cell-num" x="80" y="52" text-anchor="middle">9</text>
    <text class="cell-num" x="16" y="84" text-anchor="middle">10</text>
    <text class="cell-num" x="48" y="84" text-anchor="middle">11</text>
    <text class="cell-num" x="80" y="84" text-anchor="middle">12</text>
  </g>

  <text class="op" x="636" y="216" text-anchor="middle">·</text>

  <!-- a as a column of 3 cells -->
  <g transform="translate(652, 168)">
    <rect class="a-cell" x="0" y="0"  width="32" height="32"/>
    <rect class="a-cell" x="0" y="32" width="32" height="32"/>
    <rect class="a-cell" x="0" y="64" width="32" height="32"/>
    <text class="cell-num" x="16" y="20" text-anchor="middle">1</text>
    <text class="cell-num" x="16" y="52" text-anchor="middle">2</text>
    <text class="cell-num" x="16" y="84" text-anchor="middle">3</text>
  </g>

  <text class="op" x="704" y="216" text-anchor="middle">=</text>

  <!-- Result column of 3 cells -->
  <g transform="translate(720, 168)">
    <rect class="out-cell" x="0" y="0"  width="44" height="32"/>
    <rect class="out-cell" x="0" y="32" width="44" height="32"/>
    <rect class="out-cell" x="0" y="64" width="44" height="32"/>
    <text class="cell-num" x="22" y="20" text-anchor="middle">32</text>
    <text class="cell-num" x="22" y="52" text-anchor="middle">50</text>
    <text class="cell-num" x="22" y="84" text-anchor="middle">68</text>
  </g>

  <!-- Hint -->
  <line class="arrow-hint-2" x1="616" y1="184" x2="652" y2="184" marker-end="url(#aA)"/>
  <text class="hint-text" x="508" y="290">each row of B (3 rows → 3 outputs)</text>
  <text class="hint-text" x="508" y="304">walks across the column a</text>

  <text class="hint-text-strong" x="508" y="358">Result: [32, 50, 68]</text>
  <text class="hint-text"        x="508" y="378">row-1 · a = 4·1 + 5·2 + 6·3 = 32</text>
  <text class="hint-text"        x="508" y="394">row-2 · a = 7·1 + 8·2 + 9·3 = 50</text>

  <!-- ====================== Footer ====================== -->
  <text class="footer" x="48"  y="452">Both calls succeed only because B is square. With a non-square B, just one of the two orderings is shape-legal.</text>
  <text class="footer" x="48"  y="468">In neural-network code the convention is np.dot(W, x): the matrix on the left, the vector on the right.</text>
</svg>
