<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="t d">
  <title id="t">Learning-rate decay schedule and the loss curves it produces</title>
  <desc id="d">Two-panel diagram with a formula band on top. Top: the decay rule alpha(t) equals alpha_0 over 1 plus d times t, applied per iteration. Bottom-left panel: three learning-rate schedules over 10 000 iterations starting from alpha_0 = 1.0. The grey line is no decay and stays at 1.0; the green line is d = 1e-3 and tapers smoothly to 0.091; the red line is d = 1e-2 and crashes to near zero by iteration 1000. Bottom-right panel: the loss curves produced by those three schedules on the spiral dataset. The grey baseline (no decay) plateaus around 0.77 with mild oscillation; the green right-sized decay drops smoothly to 0.65; the red too-aggressive decay stalls high around 0.80 because the rate dies before the network has finished learning.</desc>

  <style><![CDATA[
    :root{
      --ce-bg:#FAFAF7;--ce-surface:#FFFFFF;--ce-ink:#1A1A1A;--ce-ink-muted:#5C5C5C;--ce-ink-subtle:#9A9A9A;
      --ce-border:#D9D9D4;--ce-primary:#5B7FBF;--ce-accent:#D98E5F;
      --ce-success:#5C9E78;--ce-warn:#B8895A;--ce-alert:#C66B5E;--ce-neutral-1:#EAEAE4;
      --ce-grid:rgba(26,26,26,0.06);
    }
    @media (prefers-color-scheme: dark){
      :root{
        --ce-bg:#0E0F12;--ce-surface:#16181C;--ce-ink:#F2F2EE;--ce-ink-muted:#B4B4AE;--ce-ink-subtle:#6E6E68;
        --ce-border:#2A2D33;--ce-primary:#8BA8E0;--ce-accent:#E8B088;
        --ce-success:#7FBF9B;--ce-warn:#D4B58A;--ce-alert:#D88880;--ce-neutral-1:#1F2229;
        --ce-grid:rgba(241,238,232,0.08);
      }
    }
    text{font-family:Inter,system-ui,sans-serif;}
    .mono{font-family:"JetBrains Mono",ui-monospace,monospace;}
    .bg{fill:var(--ce-bg);}
    .title{font-weight:600;font-size:22px;fill:var(--ce-ink);}
    .subtitle{font-size:13px;fill:var(--ce-ink-muted);}
    .footer{font-size:11px;fill:var(--ce-ink-subtle);}
    .rule-band{fill:var(--ce-primary);fill-opacity:0.08;stroke:var(--ce-primary);stroke-width:1.5;}
    .rule-head{font-weight:700;font-size:13px;fill:var(--ce-primary);}
    .rule-text{font-family:"JetBrains Mono",ui-monospace,monospace;font-size:16px;fill:var(--ce-ink);font-weight:700;}
    .rule-note{font-size:11px;fill:var(--ce-ink-muted);}
    .panel{fill:var(--ce-surface);stroke:var(--ce-border);stroke-width:1;}
    .panel-head{font-weight:700;font-size:13px;fill:var(--ce-ink);}
    .panel-sub{font-size:11px;fill:var(--ce-ink-muted);}
    .axis{stroke:var(--ce-ink-muted);stroke-width:1;fill:none;}
    .grid{stroke:var(--ce-grid);stroke-width:0.75;fill:none;}
    .axis-label{font-size:10px;fill:var(--ce-ink-muted);}
    .axis-title{font-size:10.5px;fill:var(--ce-ink-muted);font-style:italic;}
    .curve-base{stroke:var(--ce-ink-subtle);stroke-width:2;fill:none;stroke-linecap:round;stroke-dasharray:5 4;}
    .curve-ok  {stroke:var(--ce-success);stroke-width:2.6;fill:none;stroke-linecap:round;}
    .curve-bad {stroke:var(--ce-alert);stroke-width:2.6;fill:none;stroke-linecap:round;}
    .legend-text{font-size:11px;fill:var(--ce-ink);}
    .legend-mono{font-family:"JetBrains Mono",ui-monospace,monospace;font-size:11px;font-weight:600;fill:var(--ce-ink);}
    .anno-text{font-size:10.5px;fill:var(--ce-ink-muted);font-style:italic;}
    .anno-line{stroke:var(--ce-ink-subtle);stroke-width:0.75;fill:none;stroke-dasharray:2 3;}
  ]]></style>

  <rect class="bg" width="960" height="540"/>

  <text class="title"    x="48" y="40">Learning-rate decay: schedule and result</text>
  <text class="subtitle" x="48" y="60">Start with a large step. Shrink it on a 1/(1 + d·t) curve. The right d turns a 57% plateau into 72%.</text>

  <!-- ============================ Rule band ============================ -->
  <rect class="rule-band" x="48" y="76" width="864" height="60" rx="10"/>
  <text class="rule-head" x="64" y="98">The schedule</text>
  <text class="rule-text" x="480" y="112" text-anchor="middle">α(t) = α₀ / (1 + d · t)</text>
  <text class="rule-note" x="480" y="128" text-anchor="middle">α₀ = initial rate, d = decay rate, t = iteration counter. Recompute α before every parameter update.</text>

  <!-- ============================ LEFT panel: decay schedule ============================ -->
  <rect class="panel" x="48" y="152" width="432" height="324" rx="10"/>
  <text class="panel-head" x="64" y="174">Schedule: α(t) over 10 000 iterations</text>
  <text class="panel-sub"  x="64" y="190">starting from α₀ = 1.0; three decay rates</text>

  <!-- Plot frame -->
  <line class="axis" x1="98" y1="420" x2="456" y2="420"/>
  <line class="axis" x1="98" y1="206" x2="98"  y2="420"/>

  <!-- Y gridlines & labels (alpha) -->
  <g class="grid">
    <line x1="98" y1="206"   x2="456" y2="206"/>
    <line x1="98" y1="259.5" x2="456" y2="259.5"/>
    <line x1="98" y1="313"   x2="456" y2="313"/>
    <line x1="98" y1="366.5" x2="456" y2="366.5"/>
  </g>
  <text class="axis-label" x="92" y="210" text-anchor="end">1.00</text>
  <text class="axis-label" x="92" y="263" text-anchor="end">0.75</text>
  <text class="axis-label" x="92" y="317" text-anchor="end">0.50</text>
  <text class="axis-label" x="92" y="370" text-anchor="end">0.25</text>
  <text class="axis-label" x="92" y="424" text-anchor="end">0.00</text>

  <!-- X gridlines & labels (iterations) -->
  <g class="grid">
    <line x1="187.5" y1="206" x2="187.5" y2="420"/>
    <line x1="277"   y1="206" x2="277"   y2="420"/>
    <line x1="366.5" y1="206" x2="366.5" y2="420"/>
  </g>
  <text class="axis-label" x="98"    y="436" text-anchor="middle">0</text>
  <text class="axis-label" x="187.5" y="436" text-anchor="middle">2.5k</text>
  <text class="axis-label" x="277"   y="436" text-anchor="middle">5k</text>
  <text class="axis-label" x="366.5" y="436" text-anchor="middle">7.5k</text>
  <text class="axis-label" x="456"   y="436" text-anchor="middle">10k</text>
  <text class="axis-title" x="277" y="452" text-anchor="middle">iteration t</text>

  <!-- Curve: d = 0 (constant 1.0) -->
  <line class="curve-base" x1="98" y1="206" x2="456" y2="206"/>

  <!-- Curve: d = 1e-3 (smooth taper, plotted points) -->
  <path class="curve-ok" d="M 98 206
                            L 99.8 217.7
                            L 101.6 227.8
                            L 105.2 244.7
                            L 108.7 257.4
                            L 115.9 277.2
                            L 133.8 313
                            L 169.6 349
                            L 205 367
                            L 277 384
                            L 349 393
                            L 456 401" />

  <!-- Curve: d = 1e-2 (crashes very fast) -->
  <path class="curve-bad" d="M 98 206
                             L 99.8 277.2
                             L 101.6 313
                             L 105.2 349
                             L 108.7 367
                             L 115.9 384
                             L 133.8 400.5
                             L 169.6 406
                             L 277 410
                             L 456 412" />

  <!-- Legend (left panel) -->
  <g transform="translate(280, 218)">
    <rect fill="var(--ce-surface)" stroke="var(--ce-border)" stroke-width="1" x="0" y="0" width="168" height="68" rx="6"/>
    <line class="curve-base" x1="10" y1="16" x2="36" y2="16"/>
    <text class="legend-mono" x="44" y="20">d = 0</text>
    <text class="legend-text" x="92" y="20">no decay</text>
    <line class="curve-ok" x1="10" y1="36" x2="36" y2="36"/>
    <text class="legend-mono" x="44" y="40">d = 1e-3</text>
    <text class="legend-text" x="100" y="40">winner</text>
    <line class="curve-bad" x1="10" y1="56" x2="36" y2="56"/>
    <text class="legend-mono" x="44" y="60">d = 1e-2</text>
    <text class="legend-text" x="100" y="60">too fast</text>
  </g>

  <!-- ============================ RIGHT panel: loss curves ============================ -->
  <rect class="panel" x="496" y="152" width="416" height="324" rx="10"/>
  <text class="panel-head" x="512" y="174">Result: loss on spiral dataset</text>
  <text class="panel-sub"  x="512" y="190">two-layer net, full-batch, 10 000 epochs</text>

  <!-- Plot frame -->
  <line class="axis" x1="546" y1="420" x2="888" y2="420"/>
  <line class="axis" x1="546" y1="206" x2="546" y2="420"/>

  <!-- Y gridlines & labels (loss) -->
  <g class="grid">
    <line x1="546" y1="206"   x2="888" y2="206"/>
    <line x1="546" y1="255.4" x2="888" y2="255.4"/>
    <line x1="546" y1="337.6" x2="888" y2="337.6"/>
  </g>
  <text class="axis-label" x="540" y="210" text-anchor="end">1.15</text>
  <text class="axis-label" x="540" y="259" text-anchor="end">1.00</text>
  <text class="axis-label" x="540" y="341" text-anchor="end">0.75</text>
  <text class="axis-label" x="540" y="424" text-anchor="end">0.50</text>

  <!-- X gridlines & labels (epochs) -->
  <g class="grid">
    <line x1="631.5" y1="206" x2="631.5" y2="420"/>
    <line x1="717"   y1="206" x2="717"   y2="420"/>
    <line x1="802.5" y1="206" x2="802.5" y2="420"/>
  </g>
  <text class="axis-label" x="546"   y="436" text-anchor="middle">0</text>
  <text class="axis-label" x="631.5" y="436" text-anchor="middle">2.5k</text>
  <text class="axis-label" x="717"   y="436" text-anchor="middle">5k</text>
  <text class="axis-label" x="802.5" y="436" text-anchor="middle">7.5k</text>
  <text class="axis-label" x="888"   y="436" text-anchor="middle">10k</text>
  <text class="axis-title" x="717" y="452" text-anchor="middle">epoch</text>

  <!-- Curve: d = 0 (baseline, plateaus around 0.77 with slight wiggle) -->
  <path class="curve-base" d="M 546 222.5
                              L 556 250
                              L 580 290
                              L 600 310
                              L 631.5 326
                              L 660 330
                              L 717 331.8
                              L 760 333
                              L 800 331
                              L 840 332.5
                              L 888 331.8" />

  <!-- Curve: d = 1e-3 (smooth drop to ~0.65) -->
  <path class="curve-ok" d="M 546 222.5
                            C 564 258, 584 304, 610 326
                            C 640 345, 680 357, 717 364
                            C 760 368, 820 369.5, 888 369.7" />

  <!-- Curve: d = 1e-2 (crashes high, stalls) -->
  <path class="curve-bad" d="M 546 222.5
                             C 556 244, 568 268, 580 285
                             C 595 302, 615 314, 640 318
                             C 680 322, 750 324, 888 324.5" />

  <!-- Endpoint markers + value labels -->
  <circle cx="888" cy="331.8" r="3.5" fill="var(--ce-ink-subtle)"/>
  <text class="legend-mono" x="883" y="346" text-anchor="end" style="fill:var(--ce-ink-muted);">0.77</text>

  <circle cx="888" cy="369.7" r="3.5" fill="var(--ce-success)"/>
  <text class="legend-mono" x="883" y="384" text-anchor="end" style="fill:var(--ce-success);">0.65</text>

  <circle cx="888" cy="324.5" r="3.5" fill="var(--ce-alert)"/>
  <text class="legend-mono" x="883" y="316" text-anchor="end" style="fill:var(--ce-alert);">0.79</text>

  <!-- Legend (right panel) -->
  <g transform="translate(706, 218)">
    <rect fill="var(--ce-surface)" stroke="var(--ce-border)" stroke-width="1" x="0" y="0" width="176" height="68" rx="6"/>
    <line class="curve-base" x1="10" y1="16" x2="36" y2="16"/>
    <text class="legend-text" x="44" y="20" style="fill:var(--ce-ink-muted);">baseline · 57% acc</text>
    <line class="curve-ok" x1="10" y1="36" x2="36" y2="36"/>
    <text class="legend-text" x="44" y="40" style="fill:var(--ce-success);font-weight:600;">decay 1e-3 · 72% acc</text>
    <line class="curve-bad" x1="10" y1="56" x2="36" y2="56"/>
    <text class="legend-text" x="44" y="60" style="fill:var(--ce-alert);">decay 1e-2 · 55% acc</text>
  </g>

  <!-- ============================ Footer ============================ -->
  <text class="footer" x="48"  y="510">Decay smooths the loss curve and lets the optimiser settle, but it cannot escape a local minimum once α has shrunk. Momentum (Part 24) does that.</text>
</svg>
