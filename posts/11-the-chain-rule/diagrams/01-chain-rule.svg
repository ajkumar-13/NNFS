<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" role="img" aria-labelledby="t d">
  <title id="t">The chain rule: derivatives compose by multiplication</title>
  <desc id="d">A horizontal flow diagram showing the chain rule for y = f(g(x)). On the top row, the forward path: x enters the box g, producing z = g(x), which enters the box f, producing y = f(z). On the bottom row, the backward path: the derivative dy/dx is the product of two local derivatives, dy/dz from the f box and dz/dx from the g box. A side panel contains a worked numerical example using time, distance, and fuel: dy/dx = (1/30) times 60 = 2 litres per hour.</desc>

  <style><![CDATA[
    :root{
      --ce-bg:#FAFAF7;--ce-surface:#FFFFFF;--ce-ink:#1A1A1A;--ce-ink-muted:#5C5C5C;--ce-ink-subtle:#9A9A9A;
      --ce-border:#D9D9D4;--ce-primary:#5B7FBF;--ce-accent:#D98E5F;
      --ce-success:#5C9E78;--ce-warn:#B8895A;--ce-alert:#C66B5E;--ce-neutral-1:#EAEAE4;
    }
    @media (prefers-color-scheme: dark){
      :root{
        --ce-bg:#0E0F12;--ce-surface:#16181C;--ce-ink:#F2F2EE;--ce-ink-muted:#B4B4AE;--ce-ink-subtle:#6E6E68;
        --ce-border:#2A2D33;--ce-primary:#8BA8E0;--ce-accent:#E8B088;
        --ce-success:#7FBF9B;--ce-warn:#D4B58A;--ce-alert:#D88880;--ce-neutral-1:#1F2229;
      }
    }
    text{font-family:Inter,system-ui,sans-serif;}
    .mono{font-family:"JetBrains Mono",ui-monospace,monospace;}
    .bg{fill:var(--ce-bg);}
    .title{font-weight:600;font-size:22px;fill:var(--ce-ink);}
    .subtitle{font-size:13px;fill:var(--ce-ink-muted);}
    .footer{font-size:11px;fill:var(--ce-ink-subtle);}
    .var-pill{fill:var(--ce-primary);fill-opacity:0.18;stroke:var(--ce-primary);stroke-width:1.5;}
    .var-pill-int{fill:var(--ce-accent);fill-opacity:0.18;stroke:var(--ce-accent);stroke-width:1.5;}
    .var-pill-out{fill:var(--ce-success);fill-opacity:0.20;stroke:var(--ce-success);stroke-width:1.5;}
    .var-name{font-weight:700;font-size:16px;fill:var(--ce-ink);font-family:"JetBrains Mono",ui-monospace,monospace;}
    .var-sub{font-size:11px;fill:var(--ce-ink-muted);}
    .box-g{fill:var(--ce-surface);stroke:var(--ce-ink);stroke-width:1.5;stroke-dasharray:5 3;}
    .box-f{fill:var(--ce-surface);stroke:var(--ce-ink);stroke-width:1.5;stroke-dasharray:5 3;}
    .box-name{font-weight:700;font-size:14px;fill:var(--ce-ink);font-family:"JetBrains Mono",ui-monospace,monospace;}
    .box-sub{font-size:11px;fill:var(--ce-ink-muted);}
    .fwd-arrow{stroke:var(--ce-primary);stroke-width:2;fill:none;}
    .fwd-head{fill:var(--ce-primary);}
    .bwd-arrow{stroke:var(--ce-alert);stroke-width:2;fill:none;}
    .bwd-head{fill:var(--ce-alert);}
    .local-label{font-family:"JetBrains Mono",ui-monospace,monospace;font-size:13px;font-weight:700;fill:var(--ce-alert);}
    .row-label{font-weight:700;font-size:12px;fill:var(--ce-ink-muted);text-transform:uppercase;letter-spacing:0.06em;}
    .info-head{font-weight:700;font-size:13px;fill:var(--ce-ink);}
    .info-body{font-size:12px;fill:var(--ce-ink);}
    .info-muted{font-size:11px;fill:var(--ce-ink-muted);}
    .formula-pill{fill:var(--ce-primary);fill-opacity:0.10;stroke:var(--ce-primary);stroke-width:1.2;}
    .formula-text{font-family:"JetBrains Mono",ui-monospace,monospace;font-size:13px;fill:var(--ce-ink);font-weight:600;}
  ]]></style>

  <defs>
    <marker id="aFwd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" class="fwd-head"/>
    </marker>
    <marker id="aBwd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" class="bwd-head"/>
    </marker>
  </defs>

  <rect class="bg" width="960" height="460"/>

  <text class="title"    x="48" y="48">The chain rule</text>
  <text class="subtitle" x="48" y="70">A composition is a sequence of functions; its derivative is the product of their local derivatives.</text>

  <!-- ============================ Top row: forward ============================ -->
  <text class="row-label" x="48" y="104">forward (compute the value)</text>

  <!-- x -->
  <circle class="var-pill" cx="100" cy="160" r="34"/>
  <text class="var-name" x="100" y="166" text-anchor="middle">x</text>

  <!-- forward arrow x → g -->
  <line class="fwd-arrow" x1="140" y1="160" x2="190" y2="160" marker-end="url(#aFwd)"/>

  <!-- box g -->
  <rect class="box-g" x="194" y="128" width="120" height="64" rx="10"/>
  <text class="box-name" x="254" y="156" text-anchor="middle">g</text>
  <text class="box-sub"  x="254" y="174" text-anchor="middle">inner function</text>

  <!-- forward arrow g → z -->
  <line class="fwd-arrow" x1="314" y1="160" x2="364" y2="160" marker-end="url(#aFwd)"/>

  <!-- z -->
  <circle class="var-pill-int" cx="404" cy="160" r="34"/>
  <text class="var-name" x="404" y="166" text-anchor="middle">z</text>
  <text class="var-sub" x="404" y="210" text-anchor="middle">z = g(x)</text>

  <!-- forward arrow z → f -->
  <line class="fwd-arrow" x1="444" y1="160" x2="494" y2="160" marker-end="url(#aFwd)"/>

  <!-- box f -->
  <rect class="box-f" x="498" y="128" width="120" height="64" rx="10"/>
  <text class="box-name" x="558" y="156" text-anchor="middle">f</text>
  <text class="box-sub"  x="558" y="174" text-anchor="middle">outer function</text>

  <!-- forward arrow f → y -->
  <line class="fwd-arrow" x1="618" y1="160" x2="668" y2="160" marker-end="url(#aFwd)"/>

  <!-- y -->
  <circle class="var-pill-out" cx="708" cy="160" r="34"/>
  <text class="var-name" x="708" y="166" text-anchor="middle">y</text>
  <text class="var-sub" x="708" y="210" text-anchor="middle">y = f(z) = f(g(x))</text>

  <!-- ============================ Bottom row: backward ============================ -->
  <text class="row-label" x="48" y="262">backward (compute the slope)</text>

  <!-- Reverse arrows -->
  <line class="bwd-arrow" x1="668" y1="294" x2="618" y2="294" marker-end="url(#aBwd)"/>
  <text class="local-label" x="643" y="284" text-anchor="middle">dy/dz</text>

  <line class="bwd-arrow" x1="494" y1="294" x2="444" y2="294" marker-end="url(#aBwd)"/>

  <line class="bwd-arrow" x1="364" y1="294" x2="314" y2="294" marker-end="url(#aBwd)"/>
  <text class="local-label" x="339" y="284" text-anchor="middle">dz/dx</text>

  <line class="bwd-arrow" x1="190" y1="294" x2="140" y2="294" marker-end="url(#aBwd)"/>

  <!-- Below-axis labels -->
  <text class="info-muted" x="708" y="332" text-anchor="middle">start with the</text>
  <text class="info-muted" x="708" y="346" text-anchor="middle">outermost slope</text>
  <text class="info-muted" x="100" y="332" text-anchor="middle">end with the</text>
  <text class="info-muted" x="100" y="346" text-anchor="middle">whole chain's slope</text>

  <!-- The combined formula -->
  <rect class="formula-pill" x="200" y="382" width="560" height="44" rx="8"/>
  <text class="formula-text" x="480" y="410" text-anchor="middle">dy/dx  =  dy/dz  ·  dz/dx  =  f'(z) · g'(x)</text>
</svg>
