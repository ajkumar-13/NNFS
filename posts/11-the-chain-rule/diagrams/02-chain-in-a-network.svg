<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" role="img" aria-labelledby="t d">
  <title id="t">The chain rule applied to a two-layer neural network: backprop is just this rule, unrolled</title>
  <desc id="d">Two horizontal flows representing forward and backward passes through a two-layer classifier. The forward row (top): input x flows through Layer 1 (W1, b1) producing z1, then through ReLU producing a1, then through Layer 2 (W2, b2) producing z2, then through Softmax + CrossEntropy producing the loss L. The backward row (bottom): the gradient dL/dW1 is shown as a product of four local derivatives: dL/dz2 from the loss/softmax box, dz2/da1 from the second dense layer, da1/dz1 from ReLU, and dz1/dW1 from the first dense layer. A footer states that this product is exactly what backpropagation computes, one factor at a time.</desc>

  <style><![CDATA[
    :root{
      --ce-bg:#FAFAF7;--ce-surface:#FFFFFF;--ce-ink:#1A1A1A;--ce-ink-muted:#5C5C5C;--ce-ink-subtle:#9A9A9A;
      --ce-border:#D9D9D4;--ce-primary:#5B7FBF;--ce-accent:#D98E5F;
      --ce-success:#5C9E78;--ce-warn:#B8895A;--ce-alert:#C66B5E;--ce-neutral-1:#EAEAE4;
    }
    @media (prefers-color-scheme: dark){
      :root{
        --ce-bg:#0E0F12;--ce-surface:#16181C;--ce-ink:#F2F2EE;--ce-ink-muted:#B4B4AE;--ce-ink-subtle:#6E6E68;
        --ce-border:#2A2D33;--ce-primary:#8BA8E0;--ce-accent:#E8B088;
        --ce-success:#7FBF9B;--ce-warn:#D4B58A;--ce-alert:#D88880;--ce-neutral-1:#1F2229;
      }
    }
    text{font-family:Inter,system-ui,sans-serif;}
    .mono{font-family:"JetBrains Mono",ui-monospace,monospace;}
    .bg{fill:var(--ce-bg);}
    .title{font-weight:600;font-size:22px;fill:var(--ce-ink);}
    .subtitle{font-size:13px;fill:var(--ce-ink-muted);}
    .footer{font-size:11px;fill:var(--ce-ink-subtle);}
    .row-label{font-weight:700;font-size:12px;fill:var(--ce-ink-muted);text-transform:uppercase;letter-spacing:0.06em;}
    .var-pill{fill:var(--ce-primary);fill-opacity:0.18;stroke:var(--ce-primary);stroke-width:1.5;}
    .var-pill-acc{fill:var(--ce-accent);fill-opacity:0.18;stroke:var(--ce-accent);stroke-width:1.5;}
    .var-pill-ok{fill:var(--ce-success);fill-opacity:0.20;stroke:var(--ce-success);stroke-width:1.5;}
    .var-name{font-weight:700;font-size:13px;fill:var(--ce-ink);font-family:"JetBrains Mono",ui-monospace,monospace;}
    .op-box{fill:var(--ce-surface);stroke:var(--ce-ink);stroke-width:1.5;stroke-dasharray:5 3;}
    .op-name{font-weight:700;font-size:12px;fill:var(--ce-ink);font-family:"JetBrains Mono",ui-monospace,monospace;}
    .op-sub{font-size:10px;fill:var(--ce-ink-muted);}
    .fwd-arrow{stroke:var(--ce-primary);stroke-width:1.8;fill:none;}
    .fwd-head{fill:var(--ce-primary);}
    .bwd-arrow{stroke:var(--ce-alert);stroke-width:1.8;fill:none;}
    .bwd-head{fill:var(--ce-alert);}
    .local-label{font-family:"JetBrains Mono",ui-monospace,monospace;font-size:11px;font-weight:700;fill:var(--ce-alert);}
    .formula-pill{fill:var(--ce-alert);fill-opacity:0.08;stroke:var(--ce-alert);stroke-width:1.5;}
    .formula-head{font-weight:700;font-size:13px;fill:var(--ce-alert);}
    .formula-text{font-family:"JetBrains Mono",ui-monospace,monospace;font-size:13px;fill:var(--ce-ink);font-weight:600;}
    .formula-note{font-size:11px;fill:var(--ce-ink-muted);}
  ]]></style>

  <defs>
    <marker id="aFwd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" class="fwd-head"/>
    </marker>
    <marker id="aBwd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" class="bwd-head"/>
    </marker>
  </defs>

  <rect class="bg" width="960" height="480"/>

  <text class="title"    x="48" y="48">Backpropagation = chain rule, unrolled across layers</text>
  <text class="subtitle" x="48" y="70">Forward computes values left to right; backward multiplies local derivatives right to left.</text>

  <!-- ============================ FORWARD ROW ============================ -->
  <text class="row-label" x="48" y="106">forward (values flow left to right)</text>

  <!-- x -->
  <circle class="var-pill" cx="78" cy="160" r="24"/>
  <text class="var-name" x="78" y="165" text-anchor="middle">x</text>

  <line class="fwd-arrow" x1="106" y1="160" x2="144" y2="160" marker-end="url(#aFwd)"/>

  <!-- Layer 1 box -->
  <rect class="op-box" x="148" y="132" width="118" height="56" rx="10"/>
  <text class="op-name" x="207" y="156" text-anchor="middle">Dense 1</text>
  <text class="op-sub"  x="207" y="174" text-anchor="middle">W₁·x + b₁</text>

  <line class="fwd-arrow" x1="270" y1="160" x2="302" y2="160" marker-end="url(#aFwd)"/>

  <!-- z1 -->
  <circle class="var-pill-acc" cx="332" cy="160" r="22"/>
  <text class="var-name" x="332" y="165" text-anchor="middle">z₁</text>

  <line class="fwd-arrow" x1="358" y1="160" x2="392" y2="160" marker-end="url(#aFwd)"/>

  <!-- ReLU box -->
  <rect class="op-box" x="396" y="132" width="96" height="56" rx="10"/>
  <text class="op-name" x="444" y="156" text-anchor="middle">ReLU</text>
  <text class="op-sub"  x="444" y="174" text-anchor="middle">max(0, ·)</text>

  <line class="fwd-arrow" x1="496" y1="160" x2="528" y2="160" marker-end="url(#aFwd)"/>

  <!-- a1 -->
  <circle class="var-pill-acc" cx="558" cy="160" r="22"/>
  <text class="var-name" x="558" y="165" text-anchor="middle">a₁</text>

  <line class="fwd-arrow" x1="584" y1="160" x2="618" y2="160" marker-end="url(#aFwd)"/>

  <!-- Dense 2 box -->
  <rect class="op-box" x="622" y="132" width="118" height="56" rx="10"/>
  <text class="op-name" x="681" y="156" text-anchor="middle">Dense 2</text>
  <text class="op-sub"  x="681" y="174" text-anchor="middle">W₂·a₁ + b₂</text>

  <line class="fwd-arrow" x1="744" y1="160" x2="776" y2="160" marker-end="url(#aFwd)"/>

  <!-- z2 -->
  <circle class="var-pill-acc" cx="806" cy="160" r="22"/>
  <text class="var-name" x="806" y="165" text-anchor="middle">z₂</text>

  <line class="fwd-arrow" x1="832" y1="160" x2="858" y2="160" marker-end="url(#aFwd)"/>

  <!-- L (loss) at far right -->
  <circle class="var-pill-ok" cx="900" cy="160" r="28"/>
  <text class="var-name" x="900" y="165" text-anchor="middle">L</text>

  <!-- ============================ BACKWARD ROW ============================ -->
  <text class="row-label" x="48" y="248">backward (local derivatives, right to left)</text>

  <!-- Arrows in reverse, with labels -->
  <line class="bwd-arrow" x1="858" y1="296" x2="776" y2="296" marker-end="url(#aBwd)"/>
  <text class="local-label" x="817" y="286" text-anchor="middle">∂L / ∂z₂</text>
  <text class="op-sub"      x="817" y="312" text-anchor="middle">Softmax + CE</text>

  <line class="bwd-arrow" x1="744" y1="296" x2="618" y2="296" marker-end="url(#aBwd)"/>
  <text class="local-label" x="681" y="286" text-anchor="middle">∂z₂ / ∂a₁</text>
  <text class="op-sub"      x="681" y="312" text-anchor="middle">Dense 2</text>

  <line class="bwd-arrow" x1="496" y1="296" x2="396" y2="296" marker-end="url(#aBwd)"/>
  <text class="local-label" x="446" y="286" text-anchor="middle">∂a₁ / ∂z₁</text>
  <text class="op-sub"      x="446" y="312" text-anchor="middle">ReLU</text>

  <line class="bwd-arrow" x1="270" y1="296" x2="148" y2="296" marker-end="url(#aBwd)"/>
  <text class="local-label" x="209" y="286" text-anchor="middle">∂z₁ / ∂W₁</text>
  <text class="op-sub"      x="209" y="312" text-anchor="middle">Dense 1</text>

  <!-- Connecting forward arrows for the gaps between boxes (z1, a1, z2 are just pass-through) -->
  <line class="bwd-arrow" x1="618" y1="296" x2="584" y2="296" marker-end="url(#aBwd)" opacity="0.4"/>
  <line class="bwd-arrow" x1="396" y1="296" x2="358" y2="296" marker-end="url(#aBwd)" opacity="0.4"/>
  <line class="bwd-arrow" x1="148" y1="296" x2="106" y2="296" marker-end="url(#aBwd)" opacity="0.4"/>

  <!-- ============================ COMBINED FORMULA ============================ -->
  <rect class="formula-pill" x="48" y="360" width="864" height="96" rx="12"/>
  <text class="formula-head" x="68" y="386">Combined: the gradient of the loss with respect to the first layer's weights</text>
  <text class="formula-text" x="480" y="414" text-anchor="middle">∂L/∂W₁  =  ∂L/∂z₂  ·  ∂z₂/∂a₁  ·  ∂a₁/∂z₁  ·  ∂z₁/∂W₁</text>
  <text class="formula-note" x="480" y="440" text-anchor="middle">four local derivatives, one per function in the forward chain. backprop computes them one box at a time.</text>
</svg>
