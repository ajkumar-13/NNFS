<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" role="img" aria-labelledby="t d">
  <title id="t">From partial derivatives to gradients</title>
  <desc id="d">A flow diagram showing how partial derivatives combine into a gradient vector. On the left, a multi-variable function f(x, y, z) is shown. Three branches compute one partial derivative each — ∂f/∂x, ∂f/∂y, ∂f/∂z — each by freezing the other two variables. The three partial derivatives feed into a single column vector on the right, the gradient ∇f. A footer band states that the gradient points in the direction of steepest ascent and the negative gradient is what gradient descent moves along.</desc>

  <style><![CDATA[
    :root{
      --ce-bg:#FAFAF7;--ce-surface:#FFFFFF;--ce-ink:#1A1A1A;--ce-ink-muted:#5C5C5C;--ce-ink-subtle:#9A9A9A;
      --ce-border:#D9D9D4;--ce-primary:#5B7FBF;--ce-accent:#D98E5F;
      --ce-success:#5C9E78;--ce-warn:#B8895A;--ce-alert:#C66B5E;--ce-neutral-1:#EAEAE4;
    }
    @media (prefers-color-scheme: dark){
      :root{
        --ce-bg:#0E0F12;--ce-surface:#16181C;--ce-ink:#F2F2EE;--ce-ink-muted:#B4B4AE;--ce-ink-subtle:#6E6E68;
        --ce-border:#2A2D33;--ce-primary:#8BA8E0;--ce-accent:#E8B088;
        --ce-success:#7FBF9B;--ce-warn:#D4B58A;--ce-alert:#D88880;--ce-neutral-1:#1F2229;
      }
    }
    text{font-family:Inter,system-ui,sans-serif;}
    .mono{font-family:"JetBrains Mono",ui-monospace,monospace;}
    .bg{fill:var(--ce-bg);}
    .title{font-weight:600;font-size:22px;fill:var(--ce-ink);}
    .subtitle{font-size:13px;fill:var(--ce-ink-muted);}
    .footer{font-size:11px;fill:var(--ce-ink-subtle);}
    .source-pill{fill:var(--ce-primary);fill-opacity:0.16;stroke:var(--ce-primary);stroke-width:1.5;}
    .source-name{font-weight:700;font-size:16px;fill:var(--ce-ink);font-family:"JetBrains Mono",ui-monospace,monospace;}
    .source-expr{font-family:"JetBrains Mono",ui-monospace,monospace;font-size:12px;fill:var(--ce-ink);}
    .branch-card{fill:var(--ce-surface);stroke:var(--ce-border);stroke-width:1;}
    .branch-head{font-weight:700;font-size:13px;fill:var(--ce-ink);}
    .branch-formula{font-family:"JetBrains Mono",ui-monospace,monospace;font-size:13px;fill:var(--ce-ink);}
    .branch-rule{font-size:11px;fill:var(--ce-ink-muted);}
    .branch-result{font-family:"JetBrains Mono",ui-monospace,monospace;font-size:13px;font-weight:700;fill:var(--ce-success);}
    .arrow{stroke:var(--ce-ink-muted);stroke-width:1.5;fill:none;}
    .arrow-head{fill:var(--ce-ink-muted);}
    .gradient-pill{fill:var(--ce-success);fill-opacity:0.16;stroke:var(--ce-success);stroke-width:1.8;}
    .gradient-name{font-weight:700;font-size:18px;fill:var(--ce-ink);font-family:"JetBrains Mono",ui-monospace,monospace;}
    .gradient-cell-text{font-family:"JetBrains Mono",ui-monospace,monospace;font-size:13px;fill:var(--ce-ink);font-weight:600;}
    .gradient-bracket{stroke:var(--ce-ink);stroke-width:2;fill:none;}
    .insight-band{fill:var(--ce-primary);fill-opacity:0.08;stroke:var(--ce-primary);stroke-width:1.5;}
    .insight-head{font-weight:700;font-size:13px;fill:var(--ce-primary);}
    .insight-body{font-size:12px;fill:var(--ce-ink);}
  ]]></style>

  <defs>
    <marker id="aM" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" class="arrow-head"/>
    </marker>
  </defs>

  <rect class="bg" width="960" height="460"/>

  <text class="title"    x="48" y="48">From partial derivatives to the gradient</text>
  <text class="subtitle" x="48" y="70">Each partial derivative answers a one-variable question. Bundled together, they form the gradient.</text>

  <!-- ==================== Source function ==================== -->
  <rect class="source-pill" x="48" y="120" width="180" height="180" rx="14"/>
  <text class="source-name" x="138" y="156" text-anchor="middle">f(x, y, z)</text>
  <text class="source-expr" x="138" y="184" text-anchor="middle">= 3x³z − y² + 5z + 2yz</text>
  <text class="branch-rule" x="138" y="220" text-anchor="middle">three variables;</text>
  <text class="branch-rule" x="138" y="236" text-anchor="middle">one number output</text>
  <text class="branch-rule" x="138" y="270" text-anchor="middle">need 3 slopes,</text>
  <text class="branch-rule" x="138" y="286" text-anchor="middle">one per axis</text>

  <!-- ==================== Three branches ==================== -->
  <!-- Branch 1: ∂f/∂x -->
  <line class="arrow" x1="232" y1="160" x2="276" y2="148" marker-end="url(#aM)"/>
  <rect class="branch-card" x="280" y="120" width="260" height="56" rx="10"/>
  <text class="branch-head"    x="296" y="140">∂f/∂x</text>
  <text class="branch-rule"    x="370" y="140">freeze y and z</text>
  <text class="branch-formula" x="296" y="162">only 3x³z survives</text>
  <text class="branch-result"  x="524" y="162" text-anchor="end">= 9x²z</text>

  <!-- Branch 2: ∂f/∂y -->
  <line class="arrow" x1="232" y1="210" x2="276" y2="210" marker-end="url(#aM)"/>
  <rect class="branch-card" x="280" y="182" width="260" height="56" rx="10"/>
  <text class="branch-head"    x="296" y="202">∂f/∂y</text>
  <text class="branch-rule"    x="370" y="202">freeze x and z</text>
  <text class="branch-formula" x="296" y="224">−y² and 2yz survive</text>
  <text class="branch-result"  x="524" y="224" text-anchor="end">= −2y + 2z</text>

  <!-- Branch 3: ∂f/∂z -->
  <line class="arrow" x1="232" y1="260" x2="276" y2="272" marker-end="url(#aM)"/>
  <rect class="branch-card" x="280" y="244" width="260" height="56" rx="10"/>
  <text class="branch-head"    x="296" y="264">∂f/∂z</text>
  <text class="branch-rule"    x="370" y="264">freeze x and y</text>
  <text class="branch-formula" x="296" y="286">three z-terms survive</text>
  <text class="branch-result"  x="524" y="286" text-anchor="end">= 3x³ + 5 + 2y</text>

  <!-- ==================== Arrows merging into gradient ==================== -->
  <path class="arrow" d="M 544 148 C 600 148, 600 195, 660 195" marker-end="url(#aM)"/>
  <path class="arrow" d="M 544 210 L 660 210" marker-end="url(#aM)"/>
  <path class="arrow" d="M 544 272 C 600 272, 600 225, 660 225" marker-end="url(#aM)"/>

  <!-- ==================== Gradient ==================== -->
  <rect class="gradient-pill" x="664" y="124" width="248" height="232" rx="14"/>
  <text class="gradient-name" x="788" y="156" text-anchor="middle">∇f</text>

  <!-- Vertical column bracket -->
  <path class="gradient-bracket" d="M 692 184 L 692 332 M 692 184 L 700 184 M 692 332 L 700 332"/>
  <path class="gradient-bracket" d="M 884 184 L 884 332 M 884 184 L 876 184 M 884 332 L 876 332"/>

  <!-- Three rows -->
  <text class="gradient-cell-text" x="788" y="220" text-anchor="middle">9x²z</text>
  <text class="gradient-cell-text" x="788" y="262" text-anchor="middle">−2y + 2z</text>
  <text class="gradient-cell-text" x="788" y="304" text-anchor="middle">3x³ + 5 + 2y</text>

  <text class="branch-rule" x="788" y="346" text-anchor="middle">a vector of three numbers</text>

  <!-- ==================== Insight band ==================== -->
  <rect class="insight-band" x="48" y="376" width="864" height="64" rx="12"/>
  <text class="insight-head" x="68" y="402">What the gradient is for</text>
  <text class="insight-body" x="68" y="422">∇f points in the direction of steepest ascent. Gradient descent moves along −∇f to reduce the loss as fast as possible per unit step.</text>
</svg>
