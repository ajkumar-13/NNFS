<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="t d">
  <title id="t">The spiral dataset: three intertwined classes</title>
  <desc id="d">A scatter plot showing 300 points in two dimensions, divided into three classes that form three intertwined spirals emanating from the origin. The three classes are coloured in primary blue, accent orange, and success green respectively. A dashed line illustrates the failure mode of any linear classifier: no straight line can separate even two of the three classes cleanly. A side panel summarises the dataset properties: 300 samples, 2 features, 3 classes, non-linear, not separable.</desc>

  <style><![CDATA[
    :root{
      --ce-bg:#FAFAF7;--ce-surface:#FFFFFF;--ce-ink:#1A1A1A;--ce-ink-muted:#5C5C5C;--ce-ink-subtle:#9A9A9A;
      --ce-border:#D9D9D4;--ce-primary:#5B7FBF;--ce-accent:#D98E5F;
      --ce-success:#5C9E78;--ce-warn:#B8895A;--ce-alert:#C66B5E;--ce-neutral-1:#EAEAE4;
    }
    @media (prefers-color-scheme: dark){
      :root{
        --ce-bg:#0E0F12;--ce-surface:#16181C;--ce-ink:#F2F2EE;--ce-ink-muted:#B4B4AE;--ce-ink-subtle:#6E6E68;
        --ce-border:#2A2D33;--ce-primary:#8BA8E0;--ce-accent:#E8B088;
        --ce-success:#7FBF9B;--ce-warn:#D4B58A;--ce-alert:#D88880;--ce-neutral-1:#1F2229;
      }
    }
    text{font-family:Inter,system-ui,sans-serif;}
    .mono{font-family:"JetBrains Mono",ui-monospace,monospace;}
    .bg{fill:var(--ce-bg);}
    .title{font-weight:600;font-size:22px;fill:var(--ce-ink);}
    .subtitle{font-size:13px;fill:var(--ce-ink-muted);}
    .footer{font-size:11px;fill:var(--ce-ink-subtle);}
    .panel{fill:var(--ce-surface);stroke:var(--ce-border);stroke-width:1;}
    .axis{stroke:var(--ce-ink-muted);stroke-width:1;fill:none;}
    .grid{stroke:var(--ce-grid,rgba(26,26,26,0.06));stroke-width:0.75;fill:none;}
    .axis-label{font-size:11px;fill:var(--ce-ink-muted);}
    .axis-title{font-size:13px;font-weight:600;fill:var(--ce-ink);}
    .pt-c0{fill:var(--ce-primary);}
    .pt-c1{fill:var(--ce-accent);}
    .pt-c2{fill:var(--ce-success);}
    .bad-line{stroke:var(--ce-alert);stroke-width:1.5;stroke-dasharray:5 4;fill:none;}
    .bad-label{font-size:11px;fill:var(--ce-alert);font-weight:600;}
    .info-head{font-weight:700;font-size:13px;fill:var(--ce-ink);}
    .info-body{font-size:12px;fill:var(--ce-ink);}
    .info-muted{font-size:11px;fill:var(--ce-ink-muted);}
    .pill-prim{fill:var(--ce-primary);}
    .pill-acc{fill:var(--ce-accent);}
    .pill-ok{fill:var(--ce-success);}
    .legend-text{font-size:12px;fill:var(--ce-ink);}
  ]]></style>

  <rect class="bg" width="960" height="540"/>

  <text class="title"    x="48" y="48">The spiral dataset</text>
  <text class="subtitle" x="48" y="70">300 points, 3 classes, 2 features. The series' standard benchmark for non-linear classification.</text>

  <!-- ====================== Scatter plot panel ====================== -->
  <rect class="panel" x="48" y="96" width="500" height="380" rx="12"/>
  <!-- Axes centred -->
  <line class="axis" x1="298" y1="120" x2="298" y2="456"/>
  <line class="axis" x1="68"  y1="288" x2="528" y2="288"/>
  <text class="axis-title" x="298" y="476" text-anchor="middle">X₁</text>
  <text class="axis-title" x="68"  y="284" text-anchor="end">X₂</text>

  <!-- Three spirals. Approximated with circle markers along parametric spirals.
       Spiral i (i=0,1,2): r in [0..1], theta = 4*r + (2*pi*i/3). cx = 298 + 120r*cos(theta), cy = 288 - 120r*sin(theta).
       For visual quality, scatter ~30 points per spiral at jittered radii. -->

