  <!-- A failing linear boundary (dashed) showing it can't separate the spirals -->
  <line class="bad-line" x1="120" y1="380" x2="490" y2="200"/>
  <text class="bad-label" x="118" y="396">no straight line separates the classes</text>

  <!-- ====================== Right info panel ====================== -->
  <rect class="panel" x="572" y="96" width="340" height="380" rx="12"/>
  <text class="info-head" x="592" y="124">Dataset properties</text>

  <!-- Properties list -->
  <text class="info-body"  x="592" y="156">Samples:</text>
  <text class="mono"       x="892" y="156" text-anchor="end" style="font-size:12px;fill:var(--ce-ink);">300</text>
  <text class="info-muted" x="592" y="172">(100 per class × 3 classes)</text>

  <text class="info-body"  x="592" y="200">Features:</text>
  <text class="mono"       x="892" y="200" text-anchor="end" style="font-size:12px;fill:var(--ce-ink);">2</text>
  <text class="info-muted" x="592" y="216">(X₁, X₂) coordinates in the plane</text>

  <text class="info-body"  x="592" y="244">Classes:</text>
  <text class="mono"       x="892" y="244" text-anchor="end" style="font-size:12px;fill:var(--ce-ink);">3</text>
  <text class="info-muted" x="592" y="260">labelled 0, 1, 2 in y</text>

  <text class="info-body"  x="592" y="288">Linearly separable?</text>
  <text class="info-body"  x="892" y="288" text-anchor="end" style="fill:var(--ce-alert);font-weight:600;">no</text>

  <text class="info-body"  x="592" y="316">Chance baseline:</text>
  <text class="info-body"  x="892" y="316" text-anchor="end">33.3%</text>

  <!-- Legend -->
  <text class="info-head" x="592" y="356">Legend</text>
  <circle class="pt-c0" cx="600" cy="378" r="4"/>
  <text class="legend-text" x="612" y="382">class 0 (label y = 0)</text>
  <circle class="pt-c1" cx="600" cy="400" r="4"/>
  <text class="legend-text" x="612" y="404">class 1 (label y = 1)</text>
  <circle class="pt-c2" cx="600" cy="422" r="4"/>
  <text class="legend-text" x="612" y="426">class 2 (label y = 2)</text>

  <!-- Source / code hint -->
  <text class="info-muted" x="592" y="454">Generated with:</text>
  <text class="mono"       x="592" y="470" style="font-size:11px;fill:var(--ce-ink);">spiral_data(samples=100, classes=3)</text>

  <!-- Footer -->
  <text class="footer" x="48"  y="514">A linear model cannot solve this dataset. The series builds one that can, layer by layer.</text>
  <text class="footer" x="912" y="514" text-anchor="end">Helper from nnfs (Kinsley &amp; Kukieła, 2020).</text>
</svg>
