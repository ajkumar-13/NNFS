  </g>

  <!-- Magnitude check -->
  <text class="check-text" x="512" y="362">magnitude check:</text>
  <text class="check-mono" x="512" y="382" style="fill:var(--ce-success);">sum  =  8 × 1.0  =  8.0</text>
  <text class="check-text" x="512" y="398">— same scale as training in expectation; no extra math at inference</text>

  <!-- ============================ Bottom strip ============================ -->
  <rect class="compare-panel" x="24" y="428" width="912" height="84" rx="10"/>
  <text class="compare-head" x="40" y="450">The train/test switch  ·  the most common dropout bug</text>

  <line class="row-line" x1="40" y1="458" x2="920" y2="458"/>
  <text class="col-head" x="60"  y="476">phase</text>
  <text class="col-head" x="200" y="476">training=</text>
  <text class="col-head" x="320" y="476">layer behaviour</text>
  <text class="col-head" x="640" y="476">if you get it wrong</text>
  <line class="row-line" x1="40" y1="482" x2="920" y2="482"/>

  <text class="compare-text" x="60"  y="500" style="fill:var(--ce-warn);font-weight:700;">training</text>
  <text class="compare-text" x="200" y="500" style="font-family:JetBrains Mono;">True</text>
  <text class="compare-text" x="320" y="500">mask + scale by 1/(1−p), fresh each step</text>
  <text class="compare-text" x="640" y="500">network never sees regularisation</text>

  <text class="compare-text" x="60"  y="516" style="fill:var(--ce-success);font-weight:700;">val / test</text>
  <text class="compare-text" x="200" y="516" style="font-family:JetBrains Mono;">False</text>
  <text class="compare-text" x="320" y="516">identity pass, all neurons active</text>
  <text class="compare-text" x="640" y="516">test = accuracy of a RANDOM subnetwork</text>
</svg>
