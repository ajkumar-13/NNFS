  <line class="arrow-flow" x1="372" y1="194" x2="372" y2="218" marker-end="url(#ar-flow)"/>

  <!-- Neurons row (training): drop positions 2 and 5 (indices 1 and 4) -->
  <g>
    <!-- Neuron 1 (kept) -->
    <circle class="neuron-active-train" cx="78"  cy="240" r="16"/>
    <text class="neuron-num" x="78"  y="244" text-anchor="middle">1.33</text>
    <!-- Neuron 2 (DROPPED) -->
    <circle class="neuron-dropped" cx="120" cy="240" r="16"/>
    <text class="neuron-num-dropped" x="120" y="244" text-anchor="middle">0</text>
    <line class="drop-x" x1="108" y1="228" x2="132" y2="252"/>
    <line class="drop-x" x1="132" y1="228" x2="108" y2="252"/>
    <!-- Neuron 3 (kept) -->
    <circle class="neuron-active-train" cx="162" cy="240" r="16"/>
    <text class="neuron-num" x="162" y="244" text-anchor="middle">1.33</text>
    <!-- Neuron 4 (kept) -->
    <circle class="neuron-active-train" cx="204" cy="240" r="16"/>
    <text class="neuron-num" x="204" y="244" text-anchor="middle">1.33</text>
    <!-- Neuron 5 (DROPPED) -->
    <circle class="neuron-dropped" cx="246" cy="240" r="16"/>
    <text class="neuron-num-dropped" x="246" y="244" text-anchor="middle">0</text>
    <line class="drop-x" x1="234" y1="228" x2="258" y2="252"/>
    <line class="drop-x" x1="258" y1="228" x2="234" y2="252"/>
    <!-- Neuron 6 (kept) -->
    <circle class="neuron-active-train" cx="288" cy="240" r="16"/>
    <text class="neuron-num" x="288" y="244" text-anchor="middle">1.33</text>
    <!-- Neuron 7 (kept) -->
    <circle class="neuron-active-train" cx="330" cy="240" r="16"/>
    <text class="neuron-num" x="330" y="244" text-anchor="middle">1.33</text>
    <!-- Neuron 8 (kept) -->
    <circle class="neuron-active-train" cx="372" cy="240" r="16"/>
    <text class="neuron-num" x="372" y="244" text-anchor="middle">1.33</text>
  </g>

  <!-- Down arrows from neurons to outgoing -->
  <line class="arrow-flow" x1="78"  y1="258" x2="78"  y2="282" marker-end="url(#ar-flow)"/>
  <line class="arrow-flow" x1="120" y1="258" x2="120" y2="282" marker-end="url(#ar-flow)"/>
  <line class="arrow-flow" x1="162" y1="258" x2="162" y2="282" marker-end="url(#ar-flow)"/>
  <line class="arrow-flow" x1="204" y1="258" x2="204" y2="282" marker-end="url(#ar-flow)"/>
  <line class="arrow-flow" x1="246" y1="258" x2="246" y2="282" marker-end="url(#ar-flow)"/>
  <line class="arrow-flow" x1="288" y1="258" x2="288" y2="282" marker-end="url(#ar-flow)"/>
  <line class="arrow-flow" x1="330" y1="258" x2="330" y2="282" marker-end="url(#ar-flow)"/>
  <line class="arrow-flow" x1="372" y1="258" x2="372" y2="282" marker-end="url(#ar-flow)"/>

  <!-- Outgoing row -->
  <text class="row-label" x="44" y="304">output to next layer</text>
  <g>
    <rect class="val-box" x="60"  y="312" width="36" height="22" rx="3"/>
