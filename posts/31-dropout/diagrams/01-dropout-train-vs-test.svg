    <rect class="val-box" x="228" y="312" width="36" height="22" rx="3"/>
    <rect class="val-box" x="270" y="312" width="36" height="22" rx="3"/>
    <rect class="val-box" x="312" y="312" width="36" height="22" rx="3"/>
    <rect class="val-box" x="354" y="312" width="36" height="22" rx="3"/>
    <text class="val-mono" x="78"  y="328" text-anchor="middle">1.33</text>
    <text class="val-mono" x="120" y="328" text-anchor="middle" style="fill:var(--ce-ink-subtle);">0</text>
    <text class="val-mono" x="162" y="328" text-anchor="middle">1.33</text>
    <text class="val-mono" x="204" y="328" text-anchor="middle">1.33</text>
    <text class="val-mono" x="246" y="328" text-anchor="middle" style="fill:var(--ce-ink-subtle);">0</text>
    <text class="val-mono" x="288" y="328" text-anchor="middle">1.33</text>
    <text class="val-mono" x="330" y="328" text-anchor="middle">1.33</text>
    <text class="val-mono" x="372" y="328" text-anchor="middle">1.33</text>
  </g>

  <!-- Magnitude check -->
  <text class="check-text" x="44"  y="362">magnitude check:</text>
  <text class="check-mono" x="44"  y="382" style="fill:var(--ce-warn);">expected sum  =  6 × 1.33  =  8.0</text>
  <text class="check-text" x="44"  y="398">— equals the input sum; downstream layer sees the right scale</text>

  <!-- ============================ RIGHT panel: TESTING ============================ -->
  <rect class="panel-test" x="492" y="80" width="444" height="332" rx="10"/>
  <rect class="pill-test"  x="492" y="80" width="6"   height="332" rx="3"/>
  <text class="head-test"  x="512" y="106">Testing  ·  same layer  ·  training=False</text>
  <text class="panel-sub"  x="512" y="122">identity pass: no mask, no scaling — the inverted-dropout payoff</text>

  <!-- Incoming row -->
  <text class="row-label" x="512" y="160">incoming activations  a</text>
  <g>
    <rect class="val-box" x="528" y="168" width="36" height="22" rx="3"/>
    <rect class="val-box" x="570" y="168" width="36" height="22" rx="3"/>
    <rect class="val-box" x="612" y="168" width="36" height="22" rx="3"/>
    <rect class="val-box" x="654" y="168" width="36" height="22" rx="3"/>
    <rect class="val-box" x="696" y="168" width="36" height="22" rx="3"/>
    <rect class="val-box" x="738" y="168" width="36" height="22" rx="3"/>
    <rect class="val-box" x="780" y="168" width="36" height="22" rx="3"/>
    <rect class="val-box" x="822" y="168" width="36" height="22" rx="3"/>
    <text class="val-mono" x="546" y="184" text-anchor="middle">1.0</text>
    <text class="val-mono" x="588" y="184" text-anchor="middle">1.0</text>
    <text class="val-mono" x="630" y="184" text-anchor="middle">1.0</text>
    <text class="val-mono" x="672" y="184" text-anchor="middle">1.0</text>
    <text class="val-mono" x="714" y="184" text-anchor="middle">1.0</text>
    <text class="val-mono" x="756" y="184" text-anchor="middle">1.0</text>
    <text class="val-mono" x="798" y="184" text-anchor="middle">1.0</text>
    <text class="val-mono" x="840" y="184" text-anchor="middle">1.0</text>
  </g>

  <!-- Down arrows -->
  <line class="arrow-flow" x1="546" y1="194" x2="546" y2="218" marker-end="url(#ar-flow)"/>
  <line class="arrow-flow" x1="588" y1="194" x2="588" y2="218" marker-end="url(#ar-flow)"/>
  <line class="arrow-flow" x1="630" y1="194" x2="630" y2="218" marker-end="url(#ar-flow)"/>
  <line class="arrow-flow" x1="672" y1="194" x2="672" y2="218" marker-end="url(#ar-flow)"/>
  <line class="arrow-flow" x1="714" y1="194" x2="714" y2="218" marker-end="url(#ar-flow)"/>
  <line class="arrow-flow" x1="756" y1="194" x2="756" y2="218" marker-end="url(#ar-flow)"/>
  <line class="arrow-flow" x1="798" y1="194" x2="798" y2="218" marker-end="url(#ar-flow)"/>
  <line class="arrow-flow" x1="840" y1="194" x2="840" y2="218" marker-end="url(#ar-flow)"/>

  <!-- Neurons row (testing): all active -->
  <g>
    <circle class="neuron-test" cx="546" cy="240" r="16"/><text class="neuron-num" x="546" y="244" text-anchor="middle">1.0</text>
    <circle class="neuron-test" cx="588" cy="240" r="16"/><text class="neuron-num" x="588" y="244" text-anchor="middle">1.0</text>
    <circle class="neuron-test" cx="630" cy="240" r="16"/><text class="neuron-num" x="630" y="244" text-anchor="middle">1.0</text>
    <circle class="neuron-test" cx="672" cy="240" r="16"/><text class="neuron-num" x="672" y="244" text-anchor="middle">1.0</text>
    <circle class="neuron-test" cx="714" cy="240" r="16"/><text class="neuron-num" x="714" y="244" text-anchor="middle">1.0</text>
    <circle class="neuron-test" cx="756" cy="240" r="16"/><text class="neuron-num" x="756" y="244" text-anchor="middle">1.0</text>
    <circle class="neuron-test" cx="798" cy="240" r="16"/><text class="neuron-num" x="798" y="244" text-anchor="middle">1.0</text>
    <circle class="neuron-test" cx="840" cy="240" r="16"/><text class="neuron-num" x="840" y="244" text-anchor="middle">1.0</text>
  </g>

  <!-- Down arrows to outgoing -->
  <line class="arrow-flow" x1="546" y1="258" x2="546" y2="282" marker-end="url(#ar-flow)"/>
  <line class="arrow-flow" x1="588" y1="258" x2="588" y2="282" marker-end="url(#ar-flow)"/>
  <line class="arrow-flow" x1="630" y1="258" x2="630" y2="282" marker-end="url(#ar-flow)"/>
  <line class="arrow-flow" x1="672" y1="258" x2="672" y2="282" marker-end="url(#ar-flow)"/>
  <line class="arrow-flow" x1="714" y1="258" x2="714" y2="282" marker-end="url(#ar-flow)"/>
  <line class="arrow-flow" x1="756" y1="258" x2="756" y2="282" marker-end="url(#ar-flow)"/>
  <line class="arrow-flow" x1="798" y1="258" x2="798" y2="282" marker-end="url(#ar-flow)"/>
  <line class="arrow-flow" x1="840" y1="258" x2="840" y2="282" marker-end="url(#ar-flow)"/>

  <!-- Outgoing -->
  <text class="row-label" x="512" y="304">output to next layer</text>
  <g>
    <rect class="val-box" x="528" y="312" width="36" height="22" rx="3"/>
    <rect class="val-box" x="570" y="312" width="36" height="22" rx="3"/>
    <rect class="val-box" x="612" y="312" width="36" height="22" rx="3"/>
    <rect class="val-box" x="654" y="312" width="36" height="22" rx="3"/>
    <rect class="val-box" x="696" y="312" width="36" height="22" rx="3"/>
    <rect class="val-box" x="738" y="312" width="36" height="22" rx="3"/>
    <rect class="val-box" x="780" y="312" width="36" height="22" rx="3"/>
    <rect class="val-box" x="822" y="312" width="36" height="22" rx="3"/>
    <text class="val-mono" x="546" y="328" text-anchor="middle">1.0</text>
    <text class="val-mono" x="588" y="328" text-anchor="middle">1.0</text>
    <text class="val-mono" x="630" y="328" text-anchor="middle">1.0</text>
    <text class="val-mono" x="672" y="328" text-anchor="middle">1.0</text>
    <text class="val-mono" x="714" y="328" text-anchor="middle">1.0</text>
    <text class="val-mono" x="756" y="328" text-anchor="middle">1.0</text>
    <text class="val-mono" x="798" y="328" text-anchor="middle">1.0</text>
