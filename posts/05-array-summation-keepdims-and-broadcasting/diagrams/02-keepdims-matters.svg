<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" role="img" aria-labelledby="t d">
  <title id="t">Why keepdims=True matters: silent wrong answer vs correct answer</title>
  <desc id="d">Two side-by-side panels demonstrate the consequence of forgetting keepdims=True when subtracting a per-row maximum from a 2-D array. Left panel, in alert red: without keepdims the max returns a 1-D array of shape 3 comma, which broadcasts as a row vector and produces silently wrong numbers. Right panel, in success green: with keepdims=True the max returns a column of shape 3 by 1, which broadcasts correctly across columns and yields the expected per-row centred values.</desc>

  <style><![CDATA[
    :root{
      --ce-bg:#FAFAF7;--ce-surface:#FFFFFF;--ce-ink:#1A1A1A;--ce-ink-muted:#5C5C5C;--ce-ink-subtle:#9A9A9A;
      --ce-border:#D9D9D4;--ce-primary:#5B7FBF;--ce-accent:#D98E5F;
      --ce-success:#5C9E78;--ce-warn:#B8895A;--ce-alert:#C66B5E;--ce-neutral-1:#EAEAE4;
    }
    @media (prefers-color-scheme: dark){
      :root{
        --ce-bg:#0E0F12;--ce-surface:#16181C;--ce-ink:#F2F2EE;--ce-ink-muted:#B4B4AE;--ce-ink-subtle:#6E6E68;
        --ce-border:#2A2D33;--ce-primary:#8BA8E0;--ce-accent:#E8B088;
        --ce-success:#7FBF9B;--ce-warn:#D4B58A;--ce-alert:#D88880;--ce-neutral-1:#1F2229;
      }
    }
    text{font-family:Inter,system-ui,sans-serif;}
    .mono{font-family:"JetBrains Mono",ui-monospace,monospace;}
    .bg{fill:var(--ce-bg);}
    .title{font-weight:600;font-size:22px;fill:var(--ce-ink);}
    .subtitle{font-size:13px;fill:var(--ce-ink-muted);}
    .footer{font-size:11px;fill:var(--ce-ink-subtle);}
    .panel-bad{fill:var(--ce-alert);fill-opacity:0.06;stroke:var(--ce-alert);stroke-width:1.5;}
    .panel-ok {fill:var(--ce-success);fill-opacity:0.07;stroke:var(--ce-success);stroke-width:1.5;}
    .pill-bad{fill:var(--ce-alert);}
    .pill-ok{fill:var(--ce-success);}
    .head-bad{font-weight:700;font-size:15px;fill:var(--ce-alert);}
    .head-ok{font-weight:700;font-size:15px;fill:var(--ce-success);}
    .panel-sub{font-size:11px;fill:var(--ce-ink-muted);}
    .code-pill{fill:var(--ce-surface);stroke:var(--ce-border);stroke-width:1;}
    .code-text{font-family:"JetBrains Mono",ui-monospace,monospace;font-size:12px;fill:var(--ce-ink);}
    .cell-num{font-family:"JetBrains Mono",ui-monospace,monospace;font-size:12px;font-weight:600;fill:var(--ce-ink);}
    .cell-base{fill:var(--ce-neutral-1);stroke:var(--ce-border);stroke-width:1;}
    .cell-bad{fill:var(--ce-alert);fill-opacity:0.20;stroke:var(--ce-alert);stroke-width:1.2;}
    .cell-ok{fill:var(--ce-success);fill-opacity:0.20;stroke:var(--ce-success);stroke-width:1.2;}
    .label-text{font-size:11px;fill:var(--ce-ink-muted);}
    .verdict-bad{font-size:13px;font-weight:700;fill:var(--ce-alert);}
    .verdict-ok{font-size:13px;font-weight:700;fill:var(--ce-success);}
    .shape-text{font-family:"JetBrains Mono",ui-monospace,monospace;font-size:11px;fill:var(--ce-ink-muted);font-weight:600;}
    .op-text{font-weight:700;font-size:14px;fill:var(--ce-ink);}
  ]]></style>

  <rect class="bg" width="960" height="500"/>

  <text class="title"    x="48" y="48">Why keepdims=True matters</text>
  <text class="subtitle" x="48" y="70">Subtract the per-row maximum from each row. With and without keepdims gives different shapes and different answers.</text>

  <!-- ====================== LEFT PANEL: BAD ====================== -->
  <rect class="panel-bad" x="48" y="96" width="424" height="332" rx="12"/>
  <rect class="pill-bad"  x="48" y="96" width="6"   height="332" rx="3"/>
  <text class="head-bad" x="68" y="124">Without keepdims  (silently wrong)</text>
  <rect class="code-pill" x="68" y="138" width="384" height="24" rx="6"/>
  <text class="code-text" x="80" y="155">max_vals = np.max(a, axis=1)</text>

  <!-- a (3x3) -->
  <text class="label-text" x="116" y="184" text-anchor="middle">a</text>
  <g transform="translate(80, 192)">
    <rect class="cell-base" x="0"  y="0"  width="36" height="28"/>
    <rect class="cell-base" x="36" y="0"  width="36" height="28"/>
    <rect class="cell-base" x="72" y="0"  width="36" height="28"/>
    <rect class="cell-base" x="0"  y="28" width="36" height="28"/>
    <rect class="cell-base" x="36" y="28" width="36" height="28"/>
    <rect class="cell-base" x="72" y="28" width="36" height="28"/>
    <rect class="cell-base" x="0"  y="56" width="36" height="28"/>
    <rect class="cell-base" x="36" y="56" width="36" height="28"/>
    <rect class="cell-base" x="72" y="56" width="36" height="28"/>
    <text class="cell-num" x="18" y="19" text-anchor="middle">1</text>
    <text class="cell-num" x="54" y="19" text-anchor="middle">2</text>
    <text class="cell-num" x="90" y="19" text-anchor="middle">3</text>
    <text class="cell-num" x="18" y="47" text-anchor="middle">4</text>
    <text class="cell-num" x="54" y="47" text-anchor="middle">5</text>
    <text class="cell-num" x="90" y="47" text-anchor="middle">6</text>
    <text class="cell-num" x="18" y="75" text-anchor="middle">7</text>
    <text class="cell-num" x="54" y="75" text-anchor="middle">8</text>
    <text class="cell-num" x="90" y="75" text-anchor="middle">9</text>
  </g>

  <text class="op-text" x="216" y="234" text-anchor="middle">−</text>

  <!-- max_vals as a (3,) → broadcasts as (1,3) row -->
  <text class="label-text" x="288" y="184" text-anchor="middle">max_vals</text>
  <g transform="translate(240, 192)">
    <rect class="cell-bad" x="0"  y="0" width="36" height="28"/>
    <rect class="cell-bad" x="36" y="0" width="36" height="28"/>
    <rect class="cell-bad" x="72" y="0" width="36" height="28"/>
    <text class="cell-num" x="18" y="19" text-anchor="middle">3</text>
    <text class="cell-num" x="54" y="19" text-anchor="middle">6</text>
    <text class="cell-num" x="90" y="19" text-anchor="middle">9</text>
  </g>
  <text class="shape-text" x="288" y="244" text-anchor="middle">shape (3,)</text>
  <text class="shape-text" x="288" y="260" text-anchor="middle" style="fill:var(--ce-alert);">broadcasts as a row!</text>

  <text class="op-text" x="368" y="234" text-anchor="middle">=</text>

  <!-- result (wrong) -->
  <g transform="translate(390, 192)">
    <rect class="cell-bad" x="0"  y="0"  width="32" height="28"/>
    <rect class="cell-bad" x="32" y="0"  width="32" height="28"/>
    <rect class="cell-bad" x="64" y="0"  width="32" height="28"/>
    <rect class="cell-bad" x="0"  y="28" width="32" height="28"/>
    <rect class="cell-bad" x="32" y="28" width="32" height="28"/>
    <rect class="cell-bad" x="64" y="28" width="32" height="28"/>
    <rect class="cell-bad" x="0"  y="56" width="32" height="28"/>
    <rect class="cell-bad" x="32" y="56" width="32" height="28"/>
    <rect class="cell-bad" x="64" y="56" width="32" height="28"/>
    <text class="cell-num" x="16" y="19" text-anchor="middle">-2</text>
    <text class="cell-num" x="48" y="19" text-anchor="middle">-4</text>
    <text class="cell-num" x="80" y="19" text-anchor="middle">-6</text>
    <text class="cell-num" x="16" y="47" text-anchor="middle">1</text>
    <text class="cell-num" x="48" y="47" text-anchor="middle">-1</text>
    <text class="cell-num" x="80" y="47" text-anchor="middle">-3</text>
    <text class="cell-num" x="16" y="75" text-anchor="middle">4</text>
    <text class="cell-num" x="48" y="75" text-anchor="middle">2</text>
    <text class="cell-num" x="80" y="75" text-anchor="middle">0</text>
  </g>

  <text class="verdict-bad" x="68" y="312">Wrong: subtracted 3, 6, 9 from each column.</text>
  <text class="label-text"  x="68" y="332">No error raised. The numbers look plausible.</text>
  <text class="label-text"  x="68" y="352">Bug hides until the next layer behaves oddly.</text>
  <text class="label-text"  x="68" y="376" style="fill:var(--ce-ink);font-weight:600;">Expected each row to end with 0. It does not.</text>

  <!-- ====================== RIGHT PANEL: GOOD ====================== -->
  <rect class="panel-ok" x="488" y="96" width="424" height="332" rx="12"/>
  <rect class="pill-ok"  x="488" y="96" width="6"   height="332" rx="3"/>
  <text class="head-ok" x="508" y="124">With keepdims=True  (correct)</text>
  <rect class="code-pill" x="508" y="138" width="384" height="24" rx="6"/>
  <text class="code-text" x="520" y="155">max_vals = np.max(a, axis=1, keepdims=True)</text>

  <!-- a -->
  <text class="label-text" x="556" y="184" text-anchor="middle">a</text>
  <g transform="translate(520, 192)">
    <rect class="cell-base" x="0"  y="0"  width="36" height="28"/>
    <rect class="cell-base" x="36" y="0"  width="36" height="28"/>
    <rect class="cell-base" x="72" y="0"  width="36" height="28"/>
    <rect class="cell-base" x="0"  y="28" width="36" height="28"/>
    <rect class="cell-base" x="36" y="28" width="36" height="28"/>
    <rect class="cell-base" x="72" y="28" width="36" height="28"/>
    <rect class="cell-base" x="0"  y="56" width="36" height="28"/>
    <rect class="cell-base" x="36" y="56" width="36" height="28"/>
    <rect class="cell-base" x="72" y="56" width="36" height="28"/>
    <text class="cell-num" x="18" y="19" text-anchor="middle">1</text>
    <text class="cell-num" x="54" y="19" text-anchor="middle">2</text>
    <text class="cell-num" x="90" y="19" text-anchor="middle">3</text>
    <text class="cell-num" x="18" y="47" text-anchor="middle">4</text>
    <text class="cell-num" x="54" y="47" text-anchor="middle">5</text>
    <text class="cell-num" x="90" y="47" text-anchor="middle">6</text>
    <text class="cell-num" x="18" y="75" text-anchor="middle">7</text>
    <text class="cell-num" x="54" y="75" text-anchor="middle">8</text>
    <text class="cell-num" x="90" y="75" text-anchor="middle">9</text>
  </g>

  <text class="op-text" x="656" y="234" text-anchor="middle">−</text>

  <!-- max_vals as a column (3,1) -->
  <text class="label-text" x="708" y="184" text-anchor="middle">max_vals</text>
  <g transform="translate(688, 192)">
    <rect class="cell-ok" x="0" y="0"  width="40" height="28"/>
    <rect class="cell-ok" x="0" y="28" width="40" height="28"/>
    <rect class="cell-ok" x="0" y="56" width="40" height="28"/>
    <text class="cell-num" x="20" y="19" text-anchor="middle">3</text>
    <text class="cell-num" x="20" y="47" text-anchor="middle">6</text>
    <text class="cell-num" x="20" y="75" text-anchor="middle">9</text>
  </g>
  <text class="shape-text" x="708" y="306" text-anchor="middle">shape (3, 1)</text>
  <text class="shape-text" x="708" y="322" text-anchor="middle" style="fill:var(--ce-success);">broadcasts as a column</text>

  <text class="op-text" x="754" y="234" text-anchor="middle">=</text>

  <!-- result (correct) -->
  <g transform="translate(776, 192)">
    <rect class="cell-ok" x="0"  y="0"  width="32" height="28"/>
    <rect class="cell-ok" x="32" y="0"  width="32" height="28"/>
    <rect class="cell-ok" x="64" y="0"  width="32" height="28"/>
    <rect class="cell-ok" x="0"  y="28" width="32" height="28"/>
    <rect class="cell-ok" x="32" y="28" width="32" height="28"/>
    <rect class="cell-ok" x="64" y="28" width="32" height="28"/>
    <rect class="cell-ok" x="0"  y="56" width="32" height="28"/>
    <rect class="cell-ok" x="32" y="56" width="32" height="28"/>
    <rect class="cell-ok" x="64" y="56" width="32" height="28"/>
    <text class="cell-num" x="16" y="19" text-anchor="middle">-2</text>
    <text class="cell-num" x="48" y="19" text-anchor="middle">-1</text>
    <text class="cell-num" x="80" y="19" text-anchor="middle">0</text>
    <text class="cell-num" x="16" y="47" text-anchor="middle">-2</text>
    <text class="cell-num" x="48" y="47" text-anchor="middle">-1</text>
    <text class="cell-num" x="80" y="47" text-anchor="middle">0</text>
    <text class="cell-num" x="16" y="75" text-anchor="middle">-2</text>
    <text class="cell-num" x="48" y="75" text-anchor="middle">-1</text>
    <text class="cell-num" x="80" y="75" text-anchor="middle">0</text>
  </g>

  <text class="verdict-ok" x="508" y="356">Correct: subtracted 3, 6, 9 from each row.</text>
  <text class="label-text" x="508" y="376" style="fill:var(--ce-ink);font-weight:600;">Each row ends with 0, as expected.</text>

  <!-- Footer -->
  <text class="footer" x="48"  y="476">Rule of thumb: pass keepdims=True whenever the reduced array will be broadcast back against its source.</text>
</svg>
