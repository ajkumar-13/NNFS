<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" role="img" aria-labelledby="t d">
  <title id="t">Cross-entropy backward: element-wise division by the prediction, normalised by batch size</title>
  <desc id="d">A worked-example diagram showing the cross-entropy backward pass for a batch of three samples. The true labels matrix (one-hot, 3 by 3) is shown on the left; the predicted probabilities (3 by 3) are shown next; the gradient (-y / y_pred) is the element-wise division of the first by the second; finally the batch-normalised gradient divides by N = 3. Only one entry per row is non-zero because of the one-hot labels.</desc>

  <style><![CDATA[
    :root{
      --ce-bg:#FAFAF7;--ce-surface:#FFFFFF;--ce-ink:#1A1A1A;--ce-ink-muted:#5C5C5C;--ce-ink-subtle:#9A9A9A;
      --ce-border:#D9D9D4;--ce-primary:#5B7FBF;--ce-accent:#D98E5F;
      --ce-success:#5C9E78;--ce-warn:#B8895A;--ce-alert:#C66B5E;--ce-neutral-1:#EAEAE4;
    }
    @media (prefers-color-scheme: dark){
      :root{
        --ce-bg:#0E0F12;--ce-surface:#16181C;--ce-ink:#F2F2EE;--ce-ink-muted:#B4B4AE;--ce-ink-subtle:#6E6E68;
        --ce-border:#2A2D33;--ce-primary:#8BA8E0;--ce-accent:#E8B088;
        --ce-success:#7FBF9B;--ce-warn:#D4B58A;--ce-alert:#D88880;--ce-neutral-1:#1F2229;
      }
    }
    text{font-family:Inter,system-ui,sans-serif;}
    .mono{font-family:"JetBrains Mono",ui-monospace,monospace;}
    .bg{fill:var(--ce-bg);}
    .title{font-weight:600;font-size:22px;fill:var(--ce-ink);}
    .subtitle{font-size:13px;fill:var(--ce-ink-muted);}
    .footer{font-size:11px;fill:var(--ce-ink-subtle);}
    .label-head{font-weight:700;font-size:13px;fill:var(--ce-ink);font-family:"JetBrains Mono",ui-monospace,monospace;}
    .label-sub{font-size:11px;fill:var(--ce-ink-muted);}
    .cell-ytrue-hot{fill:var(--ce-accent);fill-opacity:0.30;stroke:var(--ce-accent);stroke-width:1.2;}
    .cell-ytrue-zero{fill:var(--ce-neutral-1);stroke:var(--ce-border);stroke-width:1;}
    .cell-ypred{fill:var(--ce-primary);fill-opacity:0.16;stroke:var(--ce-primary);stroke-width:1;}
    .cell-grad-hot{fill:var(--ce-alert);fill-opacity:0.30;stroke:var(--ce-alert);stroke-width:1.2;}
    .cell-grad-zero{fill:var(--ce-neutral-1);stroke:var(--ce-border);stroke-width:1;}
    .cell-text{font-family:"JetBrains Mono",ui-monospace,monospace;font-size:11px;font-weight:600;fill:var(--ce-ink);}
    .op{font-weight:700;font-size:20px;fill:var(--ce-ink);}
    .formula-band{fill:var(--ce-primary);fill-opacity:0.08;stroke:var(--ce-primary);stroke-width:1.5;}
    .formula-head{font-weight:700;font-size:13px;fill:var(--ce-primary);}
    .formula-text{font-family:"JetBrains Mono",ui-monospace,monospace;font-size:13px;fill:var(--ce-ink);font-weight:600;}
  ]]></style>

  <rect class="bg" width="960" height="480"/>

  <text class="title"    x="48" y="48">Cross-entropy backward: −y / ŷ, divided by N</text>
  <text class="subtitle" x="48" y="70">One-hot labels collapse the gradient to one non-zero entry per row. Batch averaging keeps the magnitude stable.</text>

  <!-- ============================ y_true ============================ -->
  <text class="label-head" x="138" y="112" text-anchor="middle">y_true</text>
  <text class="label-sub"  x="138" y="128" text-anchor="middle">one-hot</text>

  <g transform="translate(60, 144)">
    <rect class="cell-ytrue-hot"  x="0"   y="0"  width="52" height="32"/>
    <rect class="cell-ytrue-zero" x="52"  y="0"  width="52" height="32"/>
    <rect class="cell-ytrue-zero" x="104" y="0"  width="52" height="32"/>
    <rect class="cell-ytrue-zero" x="0"   y="32" width="52" height="32"/>
    <rect class="cell-ytrue-hot"  x="52"  y="32" width="52" height="32"/>
    <rect class="cell-ytrue-zero" x="104" y="32" width="52" height="32"/>
    <rect class="cell-ytrue-zero" x="0"   y="64" width="52" height="32"/>
    <rect class="cell-ytrue-zero" x="52"  y="64" width="52" height="32"/>
    <rect class="cell-ytrue-hot"  x="104" y="64" width="52" height="32"/>
    <text class="cell-text" x="26"  y="21" text-anchor="middle">1</text>
    <text class="cell-text" x="78"  y="21" text-anchor="middle">0</text>
    <text class="cell-text" x="130" y="21" text-anchor="middle">0</text>
    <text class="cell-text" x="26"  y="53" text-anchor="middle">0</text>
    <text class="cell-text" x="78"  y="53" text-anchor="middle">1</text>
    <text class="cell-text" x="130" y="53" text-anchor="middle">0</text>
    <text class="cell-text" x="26"  y="85" text-anchor="middle">0</text>
    <text class="cell-text" x="78"  y="85" text-anchor="middle">0</text>
    <text class="cell-text" x="130" y="85" text-anchor="middle">1</text>
  </g>

  <text class="op" x="248" y="200" text-anchor="middle">÷</text>

  <!-- ============================ y_pred ============================ -->
  <text class="label-head" x="350" y="112" text-anchor="middle">ŷ (predictions)</text>
  <text class="label-sub"  x="350" y="128" text-anchor="middle">softmax output</text>

  <g transform="translate(272, 144)">
    <rect class="cell-ypred" x="0"   y="0"  width="52" height="32"/>
    <rect class="cell-ypred" x="52"  y="0"  width="52" height="32"/>
    <rect class="cell-ypred" x="104" y="0"  width="52" height="32"/>
    <rect class="cell-ypred" x="0"   y="32" width="52" height="32"/>
    <rect class="cell-ypred" x="52"  y="32" width="52" height="32"/>
    <rect class="cell-ypred" x="104" y="32" width="52" height="32"/>
    <rect class="cell-ypred" x="0"   y="64" width="52" height="32"/>
    <rect class="cell-ypred" x="52"  y="64" width="52" height="32"/>
    <rect class="cell-ypred" x="104" y="64" width="52" height="32"/>
    <text class="cell-text" x="26"  y="21" text-anchor="middle">0.7</text>
    <text class="cell-text" x="78"  y="21" text-anchor="middle">0.2</text>
    <text class="cell-text" x="130" y="21" text-anchor="middle">0.1</text>
    <text class="cell-text" x="26"  y="53" text-anchor="middle">0.1</text>
    <text class="cell-text" x="78"  y="53" text-anchor="middle">0.6</text>
    <text class="cell-text" x="130" y="53" text-anchor="middle">0.3</text>
    <text class="cell-text" x="26"  y="85" text-anchor="middle">0.2</text>
    <text class="cell-text" x="78"  y="85" text-anchor="middle">0.3</text>
    <text class="cell-text" x="130" y="85" text-anchor="middle">0.5</text>
  </g>

  <text class="op" x="460" y="200" text-anchor="middle">=</text>
  <text class="op" x="460" y="232" text-anchor="middle" style="font-size:14px;">×(−1/N)</text>

  <!-- ============================ Gradient ============================ -->
  <text class="label-head" x="580" y="112" text-anchor="middle">gradient ∂L/∂ŷ</text>
  <text class="label-sub"  x="580" y="128" text-anchor="middle">= −y / ŷ / N    (N = 3)</text>

  <g transform="translate(488, 144)">
    <rect class="cell-grad-hot"  x="0"   y="0"  width="60" height="32"/>
    <rect class="cell-grad-zero" x="60"  y="0"  width="60" height="32"/>
    <rect class="cell-grad-zero" x="120" y="0"  width="60" height="32"/>
    <rect class="cell-grad-zero" x="0"   y="32" width="60" height="32"/>
    <rect class="cell-grad-hot"  x="60"  y="32" width="60" height="32"/>
    <rect class="cell-grad-zero" x="120" y="32" width="60" height="32"/>
    <rect class="cell-grad-zero" x="0"   y="64" width="60" height="32"/>
    <rect class="cell-grad-zero" x="60"  y="64" width="60" height="32"/>
    <rect class="cell-grad-hot"  x="120" y="64" width="60" height="32"/>
    <text class="cell-text" x="30"  y="21" text-anchor="middle">−0.476</text>
    <text class="cell-text" x="90"  y="21" text-anchor="middle">0</text>
    <text class="cell-text" x="150" y="21" text-anchor="middle">0</text>
    <text class="cell-text" x="30"  y="53" text-anchor="middle">0</text>
    <text class="cell-text" x="90"  y="53" text-anchor="middle">−0.556</text>
    <text class="cell-text" x="150" y="53" text-anchor="middle">0</text>
    <text class="cell-text" x="30"  y="85" text-anchor="middle">0</text>
    <text class="cell-text" x="90"  y="85" text-anchor="middle">0</text>
    <text class="cell-text" x="150" y="85" text-anchor="middle">−0.667</text>
  </g>

  <!-- ============================ Right panel: one-row explanation ============================ -->
  <text class="label-head" x="720" y="112">Row 1, in detail</text>
  <text class="label-sub"  x="720" y="130">y_true = [1, 0, 0]   ŷ = [0.7, 0.2, 0.1]</text>

  <text class="label-sub"  x="720" y="160">Position 0:  −y / ŷ = −1 / 0.7  =  −1.429</text>
  <text class="label-sub"  x="720" y="178">  ÷ N (3)                           =  −0.476</text>
  <text class="label-sub"  x="720" y="206">Position 1:  −0 / 0.2 / 3           =  0</text>
  <text class="label-sub"  x="720" y="224">Position 2:  −0 / 0.1 / 3           =  0</text>

  <text class="label-sub"  x="720" y="258">The one-hot vector kills the other two</text>
  <text class="label-sub"  x="720" y="276">positions; the wrong-class predictions</text>
  <text class="label-sub"  x="720" y="294">never enter this row's gradient.</text>

  <!-- ============================ Bottom band: formula ============================ -->
  <rect class="formula-band" x="48" y="356" width="864" height="100" rx="12"/>
  <text class="formula-head" x="68" y="382">The two-line backward, in code</text>
  <text class="formula-text" x="68" y="408">if len(y_true.shape) == 1:     y_true = np.eye(labels)[y_true]</text>
  <text class="formula-text" x="68" y="430">self.dinputs = (−y_true / dvalues) / samples</text>
</svg>
