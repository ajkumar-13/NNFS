<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 350" font-family="Segoe UI, sans-serif">
  <rect width="820" height="350" rx="16" fill="#fafafa" stroke="#e2e8f0"/>
  <text x="410" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e293b">Cross-Entropy Loss — Backward Pass</text>

  <!-- Formula -->
  <g transform="translate(60,55)">
    <rect width="700" height="60" rx="10" fill="#eef2ff" stroke="#6366f1"/>
    <text x="350" y="22" text-anchor="middle" font-size="14" font-weight="600" fill="#4338ca">Categorical Cross-Entropy Loss (sample i)</text>
    <text x="350" y="46" text-anchor="middle" font-size="15" fill="#4338ca">L_i = − Σⱼ  y_ij · log(ŷ_ij)</text>
  </g>

  <!-- Derivative -->
  <g transform="translate(60,135)">
    <rect width="700" height="55" rx="10" fill="#fef2f2" stroke="#ef4444"/>
    <text x="350" y="22" text-anchor="middle" font-size="14" font-weight="600" fill="#ef4444">Gradient (per sample, per output neuron)</text>
    <text x="350" y="44" text-anchor="middle" font-size="15" fill="#ef4444">∂L_i / ∂ŷ_ij  =  − y_ij / ŷ_ij</text>
  </g>

  <!-- Vectorized -->
  <g transform="translate(60,210)">
    <rect width="340" height="60" rx="10" fill="#f0fdf4" stroke="#10b981"/>
    <text x="170" y="22" text-anchor="middle" font-size="13" font-weight="600" fill="#059669">Vectorized (one sample)</text>
    <text x="170" y="44" text-anchor="middle" font-size="14" font-family="Consolas" fill="#059669">dinputs = -y_true / y_pred</text>
  </g>
  <g transform="translate(420,210)">
    <rect width="340" height="60" rx="10" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="170" y="22" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">Batch: normalize by N samples</text>
    <text x="170" y="44" text-anchor="middle" font-size="14" font-family="Consolas" fill="#92400e">dinputs = dinputs / N</text>
  </g>

  <!-- One-hot note -->
  <g transform="translate(60,290)">
    <rect width="700" height="45" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-dasharray="4,2"/>
    <text x="350" y="18" text-anchor="middle" font-size="12" fill="#64748b">If y_true is class indices (e.g. [1, 2, 3]), convert to one-hot first:</text>
    <text x="350" y="36" text-anchor="middle" font-size="13" font-family="Consolas" fill="#64748b">y_true_onehot = np.eye(n_labels)[y_true]</text>
  </g>
</svg>