<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480">
  <rect width="720" height="480" rx="16" fill="#fafafa"/>
  <text x="360" y="30" text-anchor="middle" font-family="Segoe UI" font-size="17" font-weight="700" fill="#1e1e2e">Strategy 1 vs Strategy 2</text>

  <!-- ===== STRATEGY 1 ===== -->
  <rect x="20" y="46" width="330" height="420" rx="12" fill="white" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="20" y="46" width="330" height="34" rx="12" fill="#ef4444"/>
  <rect x="20" y="66" width="330" height="14" fill="#ef4444"/>
  <text x="185" y="70" text-anchor="middle" font-family="Segoe UI" font-size="13" font-weight="700" fill="white">Strategy 1: Random Selection</text>

  <!-- Description -->
  <text x="40" y="102" font-family="Segoe UI" font-size="11" fill="#64748b">Each iteration: pick entirely new</text>
  <text x="40" y="118" font-family="Segoe UI" font-size="11" fill="#64748b">random weights &amp; biases.</text>

  <!-- Mini loss curve with scattered dots -->
  <rect x="40" y="132" width="290" height="140" rx="8" fill="#fef2f2" stroke="#fecaca"/>
  <!-- Curve -->
  <path d="M 60,220 Q 100,180 140,240 Q 180,260 220,200 Q 260,160 300,260" stroke="#ef4444" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- Random scattered points -->
  <circle cx="80" cy="180" r="4" fill="#ef4444" opacity="0.6"/>
  <circle cx="120" cy="250" r="4" fill="#ef4444" opacity="0.6"/>
  <circle cx="170" cy="160" r="4" fill="#ef4444" opacity="0.6"/>
  <circle cx="210" cy="230" r="4" fill="#ef4444" opacity="0.6"/>
  <circle cx="250" cy="190" r="4" fill="#ef4444" opacity="0.6"/>
  <circle cx="290" cy="220" r="4" fill="#ef4444" opacity="0.6"/>
  <circle cx="140" cy="200" r="4" fill="#ef4444" opacity="0.6"/>
  <circle cx="260" cy="260" r="4" fill="#ef4444" opacity="0.6"/>
  <!-- Paths between dots (jumping around) -->
  <path d="M 80,180 L 120,250 L 170,160 L 210,230 L 250,190 L 290,220 L 140,200 L 260,260"
        stroke="#ef4444" stroke-width="0.8" fill="none" stroke-dasharray="3,3" opacity="0.4"/>
  <text x="185" y="150" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#991b1b">Random jumps, no memory</text>

  <!-- Results -->
  <rect x="40" y="286" width="290" height="76" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="185" y="306" text-anchor="middle" font-family="Segoe UI" font-size="12" font-weight="700" fill="#991b1b">Results (100k iterations)</text>
  <text x="60" y="326" font-family="Consolas" font-size="12" fill="#991b1b">Loss:     1.099 → 1.095</text>
  <text x="60" y="346" font-family="Consolas" font-size="12" fill="#991b1b">Accuracy: 33% (random!)</text>

  <!-- Verdict -->
  <rect x="40" y="376" width="290" height="76" rx="8" fill="white" stroke="#ef4444" stroke-width="1"/>
  <text x="185" y="400" text-anchor="middle" font-family="Segoe UI" font-size="24" fill="#ef4444">✗</text>
  <text x="185" y="422" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#991b1b">Ignores previous information.</text>
  <text x="185" y="438" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#991b1b">Like throwing darts blindfolded.</text>

  <!-- ===== STRATEGY 2 ===== -->
  <rect x="370" y="46" width="330" height="420" rx="12" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <rect x="370" y="46" width="330" height="34" rx="12" fill="#10b981"/>
  <rect x="370" y="66" width="330" height="14" fill="#10b981"/>
  <text x="535" y="70" text-anchor="middle" font-family="Segoe UI" font-size="13" font-weight="700" fill="white">Strategy 2: Random Adjustment</text>

  <!-- Description -->
  <text x="390" y="102" font-family="Segoe UI" font-size="11" fill="#64748b">If loss decreased: add small random</text>
  <text x="390" y="118" font-family="Segoe UI" font-size="11" fill="#64748b">perturbation. If not: revert.</text>

  <!-- Mini loss curve with directed path -->
  <rect x="390" y="132" width="290" height="140" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/>
  <path d="M 410,220 Q 450,200 490,240 Q 530,260 570,210 Q 610,160 650,250" stroke="#10b981" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- Directed path going downhill -->
  <circle cx="420" cy="210" r="4" fill="#10b981"/>
  <circle cx="450" cy="205" r="4" fill="#10b981"/>
  <circle cx="480" cy="218" r="4" fill="#10b981"/>
  <circle cx="510" cy="230" r="4" fill="#10b981"/>
  <circle cx="540" cy="240" r="4" fill="#10b981"/>
  <circle cx="570" cy="248" r="4" fill="#10b981"/>
  <circle cx="600" cy="252" r="4" fill="#10b981"/>
  <path d="M 420,210 L 450,205 L 480,218 L 510,230 L 540,240 L 570,248 L 600,252"
        stroke="#10b981" stroke-width="1.2" fill="none" marker-end="url(#greenArr)"/>
  <defs>
    <marker id="greenArr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#10b981"/>
    </marker>
  </defs>
  <text x="535" y="150" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#065f46">Gradual descent, keeps good changes</text>

  <!-- Results -->
  <rect x="390" y="286" width="290" height="76" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="535" y="306" text-anchor="middle" font-family="Segoe UI" font-size="12" font-weight="700" fill="#065f46">Results (10k iterations)</text>
  <text x="410" y="326" font-family="Consolas" font-size="12" fill="#065f46">Loss:     1.099 → 0.16</text>
  <text x="410" y="346" font-family="Consolas" font-size="12" fill="#065f46">Accuracy: 94% (vertical)</text>

  <!-- Verdict -->
  <rect x="390" y="376" width="290" height="76" rx="8" fill="white" stroke="#10b981" stroke-width="1"/>
  <text x="535" y="400" text-anchor="middle" font-family="Segoe UI" font-size="24" fill="#10b981">✓ partial</text>
  <text x="535" y="422" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#065f46">Works for simple data (vertical).</text>
  <text x="535" y="438" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#ef4444">Fails on complex data (spiral).</text>
</svg>