<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320">
  <defs>
    <marker id="gArr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#6366f1"/>
    </marker>
    <marker id="rArr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#ef4444"/>
    </marker>
  </defs>
  <rect width="700" height="320" rx="16" fill="#fafafa"/>
  <text x="350" y="30" text-anchor="middle" font-family="Segoe UI" font-size="17" font-weight="700" fill="#1e1e2e">Why We Need Gradients</text>

  <!-- Loss curve -->
  <path d="M 80,80 Q 200,50 260,160 Q 320,270 400,240 Q 480,210 540,260 Q 580,280 640,120"
        stroke="#64748b" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Current point -->
  <circle cx="260" cy="160" r="8" fill="#f59e0b" stroke="white" stroke-width="2.5"/>

  <!-- Random direction (bad) -->
  <line x1="260" y1="160" x2="180" y2="100" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#rArr)"/>
  <text x="160" y="90" text-anchor="middle" font-family="Segoe UI" font-size="11" font-weight="600" fill="#ef4444">Random</text>
  <text x="160" y="104" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#ef4444">(hope for best)</text>

  <!-- Gradient direction (good) -->
  <line x1="260" y1="160" x2="360" y2="230" stroke="#6366f1" stroke-width="2.5" marker-end="url(#gArr)"/>
  <text x="340" y="200" text-anchor="middle" font-family="Segoe UI" font-size="11" font-weight="600" fill="#6366f1">−∇L</text>
  <text x="390" y="248" text-anchor="middle" font-family="Segoe UI" font-size="11" font-weight="600" fill="#6366f1">Gradient descent</text>
  <text x="390" y="264" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#6366f1">(steepest descent)</text>

  <!-- Tangent line showing slope -->
  <line x1="200" y1="110" x2="340" y2="220" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,4" opacity="0.6"/>
  <text x="300" y="145" font-family="Segoe UI" font-size="10" fill="#f59e0b">slope (gradient)</text>

  <!-- Key insight box -->
  <rect x="420" y="44" width="256" height="180" rx="12" fill="white" stroke="#6366f1" stroke-width="1.5"/>
  <text x="548" y="68" text-anchor="middle" font-family="Segoe UI" font-size="13" font-weight="700" fill="#3730a3">The Gradient Tells Us:</text>

  <circle cx="440" cy="92" r="4" fill="#6366f1"/>
  <text x="452" y="96" font-family="Segoe UI" font-size="11" fill="#1e1e2e">Which direction to move</text>

  <circle cx="440" cy="118" r="4" fill="#6366f1"/>
  <text x="452" y="122" font-family="Segoe UI" font-size="11" fill="#1e1e2e">How much to move</text>

  <circle cx="440" cy="144" r="4" fill="#6366f1"/>
  <text x="452" y="148" font-family="Segoe UI" font-size="11" fill="#1e1e2e">For each of the 21 params</text>

  <line x1="436" y1="164" x2="660" y2="164" stroke="#e2e8f0" stroke-width="1"/>
  <text x="548" y="184" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#64748b">Requires calculus:</text>
  <text x="548" y="200" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#64748b">derivatives, partial derivatives,</text>
  <text x="548" y="216" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#64748b">gradients, chain rule</text>

  <!-- Bottom comparison strip -->
  <rect x="80" y="280" width="240" height="28" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="200" y="298" text-anchor="middle" font-family="Segoe UI" font-size="11" font-weight="600" fill="#991b1b">Random: May go uphill ↗</text>

  <rect x="380" y="280" width="240" height="28" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
  <text x="500" y="298" text-anchor="middle" font-family="Segoe UI" font-size="11" font-weight="600" fill="#3730a3">Gradient: Always goes downhill ↘</text>
</svg>