<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380">
  <defs>
    <linearGradient id="lsSurface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="80%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="700" height="380" rx="16" fill="#fafafa"/>
  <text x="350" y="30" text-anchor="middle" font-family="Segoe UI" font-size="17" font-weight="700" fill="#1e1e2e">The Optimisation Problem: Finding the Loss Minimum</text>

  <!-- Loss surface curve -->
  <path d="M 60,120 Q 150,100 200,180 Q 250,260 310,200 Q 340,170 360,280 Q 380,340 420,300 Q 460,260 500,310 Q 530,340 560,240 Q 600,120 660,160"
        stroke="#6366f1" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Fill under curve (light) -->
  <path d="M 60,120 Q 150,100 200,180 Q 250,260 310,200 Q 340,170 360,280 Q 380,340 420,300 Q 460,260 500,310 Q 530,340 560,240 Q 600,120 660,160 L 660,350 L 60,350 Z"
        fill="url(#lsSurface)" opacity="0.3"/>

  <!-- Current position (high on curve) -->
  <circle cx="200" cy="180" r="8" fill="#ef4444" stroke="white" stroke-width="2.5"/>
  <line x1="200" y1="140" x2="200" y2="168" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,3"/>
  <rect x="140" y="110" width="120" height="28" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="200" y="129" text-anchor="middle" font-family="Segoe UI" font-size="12" font-weight="600" fill="#991b1b">We are here</text>
  <text x="200" y="200" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#ef4444">Loss ≈ 1.099</text>

  <!-- Global minimum -->
  <circle cx="420" cy="300" r="8" fill="#10b981" stroke="white" stroke-width="2.5"/>
  <line x1="420" y1="260" x2="420" y2="288" stroke="#10b981" stroke-width="1.5" stroke-dasharray="3,3"/>
  <rect x="370" y="234" width="100" height="28" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="420" y="253" text-anchor="middle" font-family="Segoe UI" font-size="12" font-weight="600" fill="#065f46">Goal: Minima</text>
  <text x="420" y="326" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#10b981">Loss ≈ 0</text>

  <!-- Local minimum -->
  <circle cx="560" cy="240" r="5" fill="#f59e0b" stroke="white" stroke-width="2"/>
  <text x="560" y="228" text-anchor="middle" font-family="Segoe UI" font-size="9" fill="#f59e0b">Local min</text>

  <!-- Question mark arrow -->
  <path d="M 216,182 Q 300,100 400,295" stroke="#6366f1" stroke-width="1.5" fill="none" stroke-dasharray="6,4" marker-end="url(#blueArr)"/>
  <defs>
    <marker id="blueArr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#6366f1"/>
    </marker>
  </defs>
  <text x="310" y="150" text-anchor="middle" font-family="Segoe UI" font-size="12" font-weight="600" fill="#6366f1">How?</text>

  <!-- Axes labels -->
  <text x="360" y="370" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#64748b">Weights &amp; Biases (21 parameters)</text>
  <text x="30" y="220" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#64748b" transform="rotate(-90,30,220)">Loss</text>

  <!-- Parameter count box -->
  <rect x="480" y="56" width="200" height="80" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="580" y="76" text-anchor="middle" font-family="Segoe UI" font-size="11" font-weight="700" fill="#1e1e2e">21 Parameters</text>
  <text x="580" y="94" text-anchor="middle" font-family="Consolas" font-size="10" fill="#64748b">W1: 2×3 = 6   b1: 3</text>
  <text x="580" y="108" text-anchor="middle" font-family="Consolas" font-size="10" fill="#64748b">W2: 3×3 = 9   b2: 3</text>
  <line x1="500" y1="116" x2="660" y2="116" stroke="#e2e8f0" stroke-width="1"/>
  <text x="580" y="130" text-anchor="middle" font-family="Consolas" font-size="10" font-weight="600" fill="#6366f1">Total: 6+3+9+3 = 21</text>
</svg>