<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420">
  <defs>
    <marker id="bpArr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#6366f1"/>
    </marker>
    <marker id="bpBack" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#ef4444"/>
    </marker>
  </defs>
  <rect width="720" height="420" rx="16" fill="#fafafa"/>
  <text x="360" y="28" text-anchor="middle" font-family="Segoe UI" font-size="16" font-weight="700" fill="#1e1e2e">Backpropagation Through a Single Neuron</text>

  <!-- Forward pass labels -->
  <text x="360" y="52" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#6366f1">→ Forward pass (blue)</text>
  <text x="360" y="68" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#ef4444">← Backward pass (red)</text>

  <!-- Inputs column -->
  <rect x="20" y="90" width="70" height="30" rx="6" fill="#eef2ff" stroke="#6366f1"/>
  <text x="55" y="110" text-anchor="middle" font-family="Consolas" font-size="11" fill="#3730a3">x₀=1</text>
  <rect x="20" y="130" width="70" height="30" rx="6" fill="#eef2ff" stroke="#6366f1"/>
  <text x="55" y="150" text-anchor="middle" font-family="Consolas" font-size="11" fill="#3730a3">x₁=−2</text>
  <rect x="20" y="170" width="70" height="30" rx="6" fill="#eef2ff" stroke="#6366f1"/>
  <text x="55" y="190" text-anchor="middle" font-family="Consolas" font-size="11" fill="#3730a3">x₂=3</text>

  <!-- Weights -->
  <rect x="20" y="220" width="70" height="30" rx="6" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="55" y="240" text-anchor="middle" font-family="Consolas" font-size="11" fill="#92400e">w₀=−3</text>
  <rect x="20" y="260" width="70" height="30" rx="6" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="55" y="280" text-anchor="middle" font-family="Consolas" font-size="11" fill="#92400e">w₁=−1</text>
  <rect x="20" y="300" width="70" height="30" rx="6" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="55" y="320" text-anchor="middle" font-family="Consolas" font-size="11" fill="#92400e">w₂=2</text>
  <rect x="20" y="340" width="70" height="30" rx="6" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="55" y="360" text-anchor="middle" font-family="Consolas" font-size="11" fill="#92400e">b=1</text>

  <!-- Multiply nodes -->
  <circle cx="160" cy="105" r="18" fill="white" stroke="#6366f1" stroke-width="1.5"/>
  <text x="160" y="110" text-anchor="middle" font-family="Segoe UI" font-size="16" fill="#6366f1">×</text>
  <text x="160" y="88" text-anchor="middle" font-family="Consolas" font-size="9" fill="#64748b">−3</text>

  <circle cx="160" cy="165" r="18" fill="white" stroke="#6366f1" stroke-width="1.5"/>
  <text x="160" y="170" text-anchor="middle" font-family="Segoe UI" font-size="16" fill="#6366f1">×</text>
  <text x="160" y="148" text-anchor="middle" font-family="Consolas" font-size="9" fill="#64748b">2</text>

  <circle cx="160" cy="225" r="18" fill="white" stroke="#6366f1" stroke-width="1.5"/>
  <text x="160" y="230" text-anchor="middle" font-family="Segoe UI" font-size="16" fill="#6366f1">×</text>
  <text x="160" y="208" text-anchor="middle" font-family="Consolas" font-size="9" fill="#64748b">6</text>

  <!-- Arrows from inputs to multiply -->
  <line x1="92" y1="105" x2="138" y2="105" stroke="#6366f1" stroke-width="1.2" marker-end="url(#bpArr)"/>
  <line x1="92" y1="145" x2="138" y2="155" stroke="#6366f1" stroke-width="1.2" marker-end="url(#bpArr)"/>
  <line x1="92" y1="185" x2="138" y2="215" stroke="#6366f1" stroke-width="1.2" marker-end="url(#bpArr)"/>

  <!-- Sum node -->
  <circle cx="280" cy="180" r="22" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <text x="280" y="185" text-anchor="middle" font-family="Segoe UI" font-size="16" fill="#10b981">Σ</text>
  <text x="280" y="160" text-anchor="middle" font-family="Consolas" font-size="10" fill="#10b981">6</text>

  <!-- Arrows to sum -->
  <line x1="180" y1="105" x2="256" y2="170" stroke="#6366f1" stroke-width="1.2" marker-end="url(#bpArr)"/>
  <line x1="180" y1="165" x2="256" y2="175" stroke="#6366f1" stroke-width="1.2" marker-end="url(#bpArr)"/>
  <line x1="180" y1="225" x2="256" y2="185" stroke="#6366f1" stroke-width="1.2" marker-end="url(#bpArr)"/>
  <line x1="92" y1="355" x2="260" y2="195" stroke="#6366f1" stroke-width="1.2" marker-end="url(#bpArr)"/>

  <!-- ReLU node -->
  <rect x="340" y="164" width="70" height="32" rx="8" fill="white" stroke="#ec4899" stroke-width="1.5"/>
  <text x="375" y="185" text-anchor="middle" font-family="Consolas" font-size="12" font-weight="600" fill="#9d174d">ReLU</text>
  <text x="375" y="158" text-anchor="middle" font-family="Consolas" font-size="10" fill="#ec4899">6</text>

  <line x1="304" y1="180" x2="336" y2="180" stroke="#6366f1" stroke-width="1.2" marker-end="url(#bpArr)"/>

  <!-- Loss node -->
  <rect x="460" y="164" width="80" height="32" rx="8" fill="white" stroke="#ef4444" stroke-width="1.5"/>
  <text x="500" y="185" text-anchor="middle" font-family="Consolas" font-size="11" font-weight="600" fill="#991b1b">(y−0)²</text>
  <text x="500" y="158" text-anchor="middle" font-family="Consolas" font-size="10" fill="#ef4444">36</text>

  <line x1="414" y1="180" x2="456" y2="180" stroke="#6366f1" stroke-width="1.2" marker-end="url(#bpArr)"/>

  <!-- Loss label -->
  <rect x="580" y="164" width="80" height="32" rx="8" fill="#ef4444"/>
  <text x="620" y="185" text-anchor="middle" font-family="Segoe UI" font-size="13" font-weight="700" fill="white">L = 36</text>

  <line x1="544" y1="180" x2="576" y2="180" stroke="#ef4444" stroke-width="1.2" marker-end="url(#bpBack)"/>

  <!-- Backward gradients (red) -->
  <text x="530" y="216" text-anchor="middle" font-family="Consolas" font-size="10" font-weight="700" fill="#ef4444">∂L/∂ReLU=12</text>
  <text x="418" y="216" text-anchor="middle" font-family="Consolas" font-size="10" font-weight="700" fill="#ef4444">∂ReLU/∂Σ=1</text>
  <text x="300" y="216" text-anchor="middle" font-family="Consolas" font-size="10" font-weight="700" fill="#ef4444">∂Σ/∂(xw)=1</text>

  <!-- Backward arrows -->
  <line x1="576" y1="192" x2="544" y2="192" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="456" y1="192" x2="414" y2="192" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="336" y1="192" x2="304" y2="192" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Final gradient results -->
  <rect x="80" y="382" width="560" height="30" rx="8" fill="#eef2ff"/>
  <text x="360" y="402" text-anchor="middle" font-family="Consolas" font-size="12" fill="#991b1b">∂L/∂w₀ = 12·1·1·x₀ = 12    ∂L/∂w₁ = −24    ∂L/∂w₂ = 36    ∂L/∂b = 12</text>
</svg>