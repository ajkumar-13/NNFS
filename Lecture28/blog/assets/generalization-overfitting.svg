<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Segoe UI, sans-serif">
  <defs>
  </defs>

  <rect width="900" height="500" rx="18" fill="#fafafa"/>

  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1e1b4b">Generalization — Training vs Test Performance</text>

  <!-- Good Generalization panel -->
  <rect x="30" y="56" width="400" height="220" rx="14" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="230" y="82" text-anchor="middle" font-size="15" font-weight="700" fill="#065f46">✓ Good Generalization</text>

  <!-- Smooth decision boundary illustration -->
  <rect x="55" y="96" width="150" height="120" rx="8" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
  <!-- Smooth curve -->
  <path d="M70 200 Q110 130 130 160 Q150 190 190 110" stroke="#10b981" stroke-width="2.5" fill="none"/>
  <!-- Data points — some misclassified, that's OK -->
  <circle cx="85" cy="180" r="4" fill="#ef4444"/>
  <circle cx="100" cy="165" r="4" fill="#ef4444"/>
  <circle cx="140" cy="185" r="4" fill="#ef4444"/>
  <circle cx="120" cy="125" r="4" fill="#6366f1"/>
  <circle cx="160" cy="120" r="4" fill="#6366f1"/>
  <circle cx="175" cy="140" r="4" fill="#6366f1"/>
  <!-- Misclassified (on wrong side) -->
  <circle cx="115" cy="150" r="4" fill="#ef4444" opacity="0.5"/>

  <text x="235" y="118" font-size="12" fill="#065f46">• Smooth, simple boundary</text>
  <text x="235" y="138" font-size="12" fill="#065f46">• OK to misclassify a few</text>
  <text x="235" y="158" font-size="12" fill="#065f46">  training points</text>
  <text x="235" y="180" font-size="12" fill="#065f46">• Learns the pattern,</text>
  <text x="235" y="200" font-size="12" fill="#065f46">  ignores noise</text>
  <text x="235" y="228" font-size="13" font-weight="600" fill="#065f46">Train: 88%   Test: 85%</text>
  <text x="235" y="253" font-size="12" fill="#047857">Small gap → healthy</text>

  <!-- Poor Generalization panel -->
  <rect x="470" y="56" width="400" height="220" rx="14" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="670" y="82" text-anchor="middle" font-size="15" font-weight="700" fill="#991b1b">✗ Overfitting</text>

  <!-- Complex decision boundary -->
  <rect x="495" y="96" width="150" height="120" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <!-- Jagged boundary -->
  <path d="M510 200 Q515 180 522 190 Q530 140 540 170 Q548 130 560 155 Q570 115 580 140 Q590 105 600 120 Q610 100 625 110 Q635 95 630 110" stroke="#ef4444" stroke-width="2.5" fill="none"/>
  <!-- All points captured perfectly -->
  <circle cx="520" cy="195" r="4" fill="#ef4444"/>
  <circle cx="536" cy="175" r="4" fill="#ef4444"/>
  <circle cx="555" cy="165" r="4" fill="#ef4444"/>
  <circle cx="570" cy="130" r="4" fill="#6366f1"/>
  <circle cx="595" cy="115" r="4" fill="#6366f1"/>
  <circle cx="615" cy="108" r="4" fill="#6366f1"/>
  <!-- Noisy point captured anyway -->
  <circle cx="545" cy="145" r="4" fill="#ef4444" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="550" y="140" font-size="9" fill="#92400e">noise</text>

  <text x="670" y="118" font-size="12" fill="#991b1b">• Complex, jagged boundary</text>
  <text x="670" y="138" font-size="12" fill="#991b1b">• Captures every point</text>
  <text x="670" y="158" font-size="12" fill="#991b1b">  including noise</text>
  <text x="670" y="180" font-size="12" fill="#991b1b">• Memorizes training data</text>
  <text x="670" y="200" font-size="12" fill="#991b1b">  instead of learning</text>
  <text x="670" y="228" font-size="13" font-weight="600" fill="#991b1b">Train: 93%   Test: 83%</text>
  <text x="670" y="253" font-size="12" fill="#b91c1c">Large gap → overfitting</text>

  <!-- Loss-curve panel -->
  <rect x="30" y="295" width="400" height="185" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="230" y="322" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">Overfitting Signal: Test-Loss Spikes</text>

  <!-- Axes -->
  <line x1="70" y1="340" x2="70" y2="455" stroke="#94a3b8" stroke-width="1"/>
  <line x1="70" y1="455" x2="400" y2="455" stroke="#94a3b8" stroke-width="1"/>
  <text x="65" y="395" text-anchor="end" font-size="10" fill="#64748b" transform="rotate(-90 65 395)">Loss</text>
  <text x="240" y="472" text-anchor="middle" font-size="10" fill="#64748b">Epochs →</text>

  <!-- Train loss — smooth decrease -->
  <path d="M80 360 Q150 370 200 400 Q250 420 350 440" stroke="#10b981" stroke-width="2" fill="none"/>
  <!-- Test loss — decrease then spikes -->
  <path d="M80 355 Q120 365 160 385 L180 370 Q200 395 220 405 L240 380 Q260 410 290 420 L310 395 Q340 425 370 430" stroke="#ef4444" stroke-width="2" fill="none" stroke-dasharray="5,3"/>

  <!-- Spike labels -->
  <text x="185" y="365" font-size="9" fill="#ef4444">spike</text>
  <text x="245" y="374" font-size="9" fill="#ef4444">spike</text>
  <text x="315" y="390" font-size="9" fill="#ef4444">spike</text>

  <!-- Legend -->
  <line x1="290" y1="335" x2="315" y2="335" stroke="#10b981" stroke-width="2"/>
  <text x="320" y="339" font-size="11" fill="#10b981">Train loss</text>
  <line x1="290" y1="350" x2="315" y2="350" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="320" y="354" font-size="11" fill="#ef4444">Test loss</text>

  <!-- How to prevent panel -->
  <rect x="470" y="295" width="400" height="185" rx="14" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="670" y="322" text-anchor="middle" font-size="14" font-weight="700" fill="#4338ca">How to Prevent Overfitting</text>

  <text x="500" y="350" font-size="13" fill="#312e81">1. Reduce model complexity</text>
  <text x="520" y="368" font-size="11" fill="#4338ca">Fewer neurons per layer (64 → 32)</text>

  <text x="500" y="393" font-size="13" fill="#312e81">2. Reduce number of epochs</text>
  <text x="520" y="411" font-size="11" fill="#4338ca">Stop before spikes appear</text>

  <text x="500" y="436" font-size="13" fill="#312e81">3. Regularization (L1 / L2)</text>
  <text x="520" y="454" font-size="11" fill="#4338ca">Penalize large weights</text>

  <text x="500" y="472" font-size="13" fill="#312e81">4. Dropout</text>
</svg>