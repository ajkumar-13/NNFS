<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 420" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
  </defs>

  <!-- Title -->
  <text x="390" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Overfitting: Training vs Validation Loss Over Time</text>
  <text x="390" y="50" text-anchor="middle" font-size="12" fill="#64748b">Watch how training loss keeps dropping while validation loss starts rising</text>

  <!-- Axes -->
  <line x1="80" y1="350" x2="720" y2="350" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="80" y1="350" x2="80" y2="80" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="400" y="385" text-anchor="middle" font-size="13" fill="#475569">Epochs →</text>
  <text x="30" y="215" text-anchor="middle" font-size="13" fill="#475569" transform="rotate(-90, 30, 215)">Loss</text>

  <!-- Y-axis labels -->
  <text x="70" y="354" text-anchor="end" font-size="10" fill="#94a3b8">0</text>
  <text x="70" y="260" text-anchor="end" font-size="10" fill="#94a3b8">Low</text>
  <text x="70" y="170" text-anchor="end" font-size="10" fill="#94a3b8">Med</text>
  <text x="70" y="90" text-anchor="end" font-size="10" fill="#94a3b8">High</text>

  <!-- X-axis labels -->
  <text x="80" y="370" text-anchor="middle" font-size="10" fill="#94a3b8">0</text>
  <text x="240" y="370" text-anchor="middle" font-size="10" fill="#94a3b8">Early</text>
  <text x="400" y="370" text-anchor="middle" font-size="10" fill="#94a3b8">Mid</text>
  <text x="560" y="370" text-anchor="middle" font-size="10" fill="#94a3b8">Late</text>
  <text x="710" y="370" text-anchor="middle" font-size="10" fill="#94a3b8">End</text>

  <!-- Training loss curve (keeps going down) — blue -->
  <path d="M80,100 C150,97 200,150 280,210 S400,280 500,310 S620,335 710,340"
        fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round"
        stroke-dasharray="1000" stroke-dashoffset="1000">
    <animate attributeName="stroke-dashoffset" from="1000" to="0"
             dur="4s" fill="freeze" repeatCount="indefinite"/>
  </path>

  <!-- Validation loss curve — orange (dips then rises) -->
  <path d="M80,100 C150,97 200,155 280,220 S370,265 420,270 S480,268 530,260 S600,240 660,210 L710,185"
        fill="none" stroke="#f97316" stroke-width="3" stroke-linecap="round"
        stroke-dasharray="1000" stroke-dashoffset="1000">
    <animate attributeName="stroke-dashoffset" from="1000" to="0"
             dur="4s" fill="freeze" repeatCount="indefinite"/>
  </path>

  <!-- Legend -->
  <line x1="460" y1="73" x2="490" y2="73" stroke="#2563eb" stroke-width="3"/>
  <text x="497" y="77" font-size="12" fill="#2563eb" font-weight="600">Training Loss</text>
  <line x1="600" y1="73" x2="630" y2="73" stroke="#f97316" stroke-width="3"/>
  <text x="637" y="77" font-size="12" fill="#f97316" font-weight="600">Validation Loss</text>

  <!-- "Good" zone label — fades in early -->
  <rect x="130" y="135" width="130" height="50" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.2" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.15;0.25;0.45;0.55" dur="8s" repeatCount="indefinite"/>
  </rect>
  <text x="195" y="157" text-anchor="middle" font-size="11" font-weight="600" fill="#16a34a" opacity="0">
    ✓ Both decreasing
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.15;0.25;0.45;0.55" dur="8s" repeatCount="indefinite"/>
  </text>
  <text x="195" y="173" text-anchor="middle" font-size="10" fill="#15803d" opacity="0">
    Good generalization
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.15;0.25;0.45;0.55" dur="8s" repeatCount="indefinite"/>
  </text>

  <!-- "Danger" zone — fades in late -->
  <rect x="490" y="215" width="175" height="65" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.2" opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;1;1;0" keyTimes="0;0.4;0.5;0.55;0.65;0.9;1" dur="8s" repeatCount="indefinite"/>
  </rect>
  <text x="577" y="237" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626" opacity="0">
    ⚠ OVERFITTING
    <animate attributeName="opacity" values="0;0;0;0;1;1;0" keyTimes="0;0.4;0.5;0.55;0.65;0.9;1" dur="8s" repeatCount="indefinite"/>
  </text>
  <text x="577" y="254" text-anchor="middle" font-size="10" fill="#dc2626" opacity="0">
    Training ↓ but Validation ↑
    <animate attributeName="opacity" values="0;0;0;0;1;1;0" keyTimes="0;0.4;0.5;0.55;0.65;0.9;1" dur="8s" repeatCount="indefinite"/>
  </text>
  <text x="577" y="270" text-anchor="middle" font-size="10" fill="#991b1b" opacity="0">
    Model memorizes, doesn't learn
    <animate attributeName="opacity" values="0;0;0;0;1;1;0" keyTimes="0;0.4;0.5;0.55;0.65;0.9;1" dur="8s" repeatCount="indefinite"/>
  </text>

  <!-- Sweet spot line — appears midway -->
  <line x1="400" y1="85" x2="400" y2="350" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="6,4" opacity="0">
    <animate attributeName="opacity" values="0;0;0;1;1;0" keyTimes="0;0.45;0.55;0.6;0.9;1" dur="8s" repeatCount="indefinite"/>
  </line>
  <text x="400" y="398" text-anchor="middle" font-size="11" font-weight="600" fill="#16a34a" opacity="0">
    ↑ Stop training here (best val loss)
    <animate attributeName="opacity" values="0;0;0;1;1;0" keyTimes="0;0.45;0.55;0.6;0.9;1" dur="8s" repeatCount="indefinite"/>
  </text>
</svg>