<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Segoe UI, sans-serif">
  <defs>
  </defs>

  <rect width="900" height="520" rx="18" fill="#fafafa"/>

  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1e1b4b">Adam = Momentum + RMSProp + Bias Correction</text>

  <!-- Left: Momentum block -->
  <rect x="30" y="60" width="260" height="190" rx="14" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="160" y="86" text-anchor="middle" font-size="15" font-weight="700" fill="#4338ca">Momentum (Numerator)</text>
  <text x="160" y="112" text-anchor="middle" font-size="13" fill="#4338ca">Past gradients matter</text>
  <text x="50" y="142" font-size="13" font-family="Consolas, monospace" fill="#312e81">m = β₁·m + (1−β₁)·g</text>
  <line x1="50" y1="155" x2="270" y2="155" stroke="#c7d2fe" stroke-width="1"/>
  <text x="50" y="175" font-size="12" fill="#4338ca">β₁ = 0.9  (momentum factor)</text>
  <text x="50" y="195" font-size="12" fill="#4338ca">Smooths oscillations</text>
  <text x="50" y="215" font-size="12" fill="#4338ca">Uses gradient history</text>
  <text x="50" y="238" font-size="12" font-weight="600" fill="#6366f1">Correction: m̂ = m / (1−β₁ᵗ)</text>

  <!-- Right: Cache block -->
  <rect x="610" y="60" width="260" height="190" rx="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="740" y="86" text-anchor="middle" font-size="15" font-weight="700" fill="#92400e">RMSProp Cache (Denom)</text>
  <text x="740" y="112" text-anchor="middle" font-size="13" fill="#92400e">Adaptive step sizes</text>
  <text x="630" y="142" font-size="13" font-family="Consolas, monospace" fill="#78350f">v = β₂·v + (1−β₂)·g²</text>
  <line x1="630" y1="155" x2="850" y2="155" stroke="#fde68a" stroke-width="1"/>
  <text x="630" y="175" font-size="12" fill="#92400e">β₂ = 0.999  (cache decay)</text>
  <text x="630" y="195" font-size="12" fill="#92400e">Per-parameter learning rates</text>
  <text x="630" y="215" font-size="12" fill="#92400e">Uses gradient² history</text>
  <text x="630" y="238" font-size="12" font-weight="600" fill="#d97706">Correction: v̂ = v / (1−β₂ᵗ)</text>

  <!-- Center: Combine arrow -->
  <rect x="320" y="90" width="260" height="130" rx="14" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="450" y="118" text-anchor="middle" font-size="16" font-weight="700" fill="#065f46">Adam Update Rule</text>
  <text x="450" y="148" text-anchor="middle" font-size="14" font-family="Consolas, monospace" fill="#064e3b">W = W − α · m̂ / (√v̂ + ε)</text>
  <text x="450" y="175" text-anchor="middle" font-size="12" fill="#065f46">α decays: α₀ / (1 + decay·t)</text>
  <text x="450" y="198" text-anchor="middle" font-size="12" fill="#065f46">ε = 10⁻⁷ (prevents ÷ 0)</text>

  <!-- Arrows from left/right to center -->
  <path d="M290 155 L320 155" stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#arrowG27)"/>
  <path d="M610 155 L580 155" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#arrowA27)"/>
  <defs>
    <marker id="arrowG27" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#10b981"/></marker>
    <marker id="arrowA27" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto"><path d="M8,0 L0,3 L8,6Z" fill="#10b981"/></marker>
  </defs>

  <!-- Bias Correction explanation -->
  <rect x="120" y="275" width="660" height="75" rx="12" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="450" y="298" text-anchor="middle" font-size="14" font-weight="700" fill="#9d174d">Bias Correction — Prevents Cold Start</text>
  <text x="450" y="318" text-anchor="middle" font-size="12" fill="#831843">Early iterations: β^t ≈ β  →  dividing by (1−β) ≈ 0.1  →  10× boost to updates</text>
  <text x="450" y="338" text-anchor="middle" font-size="12" fill="#831843">Later iterations: β^t ≈ 0  →  dividing by (1−0) = 1  →  no change (correction vanishes)</text>

  <!-- Results comparison table -->
  <rect x="60" y="370" width="780" height="130" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="450" y="396" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">Accuracy Comparison (10K Epochs, 64 Neurons, Spiral Data)</text>
  <line x1="80" y1="406" x2="820" y2="406" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Table rows -->
  <text x="120" y="428" font-size="13" fill="#64748b">GD + Decay</text>
  <rect x="230" y="416" width="100" height="16" rx="4" fill="#e2e8f0"/>
  <text x="340" y="428" font-size="13" font-weight="600" fill="#64748b">71.7%</text>

  <text x="120" y="450" font-size="13" fill="#f59e0b">RMSProp</text>
  <rect x="230" y="438" width="102" height="16" rx="4" fill="#fde68a"/>
  <text x="340" y="450" font-size="13" font-weight="600" fill="#92400e">71.7%</text>

  <text x="120" y="472" font-size="13" fill="#6366f1">SGD + Momentum</text>
  <rect x="230" y="460" width="130" height="16" rx="4" fill="#c7d2fe"/>
  <text x="370" y="472" font-size="13" font-weight="600" fill="#4338ca">87.3%</text>

  <text x="120" y="494" font-size="13" fill="#10b981">Adam</text>
  <rect x="230" y="482" width="170" height="16" rx="4" fill="#a7f3d0"/>
  <text x="410" y="494" font-size="13" font-weight="700" fill="#065f46">95.7% ★ Best</text>

  <text x="600" y="470" font-size="40" fill="#10b981" opacity="0.15" font-weight="900">ADAM</text>
  <text x="580" y="494" font-size="12" fill="#64748b">Default optimizer in modern deep learning</text>
</svg>