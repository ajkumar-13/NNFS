<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 460" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrowAdam" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="940" height="460" rx="20" fill="#fafafa" stroke="#e5e7eb" stroke-width="1.5"/>

  <text x="470" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Adam = Momentum + RMSProp + Bias Correction</text>
  <text x="470" y="52" text-anchor="middle" font-size="12" fill="#64748b">Watch how Adam combines two moving averages and corrects their startup bias each step.</text>

  <!-- Step 1: Gradient arrives -->
  <rect x="40" y="75" width="160" height="100" rx="14" fill="#ffffff" stroke="#dbeafe" stroke-width="1.5"/>
  <text x="120" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">① Gradient</text>
  <text x="120" y="118" text-anchor="middle" font-size="11" fill="#64748b">Current batch</text>
  <rect x="70" y="130" width="100" height="30" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5">
    <animate attributeName="stroke-width" values="1.5;3;1.5" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text x="120" y="150" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">g = dL/dw</text>

  <!-- Arrow 1→2 -->
  <line x1="200" y1="125" x2="230" y2="125" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowAdam)"/>

  <!-- Step 2: Momentum (1st moment) -->
  <rect x="240" y="75" width="190" height="100" rx="14" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="335" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#4338ca">② Momentum (m)</text>
  <text x="335" y="118" text-anchor="middle" font-size="11" fill="#64748b">Smoothed gradient direction</text>
  <rect x="260" y="130" width="150" height="30" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5">
    <animate attributeName="fill" values="#e0e7ff;#c7d2fe;#e0e7ff" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text x="335" y="150" text-anchor="middle" font-size="11" font-weight="700" fill="#4338ca">m = β₁m + (1−β₁)g</text>

  <!-- Step 3: RMSProp (2nd moment) -->
  <rect x="240" y="195" width="190" height="100" rx="14" fill="#ffffff" stroke="#fbcfe8" stroke-width="1.5"/>
  <text x="335" y="218" text-anchor="middle" font-size="13" font-weight="700" fill="#be185d">③ Cache (v)</text>
  <text x="335" y="238" text-anchor="middle" font-size="11" fill="#64748b">Smoothed squared gradient</text>
  <rect x="260" y="250" width="150" height="30" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5">
    <animate attributeName="fill" values="#fce7f3;#fbcfe8;#fce7f3" dur="3s" begin="0.5s" repeatCount="indefinite"/>
  </rect>
  <text x="335" y="270" text-anchor="middle" font-size="11" font-weight="700" fill="#be185d">v = β₂v + (1−β₂)g²</text>

  <!-- Arrow from gradient down to cache -->
  <line x1="170" y1="175" x2="170" y2="245" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="170" y1="245" x2="240" y2="245" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowAdam)"/>

  <!-- Arrows 2→4, 3→4 -->
  <line x1="430" y1="125" x2="480" y2="155" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowAdam)"/>
  <line x1="430" y1="245" x2="480" y2="215" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowAdam)"/>

  <!-- Step 4: Bias correction -->
  <rect x="490" y="115" width="210" height="150" rx="14" fill="#ffffff" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="595" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#c2410c">④ Bias Correction</text>
  <text x="595" y="160" text-anchor="middle" font-size="11" fill="#64748b">Counteract zero-initialization</text>

  <rect x="510" y="172" width="170" height="28" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1.2">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <text x="595" y="191" text-anchor="middle" font-size="11" font-weight="700" fill="#c2410c">m̂ = m / (1 − β₁ᵗ)</text>

  <rect x="510" y="210" width="170" height="28" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1.2">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" begin="0.4s" repeatCount="indefinite"/>
  </rect>
  <text x="595" y="229" text-anchor="middle" font-size="11" font-weight="700" fill="#c2410c">v̂ = v / (1 − β₂ᵗ)</text>

  <!-- Arrow 4→5 -->
  <line x1="700" y1="190" x2="730" y2="190" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowAdam)"/>

  <!-- Step 5: Update -->
  <rect x="740" y="130" width="170" height="120" rx="14" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="825" y="156" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">⑤ Update</text>
  <rect x="758" y="168" width="134" height="34" rx="10" fill="#dcfce7" stroke="#10b981" stroke-width="2">
    <animate attributeName="stroke-width" values="2;3.5;2" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text x="825" y="189" text-anchor="middle" font-size="11" font-weight="700" fill="#047857">w − η · m̂ / (√v̂ + ε)</text>
  <text x="825" y="218" text-anchor="middle" font-size="10" fill="#64748b">Direction from momentum</text>
  <text x="825" y="232" text-anchor="middle" font-size="10" fill="#64748b">Scale from RMSProp</text>

  <!-- Bottom summary: typical hyperparameters -->
  <rect x="40" y="330" width="860" height="110" rx="16" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="470" y="356" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">Typical Hyperparameters</text>

  <rect x="80" y="370" width="140" height="50" rx="10" fill="#e0e7ff"/>
  <text x="150" y="391" text-anchor="middle" font-size="11" font-weight="700" fill="#4338ca">β₁ = 0.9</text>
  <text x="150" y="408" text-anchor="middle" font-size="10" fill="#64748b">Momentum decay</text>

  <rect x="250" y="370" width="140" height="50" rx="10" fill="#fce7f3"/>
  <text x="320" y="391" text-anchor="middle" font-size="11" font-weight="700" fill="#be185d">β₂ = 0.999</text>
  <text x="320" y="408" text-anchor="middle" font-size="10" fill="#64748b">Cache decay</text>

  <rect x="420" y="370" width="140" height="50" rx="10" fill="#dcfce7"/>
  <text x="490" y="391" text-anchor="middle" font-size="11" font-weight="700" fill="#047857">η = 0.001</text>
  <text x="490" y="408" text-anchor="middle" font-size="10" fill="#64748b">Learning rate</text>

  <rect x="590" y="370" width="140" height="50" rx="10" fill="#f5f5f4"/>
  <text x="660" y="391" text-anchor="middle" font-size="11" font-weight="700" fill="#44403c">ε = 1e-7</text>
  <text x="660" y="408" text-anchor="middle" font-size="10" fill="#64748b">Stability constant</text>

  <rect x="760" y="370" width="106" height="50" rx="10" fill="#fff7ed"/>
  <text x="813" y="391" text-anchor="middle" font-size="11" font-weight="700" fill="#c2410c">t = step</text>
  <text x="813" y="408" text-anchor="middle" font-size="10" fill="#64748b">Iteration count</text>
</svg>