<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Segoe UI, sans-serif">
  <defs>
    <marker id="af2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6Z" fill="#6366f1"/>
    </marker>
    <marker id="ab2" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6Z" fill="#ef4444"/>
    </marker>
  </defs>
  <rect width="900" height="500" rx="16" fill="#fafafa" stroke="#e2e8f0"/>
  <text x="450" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e293b">Full Backpropagation Pipeline — Assembled</text>

  <!-- Forward pass blocks -->
  <g transform="translate(30,55)">
    <!-- Input -->
    <rect x="0" y="40" width="80" height="50" rx="8" fill="#6366f1" opacity=".15" stroke="#6366f1"/>
    <text x="40" y="60" text-anchor="middle" font-size="11" font-weight="600" fill="#6366f1">Input X</text>
    <text x="40" y="78" text-anchor="middle" font-size="10" fill="#64748b">(n × 2)</text>

    <!-- Layer 1 -->
    <rect x="110" y="30" width="120" height="70" rx="10" fill="#ec4899" opacity=".12" stroke="#ec4899"/>
    <text x="170" y="52" text-anchor="middle" font-size="12" font-weight="600" fill="#ec4899">Layer 1</text>
    <text x="170" y="70" text-anchor="middle" font-size="10" fill="#64748b">W₁, B₁</text>
    <text x="170" y="86" text-anchor="middle" font-size="10" fill="#64748b">output = X·W₁+B₁</text>

    <!-- ReLU -->
    <rect x="260" y="35" width="90" height="60" rx="10" fill="#10b981" opacity=".12" stroke="#10b981"/>
    <text x="305" y="58" text-anchor="middle" font-size="12" font-weight="600" fill="#10b981">ReLU</text>
    <text x="305" y="78" text-anchor="middle" font-size="10" fill="#64748b">max(0, Z)</text>

    <!-- Layer 2 -->
    <rect x="380" y="30" width="120" height="70" rx="10" fill="#ec4899" opacity=".12" stroke="#ec4899"/>
    <text x="440" y="52" text-anchor="middle" font-size="12" font-weight="600" fill="#ec4899">Layer 2</text>
    <text x="440" y="70" text-anchor="middle" font-size="10" fill="#64748b">W₂, B₂</text>
    <text x="440" y="86" text-anchor="middle" font-size="10" fill="#64748b">output = A·W₂+B₂</text>

    <!-- Softmax + Loss -->
    <rect x="530" y="25" width="160" height="80" rx="10" fill="#f59e0b" opacity=".12" stroke="#f59e0b"/>
    <text x="610" y="48" text-anchor="middle" font-size="12" font-weight="600" fill="#f59e0b">Softmax + Loss</text>
    <text x="610" y="66" text-anchor="middle" font-size="10" fill="#64748b">ŷ = softmax(Z₂)</text>
    <text x="610" y="82" text-anchor="middle" font-size="10" fill="#64748b">L = cross_entropy(ŷ, y)</text>

    <!-- Loss output -->
    <rect x="720" y="40" width="70" height="50" rx="8" fill="#ef4444" opacity=".15" stroke="#ef4444"/>
    <text x="755" y="64" text-anchor="middle" font-size="12" font-weight="600" fill="#ef4444">Loss</text>
    <text x="755" y="80" text-anchor="middle" font-size="10" fill="#64748b">scalar</text>

    <!-- Forward arrows -->
    <line x1="80" y1="65" x2="108" y2="65" stroke="#6366f1" stroke-width="1.5" marker-end="url(#af2)"/>
    <line x1="230" y1="65" x2="258" y2="65" stroke="#6366f1" stroke-width="1.5" marker-end="url(#af2)"/>
    <line x1="350" y1="65" x2="378" y2="65" stroke="#6366f1" stroke-width="1.5" marker-end="url(#af2)"/>
    <line x1="500" y1="65" x2="528" y2="65" stroke="#6366f1" stroke-width="1.5" marker-end="url(#af2)"/>
    <line x1="690" y1="65" x2="718" y2="65" stroke="#6366f1" stroke-width="1.5" marker-end="url(#af2)"/>
  </g>

  <!-- Forward label -->
  <text x="450" y="148" text-anchor="middle" font-size="13" fill="#6366f1" font-weight="600">── Forward Pass ──►</text>

  <!-- Backward pass -->
  <g transform="translate(30,175)">
    <!-- Backward arrows (right to left) -->
    <rect x="530" y="10" width="160" height="50" rx="8" fill="#fef2f2" stroke="#ef4444"/>
    <text x="610" y="30" text-anchor="middle" font-size="11" font-weight="600" fill="#ef4444">softmax_loss.backward()</text>
    <text x="610" y="46" text-anchor="middle" font-size="10" fill="#7f1d1d">dinputs = ŷ − y (÷ n)</text>

    <rect x="380" y="10" width="120" height="50" rx="8" fill="#fef2f2" stroke="#ef4444"/>
    <text x="440" y="30" text-anchor="middle" font-size="11" font-weight="600" fill="#ef4444">layer2.backward()</text>
    <text x="440" y="46" text-anchor="middle" font-size="10" fill="#7f1d1d">dW₂, dB₂, dinputs</text>

    <rect x="260" y="10" width="90" height="50" rx="8" fill="#fef2f2" stroke="#ef4444"/>
    <text x="305" y="30" text-anchor="middle" font-size="11" font-weight="600" fill="#ef4444">relu.backward()</text>
    <text x="305" y="46" text-anchor="middle" font-size="10" fill="#7f1d1d">mask ≤ 0</text>

    <rect x="110" y="10" width="120" height="50" rx="8" fill="#fef2f2" stroke="#ef4444"/>
    <text x="170" y="30" text-anchor="middle" font-size="11" font-weight="600" fill="#ef4444">layer1.backward()</text>
    <text x="170" y="46" text-anchor="middle" font-size="10" fill="#7f1d1d">dW₁, dB₁, dinputs</text>

    <!-- Arrows -->
    <line x1="530" y1="35" x2="502" y2="35" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ab2)"/>
    <line x1="380" y1="35" x2="352" y2="35" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ab2)"/>
    <line x1="260" y1="35" x2="232" y2="35" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ab2)"/>
  </g>

  <!-- Backward label -->
  <text x="450" y="260" text-anchor="middle" font-size="13" fill="#ef4444" font-weight="600">◄── Backward Pass ──</text>

  <!-- Update rules -->
  <g transform="translate(50,280)">
    <rect width="800" height="90" rx="12" fill="#f0fdf4" stroke="#10b981"/>
    <text x="400" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#10b981">Gradient Descent Update</text>
    <text x="400" y="50" text-anchor="middle" font-size="13" font-family="Consolas" fill="#065f46">W₁ -= lr × dW₁    B₁ -= lr × dB₁</text>
    <text x="400" y="72" text-anchor="middle" font-size="13" font-family="Consolas" fill="#065f46">W₂ -= lr × dW₂    B₂ -= lr × dB₂</text>
  </g>

  <!-- Building blocks legend -->
  <g transform="translate(50,390)">
    <rect width="800" height="90" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-dasharray="4,2"/>
    <text x="400" y="22" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">Three Building Blocks — Each with forward() + backward()</text>
    <g transform="translate(50,35)">
      <rect width="200" height="40" rx="6" fill="#ec4899" opacity=".12" stroke="#ec4899"/>
      <text x="100" y="26" text-anchor="middle" font-size="12" fill="#ec4899">Layer_Dense</text>
    </g>
    <g transform="translate(280,35)">
      <rect width="200" height="40" rx="6" fill="#10b981" opacity=".12" stroke="#10b981"/>
      <text x="100" y="26" text-anchor="middle" font-size="12" fill="#10b981">Activation_ReLU</text>
    </g>
    <g transform="translate(510,35)">
      <rect width="240" height="40" rx="6" fill="#f59e0b" opacity=".12" stroke="#f59e0b"/>
      <text x="120" y="26" text-anchor="middle" font-size="12" fill="#f59e0b">Softmax + CrossEntropy</text>
    </g>
  </g>
</svg>