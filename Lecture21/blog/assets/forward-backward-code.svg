<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" font-family="Segoe UI, sans-serif">
  <defs>
    <marker id="af" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6Z" fill="#6366f1"/>
    </marker>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6Z" fill="#ef4444"/>
    </marker>
  </defs>
  <rect width="860" height="420" rx="16" fill="#fafafa" stroke="#e2e8f0"/>
  <text x="430" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">Complete Forward + Backward Pass in Python</text>

  <!-- Forward pass -->
  <text x="30" y="60" font-size="13" font-weight="600" fill="#6366f1">Forward Pass (left → right)</text>
  <g transform="translate(20,70)">
    <rect x="0" y="0" width="130" height="55" rx="8" fill="#6366f1" opacity=".12" stroke="#6366f1"/>
    <text x="65" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#6366f1">dense1.forward(X)</text>
    <text x="65" y="34" text-anchor="middle" font-size="9" font-family="Consolas" fill="#475569">X·W₁ + B₁</text>
    <text x="65" y="48" text-anchor="middle" font-size="9" fill="#94a3b8">(100×2)→(100×3)</text>

    <line x1="132" y1="27" x2="158" y2="27" stroke="#6366f1" stroke-width="1.5" marker-end="url(#af)"/>

    <rect x="160" y="0" width="140" height="55" rx="8" fill="#10b981" opacity=".12" stroke="#10b981"/>
    <text x="230" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#10b981">activation1.forward()</text>
    <text x="230" y="34" text-anchor="middle" font-size="9" font-family="Consolas" fill="#475569">max(0, dense1.output)</text>
    <text x="230" y="48" text-anchor="middle" font-size="9" fill="#94a3b8">(100×3)→(100×3)</text>

    <line x1="302" y1="27" x2="328" y2="27" stroke="#6366f1" stroke-width="1.5" marker-end="url(#af)"/>

    <rect x="330" y="0" width="130" height="55" rx="8" fill="#6366f1" opacity=".12" stroke="#6366f1"/>
    <text x="395" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#6366f1">dense2.forward()</text>
    <text x="395" y="34" text-anchor="middle" font-size="9" font-family="Consolas" fill="#475569">A₁·W₂ + B₂</text>
    <text x="395" y="48" text-anchor="middle" font-size="9" fill="#94a3b8">(100×3)→(100×3)</text>

    <line x1="462" y1="27" x2="488" y2="27" stroke="#6366f1" stroke-width="1.5" marker-end="url(#af)"/>

    <rect x="490" y="0" width="170" height="55" rx="8" fill="#f59e0b" opacity=".12" stroke="#f59e0b"/>
    <text x="575" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#f59e0b">loss_activation.forward()</text>
    <text x="575" y="34" text-anchor="middle" font-size="9" font-family="Consolas" fill="#475569">softmax → cross-entropy</text>
    <text x="575" y="48" text-anchor="middle" font-size="9" fill="#94a3b8">→ ŷ + scalar loss</text>

    <line x1="662" y1="27" x2="688" y2="27" stroke="#6366f1" stroke-width="1.5" marker-end="url(#af)"/>

    <rect x="690" y="5" width="65" height="44" rx="6" fill="#ef4444" opacity=".15" stroke="#ef4444"/>
    <text x="722" y="32" text-anchor="middle" font-size="12" font-weight="700" fill="#ef4444">Loss</text>
  </g>

  <!-- Backward pass -->
  <text x="30" y="165" font-size="13" font-weight="600" fill="#ef4444">Backward Pass (right → left)</text>
  <g transform="translate(20,175)">
    <rect x="490" y="0" width="170" height="55" rx="8" fill="#fef2f2" stroke="#ef4444"/>
    <text x="575" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#ef4444">loss_activation.backward()</text>
    <text x="575" y="34" text-anchor="middle" font-size="9" font-family="Consolas" fill="#7f1d1d">dinputs = ŷ − y (÷ n)</text>
    <text x="575" y="48" text-anchor="middle" font-size="8" fill="#94a3b8">→ ∂L/∂Z₂</text>

    <line x1="490" y1="27" x2="464" y2="27" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ab)"/>

    <rect x="330" y="0" width="130" height="55" rx="8" fill="#fef2f2" stroke="#ef4444"/>
    <text x="395" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#ef4444">dense2.backward()</text>
    <text x="395" y="34" text-anchor="middle" font-size="9" font-family="Consolas" fill="#7f1d1d">dW₂, dB₂, dinputs</text>
    <text x="395" y="48" text-anchor="middle" font-size="8" fill="#94a3b8">→ ∂L/∂A₁</text>

    <line x1="330" y1="27" x2="304" y2="27" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ab)"/>

    <rect x="160" y="0" width="140" height="55" rx="8" fill="#fef2f2" stroke="#ef4444"/>
    <text x="230" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#ef4444">activation1.backward()</text>
    <text x="230" y="34" text-anchor="middle" font-size="9" font-family="Consolas" fill="#7f1d1d">copy + zero mask</text>
    <text x="230" y="48" text-anchor="middle" font-size="8" fill="#94a3b8">→ ∂L/∂Z₁</text>

    <line x1="160" y1="27" x2="134" y2="27" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ab)"/>

    <rect x="0" y="0" width="130" height="55" rx="8" fill="#fef2f2" stroke="#ef4444"/>
    <text x="65" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#ef4444">dense1.backward()</text>
    <text x="65" y="34" text-anchor="middle" font-size="9" font-family="Consolas" fill="#7f1d1d">dW₁, dB₁, dinputs</text>
    <text x="65" y="48" text-anchor="middle" font-size="8" fill="#94a3b8">→ ∂L/∂X (done)</text>
  </g>

  <!-- Gradient shapes box -->
  <g transform="translate(20,270)">
    <rect width="820" height="130" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-dasharray="4,2"/>
    <text x="410" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#475569">Gradient Shapes After Backward Pass</text>

    <g transform="translate(30,40)">
      <rect width="370" height="76" rx="8" fill="#fff" stroke="#cbd5e1"/>
      <text x="185" y="18" text-anchor="middle" font-size="12" font-weight="600" fill="#ec4899">Layer 1 (2 inputs → 3 neurons)</text>
      <text x="20" y="42" font-size="11" font-family="Consolas" fill="#475569">dense1.dweights  →  (2 × 3) = 6 values</text>
      <text x="20" y="62" font-size="11" font-family="Consolas" fill="#475569">dense1.dbiases   →  (1 × 3) = 3 values</text>
    </g>

    <g transform="translate(420,40)">
      <rect width="370" height="76" rx="8" fill="#fff" stroke="#cbd5e1"/>
      <text x="185" y="18" text-anchor="middle" font-size="12" font-weight="600" fill="#ec4899">Layer 2 (3 inputs → 3 neurons)</text>
      <text x="20" y="42" font-size="11" font-family="Consolas" fill="#475569">dense2.dweights  →  (3 × 3) = 9 values</text>
      <text x="20" y="62" font-size="11" font-family="Consolas" fill="#475569">dense2.dbiases   →  (1 × 3) = 3 values</text>
    </g>
  </g>
</svg>