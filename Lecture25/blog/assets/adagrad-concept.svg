<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" font-family="Segoe UI, sans-serif">
  <rect width="860" height="400" rx="16" fill="#fafafa" stroke="#e2e8f0"/>
  <text x="430" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">AdaGrad — Adaptive Per-Parameter Learning Rates</text>

  <!-- Problem illustration -->
  <g transform="translate(30,50)">
    <text x="185" y="0" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">Why Different Step Sizes?</text>
    <rect x="0" y="10" width="380" height="120" rx="10" fill="#eef2ff" stroke="#6366f1"/>
    <text x="20" y="35" font-size="11" fill="#312e81">L = W₁²/100 + W₂²     at W₁=1, W₂=1:</text>
    <text x="20" y="58" font-size="12" font-family="Consolas" fill="#312e81">∂L/∂W₁ = 0.02   (tiny)</text>
    <text x="20" y="78" font-size="12" font-family="Consolas" fill="#312e81">∂L/∂W₂ = 2.00   (100× larger!)</text>
    <text x="20" y="104" font-size="11" fill="#475569">Same α → W₂ changes 100× faster than W₁</text>
    <text x="20" y="120" font-size="11" font-weight="600" fill="#6366f1">Solution: give each parameter its own step size</text>
  </g>

  <!-- AdaGrad formulas -->
  <g transform="translate(440,50)">
    <text x="195" y="0" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">AdaGrad Update Rule</text>
    <rect x="0" y="10" width="390" height="120" rx="10" fill="#f1f5f9" stroke="#94a3b8"/>
    <text x="20" y="38" font-size="12" font-weight="600" fill="#475569">Cache (accumulate squared gradients):</text>
    <text x="20" y="60" font-size="13" font-family="Consolas" fill="#1e293b">G_t = G_{t-1} + (∂L/∂W)²</text>
    <text x="20" y="88" font-size="12" font-weight="600" fill="#475569">Weight update:</text>
    <text x="20" y="110" font-size="13" font-family="Consolas" fill="#1e293b">W -= α × (∂L/∂W) / √(G + ε)</text>
  </g>

  <!-- Cache growth problem -->
  <g transform="translate(30,200)">
    <text x="400" y="0" text-anchor="middle" font-size="13" font-weight="600" fill="#ef4444">Problem: Cache Grows Without Bound</text>
    <rect x="0" y="10" width="800" height="65" rx="10" fill="#fef2f2" stroke="#ef4444"/>
    <g transform="translate(20,30)">
      <text font-size="11" font-family="Consolas" fill="#7f1d1d">
        <tspan x="0" dy="0">10 iters → cache = 2.5</tspan>
        <tspan x="220" dy="0">100 iters → cache = 25</tspan>
        <tspan x="460" dy="0">100K iters → cache = 25,000</tspan>
      </text>
      <text x="0" y="30" font-size="11" fill="#ef4444" font-weight="600">√25,000 in denominator → effective step size ≈ 0 → dead neurons!</text>
    </g>
  </g>

  <!-- Results comparison -->
  <g transform="translate(30,295)">
    <rect width="800" height="85" rx="12" fill="#f0fdf4" stroke="#10b981"/>
    <text x="400" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#10b981">Accuracy Comparison (Spiral Dataset, 10K Epochs)</text>
    <g transform="translate(30,38)">
      <rect x="0" y="0" width="170" height="35" rx="6" fill="#fef2f2" stroke="#fca5a5"/>
      <text x="85" y="23" text-anchor="middle" font-size="11" fill="#7f1d1d">LR Decay: 71.7%</text>
    </g>
    <g transform="translate(200,38)">
      <rect x="0" y="0" width="170" height="35" rx="6" fill="#eef2ff" stroke="#a5b4fc"/>
      <text x="85" y="23" text-anchor="middle" font-size="11" fill="#312e81">AdaGrad: 89.3%</text>
    </g>
    <g transform="translate(400,38)">
      <rect x="0" y="0" width="210" height="35" rx="6" fill="#f0fdf4" stroke="#86efac"/>
      <text x="105" y="23" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">SGD+Momentum: 95.3% ★</text>
    </g>
  </g>
</svg>