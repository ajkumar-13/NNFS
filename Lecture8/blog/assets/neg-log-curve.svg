<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420">
  <defs>
    <linearGradient id="curveGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="700" height="420" rx="16" fill="#fafafa"/>
  <text x="350" y="34" text-anchor="middle" font-family="Segoe UI" font-size="17" font-weight="700" fill="#1e1e2e">The −log(x) Curve: Loss vs. Confidence</text>

  <!-- Axes -->
  <line x1="90" y1="60" x2="90" y2="360" stroke="#64748b" stroke-width="1.5"/>
  <line x1="90" y1="360" x2="660" y2="360" stroke="#64748b" stroke-width="1.5"/>
  <!-- Y-axis label -->
  <text x="30" y="210" text-anchor="middle" font-family="Segoe UI" font-size="13" fill="#64748b" transform="rotate(-90,30,210)">Loss = −log(p)</text>
  <!-- X-axis label -->
  <text x="375" y="400" text-anchor="middle" font-family="Segoe UI" font-size="13" fill="#64748b">Predicted Probability (p) for Correct Class</text>

  <!-- Y-axis ticks -->
  <text x="80" y="364" text-anchor="end" font-family="Consolas" font-size="11" fill="#64748b">0</text>
  <text x="80" y="264" text-anchor="end" font-family="Consolas" font-size="11" fill="#64748b">1</text>
  <text x="80" y="164" text-anchor="end" font-family="Consolas" font-size="11" fill="#64748b">2</text>
  <text x="80" y="84" text-anchor="end" font-family="Consolas" font-size="11" fill="#64748b">3</text>
  <line x1="86" y1="260" x2="94" y2="260" stroke="#64748b" stroke-width="1"/>
  <line x1="86" y1="160" x2="94" y2="160" stroke="#64748b" stroke-width="1"/>
  <line x1="86" y1="80" x2="94" y2="80" stroke="#64748b" stroke-width="1"/>

  <!-- X-axis ticks -->
  <text x="90" y="378" text-anchor="middle" font-family="Consolas" font-size="11" fill="#64748b">0</text>
  <text x="233" y="378" text-anchor="middle" font-family="Consolas" font-size="11" fill="#64748b">0.25</text>
  <text x="375" y="378" text-anchor="middle" font-family="Consolas" font-size="11" fill="#64748b">0.50</text>
  <text x="518" y="378" text-anchor="middle" font-family="Consolas" font-size="11" fill="#64748b">0.75</text>
  <text x="660" y="378" text-anchor="middle" font-family="Consolas" font-size="11" fill="#64748b">1.0</text>

  <!-- Grid lines (light) -->
  <line x1="233" y1="60" x2="233" y2="360" stroke="#e2e2e8" stroke-width="0.8" stroke-dasharray="4,4"/>
  <line x1="375" y1="60" x2="375" y2="360" stroke="#e2e2e8" stroke-width="0.8" stroke-dasharray="4,4"/>
  <line x1="518" y1="60" x2="518" y2="360" stroke="#e2e2e8" stroke-width="0.8" stroke-dasharray="4,4"/>
  <line x1="90" y1="260" x2="660" y2="260" stroke="#e2e2e8" stroke-width="0.8" stroke-dasharray="4,4"/>
  <line x1="90" y1="160" x2="660" y2="160" stroke="#e2e2e8" stroke-width="0.8" stroke-dasharray="4,4"/>

  <!-- -log(x) curve approximated with path -->
  <!-- Points: x=0.05->loss≈3, x=0.1->2.3, x=0.2->1.6, x=0.3->1.2, x=0.5->0.69, x=0.7->0.36, x=0.9->0.105, x=1.0->0 -->
  <!-- Scale: x: 90+570*p, y: 360-100*loss -->
  <path d="M 119,60 C 130,82 148,110 147,116 C 155,138 175,172 204,200 C 240,233 290,270 375,291 C 460,312 540,340 570,348 C 610,354 640,358 660,360"
        stroke="url(#curveGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Annotation: p=0.5 -->
  <circle cx="375" cy="291" r="5" fill="#f59e0b" stroke="white" stroke-width="2"/>
  <line x1="375" y1="291" x2="420" y2="260" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,3"/>
  <rect x="420" y="244" width="120" height="28" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="480" y="263" text-anchor="middle" font-family="Consolas" font-size="11" fill="#92400e">p=0.5 → loss=0.69</text>

  <!-- Annotation: p=0.7 -->
  <circle cx="489" cy="324" r="5" fill="#6366f1" stroke="white" stroke-width="2"/>
  <line x1="489" y1="324" x2="530" y2="300" stroke="#6366f1" stroke-width="1" stroke-dasharray="3,3"/>
  <rect x="530" y="284" width="124" height="28" rx="6" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
  <text x="592" y="303" text-anchor="middle" font-family="Consolas" font-size="11" fill="#3730a3">p=0.7 → loss=0.36</text>

  <!-- Annotation: p=1.0 -->
  <circle cx="660" cy="360" r="5" fill="#10b981" stroke="white" stroke-width="2"/>
  <line x1="653" y1="353" x2="620" y2="336" stroke="#10b981" stroke-width="1" stroke-dasharray="3,3"/>
  <rect x="540" y="322" width="80" height="24" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="580" y="339" text-anchor="middle" font-family="Consolas" font-size="11" fill="#065f46">p=1 → 0</text>

  <!-- High loss zone label -->
  <rect x="100" y="66" width="100" height="24" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="150" y="83" text-anchor="middle" font-family="Segoe UI" font-size="11" font-weight="600" fill="#991b1b">High Loss Zone</text>

  <!-- Low loss zone label -->
  <rect x="560" y="340" width="96" height="20" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="608" y="355" text-anchor="middle" font-family="Segoe UI" font-size="11" font-weight="600" fill="#065f46">Low Loss</text>
</svg>