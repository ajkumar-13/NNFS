<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <rect width="720" height="400" rx="16" fill="#fafafa"/>
  <text x="360" y="34" text-anchor="middle" font-family="Segoe UI" font-size="17" font-weight="700" fill="#1e1e2e">Categorical Cross-Entropy: Only the Correct Class Matters</text>

  <!-- Formula -->
  <rect x="140" y="50" width="440" height="40" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.2"/>
  <text x="360" y="76" text-anchor="middle" font-family="Consolas" font-size="14" fill="#3730a3">L = − Σᵢ yᵢ · log(ŷᵢ)</text>

  <!-- Example setup -->
  <text x="40" y="120" font-family="Segoe UI" font-size="13" font-weight="600" fill="#64748b">True label (one-hot):</text>
  <!-- One-hot boxes -->
  <rect x="220" y="104" width="50" height="28" rx="6" fill="#10b981" stroke="#059669" stroke-width="1.2"/>
  <text x="245" y="123" text-anchor="middle" font-family="Consolas" font-size="14" font-weight="700" fill="white">1</text>
  <rect x="278" y="104" width="50" height="28" rx="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <text x="303" y="123" text-anchor="middle" font-family="Consolas" font-size="14" fill="#64748b">0</text>
  <rect x="336" y="104" width="50" height="28" rx="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <text x="361" y="123" text-anchor="middle" font-family="Consolas" font-size="14" fill="#64748b">0</text>
  <text x="400" y="123" font-family="Segoe UI" font-size="12" fill="#64748b">← Red class</text>

  <text x="40" y="164" font-family="Segoe UI" font-size="13" font-weight="600" fill="#64748b">Predicted (softmax):</text>
  <rect x="220" y="148" width="50" height="28" rx="6" fill="#6366f1" stroke="#4f46e5" stroke-width="1.2"/>
  <text x="245" y="167" text-anchor="middle" font-family="Consolas" font-size="14" font-weight="700" fill="white">0.7</text>
  <rect x="278" y="148" width="50" height="28" rx="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <text x="303" y="167" text-anchor="middle" font-family="Consolas" font-size="14" fill="#64748b">0.1</text>
  <rect x="336" y="148" width="50" height="28" rx="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <text x="361" y="167" text-anchor="middle" font-family="Consolas" font-size="14" fill="#64748b">0.2</text>

  <!-- Multiply -->
  <text x="40" y="210" font-family="Segoe UI" font-size="13" font-weight="600" fill="#64748b">y × log(ŷ):</text>
  <rect x="220" y="194" width="86" height="28" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="263" y="213" text-anchor="middle" font-family="Consolas" font-size="12" font-weight="600" fill="#92400e">1·log(0.7)</text>
  <rect x="314" y="194" width="86" height="28" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="357" y="213" text-anchor="middle" font-family="Consolas" font-size="12" fill="#94a3b8">0·log(0.1)</text>
  <rect x="408" y="194" width="86" height="28" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="451" y="213" text-anchor="middle" font-family="Consolas" font-size="12" fill="#94a3b8">0·log(0.2)</text>

  <!-- Arrows showing zeroed out -->
  <text x="357" y="244" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#94a3b8">= 0 (zeroed out)</text>
  <text x="451" y="244" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#94a3b8">= 0 (zeroed out)</text>

  <!-- Result arrow -->
  <line x1="263" y1="226" x2="263" y2="264" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowY)"/>
  <defs>
    <marker id="arrowY" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Final result -->
  <rect x="140" y="268" width="440" height="40" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="360" y="293" text-anchor="middle" font-family="Consolas" font-size="14" font-weight="600" fill="#92400e">L = −log(0.7) = 0.3567</text>

  <!-- Key insight box -->
  <rect x="40" y="330" width="640" height="52" rx="12" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="360" y="352" text-anchor="middle" font-family="Segoe UI" font-size="13" font-weight="700" fill="#065f46">Key Insight</text>
  <text x="360" y="372" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#065f46">The loss only depends on the predicted probability of the correct class. Incorrect class terms vanish (× 0).</text>
</svg>