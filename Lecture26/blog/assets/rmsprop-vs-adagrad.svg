<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" font-family="Segoe UI, sans-serif">
  <rect width="860" height="400" rx="16" fill="#fafafa" stroke="#e2e8f0"/>
  <text x="430" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">RMSProp — Fixing AdaGrad's Cache Problem</text>

  <!-- AdaGrad vs RMSProp cache -->
  <g transform="translate(30,50)">
    <text x="400" y="0" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">Cache Update Comparison (gradient = 0.5 at each step)</text>

    <!-- AdaGrad cache -->
    <g transform="translate(0,20)">
      <rect width="390" height="110" rx="10" fill="#fef2f2" stroke="#ef4444"/>
      <text x="195" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#ef4444">AdaGrad: G_t = G_{t-1} + g²</text>
      <text x="20" y="48" font-size="11" font-family="Consolas" fill="#7f1d1d">Iter  1 → cache = 0.250</text>
      <text x="20" y="66" font-size="11" font-family="Consolas" fill="#7f1d1d">Iter  5 → cache = 1.250</text>
      <text x="20" y="84" font-size="11" font-family="Consolas" fill="#7f1d1d">Iter 10 → cache = 2.500</text>
      <text x="220" y="100" font-size="10" font-weight="600" fill="#ef4444">↑ Grows without bound → learning dies</text>
    </g>

    <!-- RMSProp cache -->
    <g transform="translate(420,20)">
      <rect width="390" height="110" rx="10" fill="#f0fdf4" stroke="#10b981"/>
      <text x="195" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#10b981">RMSProp: G_t = ρG_{t-1} + (1−ρ)g²</text>
      <text x="20" y="48" font-size="11" font-family="Consolas" fill="#14532d">Iter  1 → cache = 0.025</text>
      <text x="20" y="66" font-size="11" font-family="Consolas" fill="#14532d">Iter  5 → cache = 0.121</text>
      <text x="20" y="84" font-size="11" font-family="Consolas" fill="#14532d">Iter 10 → cache = 0.226</text>
      <text x="220" y="100" font-size="10" font-weight="600" fill="#10b981">↑ Converges to stable value → learning continues</text>
    </g>
  </g>

  <!-- Formula comparison -->
  <g transform="translate(30,200)">
    <rect width="800" height="70" rx="12" fill="#eef2ff" stroke="#6366f1"/>
    <text x="400" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#6366f1">The Key Difference: One Parameter (ρ)</text>
    <text x="200" y="50" text-anchor="middle" font-size="12" font-family="Consolas" fill="#312e81">AdaGrad: G += g²</text>
    <text x="600" y="50" text-anchor="middle" font-size="12" font-family="Consolas" fill="#312e81">RMSProp: G = ρ·G + (1−ρ)·g²</text>
    <text x="400" y="64" text-anchor="middle" font-size="10" fill="#64748b">ρ = cache memory decay rate (typically 0.9–0.999)</text>
  </g>

  <!-- Concept combination -->
  <g transform="translate(30,290)">
    <rect width="800" height="90" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-dasharray="4,2"/>
    <text x="400" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">RMSProp = Two Ideas Combined</text>
    <g transform="translate(40,38)">
      <rect width="340" height="40" rx="6" fill="#f59e0b" opacity=".12" stroke="#f59e0b"/>
      <text x="170" y="16" text-anchor="middle" font-size="11" font-weight="600" fill="#f59e0b">From AdaGrad</text>
      <text x="170" y="33" text-anchor="middle" font-size="11" fill="#78350f">Per-parameter adaptive learning rates</text>
    </g>
    <g transform="translate(420,38)">
      <rect width="340" height="40" rx="6" fill="#10b981" opacity=".12" stroke="#10b981"/>
      <text x="170" y="16" text-anchor="middle" font-size="11" font-weight="600" fill="#10b981">From Momentum</text>
      <text x="170" y="33" text-anchor="middle" font-size="11" fill="#14532d">Weighted average: past matters more</text>
    </g>
  </g>
</svg>