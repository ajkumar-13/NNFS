<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 420" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arw" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <text x="375" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">ReLU Backward: The Gradient Gate</text>
  <text x="375" y="52" text-anchor="middle" font-size="13" fill="#64748b">Gradients flow through where z &gt; 0, blocked where z ≤ 0</text>

  <!-- Forward side label -->
  <text x="190" y="90" text-anchor="middle" font-size="14" font-weight="600" fill="#2563eb">Forward Pass</text>
  <text x="560" y="90" text-anchor="middle" font-size="14" font-weight="600" fill="#dc2626">Backward Pass</text>

  <!-- Neuron 1: z > 0 → gate OPEN -->
  <rect x="50" y="110" width="130" height="45" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="115" y="128" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a5f">z₁ = 1.0</text>
  <text x="115" y="145" text-anchor="middle" font-size="11" fill="#16a34a">z &gt; 0 ✓</text>

  <line x1="180" y1="132" x2="235" y2="132" stroke="#475569" stroke-width="1.5" marker-end="url(#arw)"/>

  <!-- ReLU gate OPEN -->
  <rect x="240" y="110" width="100" height="45" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="290" y="128" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">ReLU</text>
  <text x="290" y="145" text-anchor="middle" font-size="11" fill="#16a34a">OPEN</text>

  <line x1="340" y1="132" x2="395" y2="132" stroke="#475569" stroke-width="1.5" marker-end="url(#arw)"/>

  <rect x="400" y="110" width="130" height="45" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="465" y="128" text-anchor="middle" font-size="12" font-weight="600" fill="#14532d">a₁ = 1.0</text>
  <text x="465" y="145" text-anchor="middle" font-size="11" fill="#16a34a">passes through</text>

  <!-- Backward arrow for neuron 1 -->
  <line x1="640" y1="132" x2="545" y2="132" stroke="#dc2626" stroke-width="2" marker-end="url(#arw)" stroke-dasharray="6,3"/>
  <rect x="640" y="117" width="95" height="30" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="687" y="137" text-anchor="middle" font-size="12" font-weight="600" fill="#dc2626">dval = 5</text>

  <text x="600" y="165" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a">→ dinput = 5 ✓</text>

  <!-- Neuron 2: z ≤ 0 → gate CLOSED -->
  <rect x="50" y="200" width="130" height="45" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="115" y="218" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a5f">z₂ = −2.0</text>
  <text x="115" y="235" text-anchor="middle" font-size="11" fill="#dc2626">z ≤ 0 ✗</text>

  <line x1="180" y1="222" x2="235" y2="222" stroke="#475569" stroke-width="1.5" marker-end="url(#arw)"/>

  <!-- ReLU gate CLOSED -->
  <rect x="240" y="200" width="100" height="45" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="290" y="218" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">ReLU</text>
  <text x="290" y="235" text-anchor="middle" font-size="11" fill="#dc2626">CLOSED</text>

  <line x1="340" y1="222" x2="395" y2="222" stroke="#475569" stroke-width="1.5" marker-end="url(#arw)"/>

  <rect x="400" y="200" width="130" height="45" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="465" y="218" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">a₂ = 0</text>
  <text x="465" y="235" text-anchor="middle" font-size="11" fill="#dc2626">killed by ReLU</text>

  <!-- Backward arrow for neuron 2 -->
  <line x1="640" y1="222" x2="545" y2="222" stroke="#dc2626" stroke-width="2" marker-end="url(#arw)" stroke-dasharray="6,3"/>
  <rect x="640" y="207" width="95" height="30" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="687" y="227" text-anchor="middle" font-size="12" font-weight="600" fill="#dc2626">dval = 6</text>

  <text x="600" y="255" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">→ dinput = 0 ✗</text>

  <!-- Neuron 3: z > 0 → gate OPEN -->
  <rect x="50" y="290" width="130" height="45" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="115" y="308" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a5f">z₃ = 3.0</text>
  <text x="115" y="325" text-anchor="middle" font-size="11" fill="#16a34a">z &gt; 0 ✓</text>

  <line x1="180" y1="312" x2="235" y2="312" stroke="#475569" stroke-width="1.5" marker-end="url(#arw)"/>

  <rect x="240" y="290" width="100" height="45" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="290" y="308" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">ReLU</text>
  <text x="290" y="325" text-anchor="middle" font-size="11" fill="#16a34a">OPEN</text>

  <line x1="340" y1="312" x2="395" y2="312" stroke="#475569" stroke-width="1.5" marker-end="url(#arw)"/>

  <rect x="400" y="290" width="130" height="45" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="465" y="308" text-anchor="middle" font-size="12" font-weight="600" fill="#14532d">a₃ = 3.0</text>
  <text x="465" y="325" text-anchor="middle" font-size="11" fill="#16a34a">passes through</text>

  <!-- Backward arrow for neuron 3 -->
  <line x1="640" y1="312" x2="545" y2="312" stroke="#dc2626" stroke-width="2" marker-end="url(#arw)" stroke-dasharray="6,3"/>
  <rect x="640" y="297" width="95" height="30" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="687" y="317" text-anchor="middle" font-size="12" font-weight="600" fill="#dc2626">dval = 7</text>

  <text x="600" y="345" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a">→ dinput = 7 ✓</text>

  <!-- Summary box -->
  <rect x="100" y="370" width="550" height="40" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="375" y="395" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Rule: dinput = dvalue × (1 if z &gt; 0, else 0) — the gradient is gated, not scaled</text>
</svg>
