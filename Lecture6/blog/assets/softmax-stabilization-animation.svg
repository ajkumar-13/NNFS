<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="cardShadow6" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="920" height="420" rx="20" fill="#fafafa" stroke="#e5e7eb" stroke-width="1.5"/>

  <text x="460" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Stable Softmax</text>
  <text x="460" y="56" text-anchor="middle" font-size="12" fill="#64748b">Subtract the row max first, then exponentiate safely</text>

  <rect x="34" y="94" width="250" height="236" rx="16" fill="#ffffff" stroke="#fee2e2" stroke-width="1.5" filter="url(#cardShadow6)"/>
  <text x="159" y="120" text-anchor="middle" font-size="14" font-weight="700" fill="#b91c1c">1. Raw logits</text>
  <text x="159" y="140" text-anchor="middle" font-size="11" fill="#64748b">These are scores, not probabilities yet.</text>
  <rect x="79" y="162" width="160" height="48" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="159" y="193" text-anchor="middle" font-size="18" font-weight="700" fill="#b91c1c">[1001, 1002, 1003]</text>
  <rect x="66" y="236" width="186" height="54" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="1">
    <animate attributeName="opacity" values="1;0.45;1" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <text x="159" y="258" text-anchor="middle" font-size="12" font-weight="700" fill="#b91c1c">exp(1003) is huge</text>
  <text x="159" y="276" text-anchor="middle" font-size="11" fill="#991b1b">Intermediate values can overflow</text>

  <rect x="334" y="94" width="252" height="236" rx="16" fill="#ffffff" stroke="#dbeafe" stroke-width="1.5" filter="url(#cardShadow6)"/>
  <text x="460" y="120" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">2. Shift by max logit</text>
  <text x="460" y="140" text-anchor="middle" font-size="11" fill="#64748b">Subtract 1003 from every value in the row.</text>
  <rect x="385" y="162" width="150" height="48" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="460" y="193" text-anchor="middle" font-size="18" font-weight="700" fill="#1d4ed8">[-2, -1, 0]</text>
  <rect x="367" y="234" width="186" height="54" rx="12" fill="#eff6ff" stroke="#60a5fa" stroke-width="1"/>
  <text x="460" y="256" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">Same relative ordering</text>
  <text x="460" y="274" text-anchor="middle" font-size="11" fill="#1d4ed8">Only the absolute scale changed</text>

  <rect x="636" y="94" width="250" height="236" rx="16" fill="#ffffff" stroke="#dcfce7" stroke-width="1.5" filter="url(#cardShadow6)"/>
  <text x="761" y="120" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">3. Exponentiate + normalize</text>
  <text x="761" y="140" text-anchor="middle" font-size="11" fill="#64748b">Now the numbers stay finite and sum to 1.</text>
  <rect x="679" y="162" width="164" height="48" rx="10" fill="#dcfce7" stroke="#10b981" stroke-width="2"/>
  <text x="761" y="193" text-anchor="middle" font-size="16" font-weight="700" fill="#047857">[0.090, 0.245, 0.665]</text>
  <circle cx="761" cy="256" r="16" fill="#10b981">
    <animate attributeName="r" values="16;18;16" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <text x="761" y="261" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">1.0</text>
  <text x="761" y="286" text-anchor="middle" font-size="11" fill="#047857">probabilities add to 1</text>

  <g stroke="#94a3b8" stroke-width="3" fill="none">
    <line x1="284" y1="212" x2="334" y2="212"/>
    <line x1="586" y1="212" x2="636" y2="212"/>
  </g>
  <polygon points="334,212 322,206 322,218" fill="#94a3b8"/>
  <polygon points="636,212 624,206 624,218" fill="#94a3b8"/>

  <rect x="108" y="358" width="704" height="30" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="460" y="377" text-anchor="middle" font-size="11" fill="#334155">Subtracting the same constant from every logit keeps the final probabilities unchanged.</text>
</svg>