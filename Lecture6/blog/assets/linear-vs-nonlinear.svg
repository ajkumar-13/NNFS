<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <rect width="800" height="300" fill="#fafafa" rx="16"/>

  <text x="400" y="28" text-anchor="middle" font-family="Segoe UI" font-size="18" font-weight="bold" fill="#1e293b">Why Activation Functions? Linear vs Non-Linear</text>

  <!-- Without activation -->
  <rect x="30" y="50" width="360" height="230" rx="12" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="210" y="75" text-anchor="middle" font-family="Segoe UI" font-weight="bold" font-size="14" fill="#dc2626">Without Activation (Linear)</text>

  <!-- Coordinate axes -->
  <line x1="70" y1="250" x2="350" y2="250" stroke="#94a3b8" stroke-width="1"/>
  <line x1="70" y1="250" x2="70" y2="100" stroke="#94a3b8" stroke-width="1"/>

  <!-- Sine wave (underlying data) -->
  <path d="M80,175 Q120,100 160,175 Q200,250 240,175 Q280,100 320,175" stroke="#3b82f6" stroke-width="2.5" fill="none"/>
  <text x="330" y="170" font-family="Segoe UI" font-size="10" fill="#3b82f6">data</text>

  <!-- Linear approximation -->
  <line x1="80" y1="200" x2="320" y2="155" stroke="#ef4444" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="330" y="148" font-family="Segoe UI" font-size="10" fill="#ef4444">model</text>

  <text x="210" y="270" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#991b1b">No matter how many layers: still a line!</text>

  <!-- With activation -->
  <rect x="410" y="50" width="370" height="230" rx="12" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="595" y="75" text-anchor="middle" font-family="Segoe UI" font-weight="bold" font-size="14" fill="#047857">With ReLU Activation (Non-Linear)</text>

  <!-- Coordinate axes -->
  <line x1="450" y1="250" x2="740" y2="250" stroke="#94a3b8" stroke-width="1"/>
  <line x1="450" y1="250" x2="450" y2="100" stroke="#94a3b8" stroke-width="1"/>

  <!-- Sine wave -->
  <path d="M460,175 Q500,100 540,175 Q580,250 620,175 Q660,100 700,175" stroke="#3b82f6" stroke-width="2.5" fill="none"/>

  <!-- Piecewise linear approximation (ReLU) -->
  <path d="M460,178 L490,125 L525,175 L560,220 L600,175 L635,120 L665,155 L700,178" stroke="#10b981" stroke-width="2.5" fill="none"/>
  <text x="715" y="170" font-family="Segoe UI" font-size="10" fill="#10b981">model</text>

  <text x="595" y="270" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#065f46">ReLU kinks combine to fit any curve!</text>
</svg>