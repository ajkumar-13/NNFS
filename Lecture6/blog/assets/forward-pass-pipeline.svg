<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160">
  <rect width="800" height="160" fill="#fafafa" rx="16"/>

  <text x="400" y="25" text-anchor="middle" font-family="Segoe UI" font-size="16" font-weight="bold" fill="#1e293b">Full Forward Pass Pipeline</text>

  <!-- Input -->
  <rect x="15" y="50" width="80" height="65" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="55" y="75" text-anchor="middle" font-family="Segoe UI" font-weight="bold" font-size="12" fill="#6366f1">Input X</text>
  <text x="55" y="95" text-anchor="middle" font-family="Consolas" font-size="10" fill="#64748b">(300×2)</text>

  <defs><marker id="fwdarr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5 Z" fill="#64748b"/></marker></defs>
  <line x1="95" y1="82" x2="115" y2="82" stroke="#64748b" stroke-width="1.5" marker-end="url(#fwdarr)"/>

  <!-- Dense 1 -->
  <rect x="118" y="45" width="100" height="75" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="168" y="68" text-anchor="middle" font-family="Segoe UI" font-weight="bold" font-size="11" fill="#1d4ed8">Dense 1</text>
  <text x="168" y="85" text-anchor="middle" font-family="Consolas" font-size="9" fill="#64748b">X·W₁ + b₁</text>
  <text x="168" y="102" text-anchor="middle" font-family="Consolas" font-size="9" fill="#64748b">(2→3)</text>

  <line x1="218" y1="82" x2="238" y2="82" stroke="#64748b" stroke-width="1.5" marker-end="url(#fwdarr)"/>

  <!-- ReLU -->
  <rect x="241" y="45" width="100" height="75" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="291" y="68" text-anchor="middle" font-family="Segoe UI" font-weight="bold" font-size="11" fill="#b45309">ReLU</text>
  <text x="291" y="85" text-anchor="middle" font-family="Consolas" font-size="9" fill="#64748b">max(0, x)</text>
  <text x="291" y="102" text-anchor="middle" font-family="Consolas" font-size="9" fill="#64748b">(300×3)</text>

  <line x1="341" y1="82" x2="361" y2="82" stroke="#64748b" stroke-width="1.5" marker-end="url(#fwdarr)"/>

  <!-- Dense 2 -->
  <rect x="364" y="45" width="100" height="75" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="414" y="68" text-anchor="middle" font-family="Segoe UI" font-weight="bold" font-size="11" fill="#1d4ed8">Dense 2</text>
  <text x="414" y="85" text-anchor="middle" font-family="Consolas" font-size="9" fill="#64748b">X·W₂ + b₂</text>
  <text x="414" y="102" text-anchor="middle" font-family="Consolas" font-size="9" fill="#64748b">(3→3)</text>

  <line x1="464" y1="82" x2="484" y2="82" stroke="#64748b" stroke-width="1.5" marker-end="url(#fwdarr)"/>

  <!-- Softmax -->
  <rect x="487" y="45" width="110" height="75" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
  <text x="542" y="68" text-anchor="middle" font-family="Segoe UI" font-weight="bold" font-size="11" fill="#9d174d">Softmax</text>
  <text x="542" y="85" text-anchor="middle" font-family="Consolas" font-size="9" fill="#64748b">e^x / Σe^x</text>
  <text x="542" y="102" text-anchor="middle" font-family="Consolas" font-size="9" fill="#64748b">(300×3)</text>

  <line x1="597" y1="82" x2="617" y2="82" stroke="#64748b" stroke-width="1.5" marker-end="url(#fwdarr)"/>

  <!-- Output -->
  <rect x="620" y="45" width="160" height="75" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="700" y="68" text-anchor="middle" font-family="Segoe UI" font-weight="bold" font-size="11" fill="#047857">Probabilities</text>
  <text x="700" y="87" text-anchor="middle" font-family="Consolas" font-size="9" fill="#374151">[0.33, 0.33, 0.34]</text>
  <text x="700" y="102" text-anchor="middle" font-family="Segoe UI" font-size="9" fill="#64748b">sum = 1.0 per row</text>

  <!-- Legend -->
  <text x="400" y="148" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#64748b">Hidden layers use ReLU • Output layer uses Softmax • Each row = one sample's class probabilities</text>
</svg>