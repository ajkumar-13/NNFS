<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320">
  <rect width="800" height="320" fill="#fafafa" rx="16"/>

  <text x="400" y="28" text-anchor="middle" font-family="Segoe UI" font-size="18" font-weight="bold" fill="#1e293b">Softmax: From Raw Scores to Probabilities</text>

  <!-- Input scores -->
  <rect x="30" y="55" width="150" height="120" rx="10" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="105" y="78" text-anchor="middle" font-family="Segoe UI" font-weight="600" font-size="13" fill="#4338ca">Raw Outputs</text>
  <text x="105" y="105" text-anchor="middle" font-family="Consolas" font-size="16" fill="#374151">5</text>
  <text x="105" y="128" text-anchor="middle" font-family="Consolas" font-size="16" fill="#374151">10</text>
  <text x="105" y="151" text-anchor="middle" font-family="Consolas" font-size="16" fill="#374151">15</text>
  <text x="105" y="195" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#64748b">Any range</text>
  <text x="105" y="210" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#64748b">Don't sum to 1</text>

  <!-- Arrow 1 -->
  <defs>
    <marker id="sarrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
  <line x1="180" y1="115" x2="220" y2="115" stroke="#64748b" stroke-width="2" marker-end="url(#sarrow)"/>

  <!-- Step 1: Exponentiate -->
  <rect x="225" y="55" width="175" height="120" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="312" y="78" text-anchor="middle" font-family="Segoe UI" font-weight="600" font-size="13" fill="#b45309">Exponentiate</text>
  <text x="312" y="105" text-anchor="middle" font-family="Consolas" font-size="13" fill="#374151">e⁵ = 148.4</text>
  <text x="312" y="128" text-anchor="middle" font-family="Consolas" font-size="13" fill="#374151">e¹⁰ = 22026.5</text>
  <text x="312" y="151" text-anchor="middle" font-family="Consolas" font-size="13" fill="#374151">e¹⁵ = 3269017</text>
  <text x="312" y="195" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#64748b">All positive ✓</text>

  <!-- Arrow 2 -->
  <line x1="400" y1="115" x2="440" y2="115" stroke="#64748b" stroke-width="2" marker-end="url(#sarrow)"/>

  <!-- Step 2: Normalize -->
  <rect x="445" y="55" width="175" height="120" rx="10" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="532" y="78" text-anchor="middle" font-family="Segoe UI" font-weight="600" font-size="13" fill="#047857">Divide by Sum</text>
  <text x="532" y="105" text-anchor="middle" font-family="Consolas" font-size="13" fill="#374151">148/3291192</text>
  <text x="532" y="128" text-anchor="middle" font-family="Consolas" font-size="13" fill="#374151">22027/3291192</text>
  <text x="532" y="151" text-anchor="middle" font-family="Consolas" font-size="13" fill="#374151">3269017/3291192</text>
  <text x="532" y="195" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#64748b">Between 0-1 ✓</text>

  <!-- Arrow 3 -->
  <line x1="620" y1="115" x2="660" y2="115" stroke="#64748b" stroke-width="2" marker-end="url(#sarrow)"/>

  <!-- Final probabilities -->
  <rect x="665" y="55" width="115" height="120" rx="10" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
  <text x="722" y="78" text-anchor="middle" font-family="Segoe UI" font-weight="600" font-size="13" fill="#9d174d">Probabilities</text>
  <text x="722" y="105" text-anchor="middle" font-family="Consolas" font-size="14" fill="#374151">0.000</text>
  <text x="722" y="128" text-anchor="middle" font-family="Consolas" font-size="14" fill="#374151">0.007</text>
  <text x="722" y="151" text-anchor="middle" font-family="Consolas" font-size="14" font-weight="bold" fill="#047857">0.993</text>
  <text x="722" y="195" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#64748b">Sum = 1.0 ✓</text>

  <!-- Formula -->
  <rect x="120" y="240" width="560" height="60" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="400" y="265" text-anchor="middle" font-family="Consolas" font-size="15" fill="#1e293b">softmax(oᵢ) = e^oᵢ / Σ e^oⱼ</text>
  <text x="400" y="288" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#64748b">Practical: subtract max first → softmax(oᵢ - max(o)) for numerical stability</text>
</svg>