<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrowL" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="340" rx="16" fill="#fafafa" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Loop Structure for Computing Layer Outputs</text>

  <!-- Outer loop box -->
  <rect x="30" y="50" width="640" height="265" rx="12" fill="#f0fdf4" stroke="#10b981" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="55" y="73" font-size="13" font-weight="700" fill="#065f46">OUTER LOOP:  for each neuron (n = 1, 2, 3)</text>

  <!-- Step 1: Pick weights & bias -->
  <rect x="60" y="88" width="260" height="50" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="190" y="108" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">① Pick weights &amp; bias</text>
  <text x="190" y="126" text-anchor="middle" font-size="11" fill="#065f46">for neuron n</text>

  <!-- Arrow -->
  <line x1="320" y1="113" x2="370" y2="113" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowL)"/>

  <!-- Inner loop box -->
  <rect x="375" y="85" width="280" height="115" rx="10" fill="#eff6ff" stroke="#6366f1" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="400" y="108" font-size="12" font-weight="700" fill="#3730a3">INNER LOOP:</text>
  <text x="400" y="126" font-size="11" fill="#3730a3">for each input i = 1..4</text>

  <!-- Inner step -->
  <rect x="400" y="138" width="235" height="45" rx="8" fill="#dbeafe" stroke="#6366f1" stroke-width="1.5"/>
  <text x="517" y="157" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">② Accumulate:</text>
  <text x="517" y="174" text-anchor="middle" font-size="11" fill="#1e40af">output += Xᵢ × Wₙᵢ</text>

  <!-- Arrow down from inner loop -->
  <line x1="515" y1="200" x2="515" y2="230" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowL)"/>

  <!-- Add bias -->
  <rect x="400" y="233" width="235" height="40" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="517" y="258" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">③ Add bias:  output += bₙ</text>

  <!-- Arrow down to append -->
  <line x1="515" y1="273" x2="515" y2="295" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowL)"/>

  <!-- Append -->
  <rect x="380" y="295" width="275" height="30" rx="6" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="517" y="315" text-anchor="middle" font-size="11" font-weight="600" fill="#9d174d">④ Append output to layer_outputs[]</text>

  <!-- Result on left side -->
  <rect x="60" y="215" width="260" height="85" rx="8" fill="#fff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="190" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">Final Result</text>
  <text x="190" y="260" text-anchor="middle" font-size="11" fill="#475569">layer_outputs = [</text>
  <text x="190" y="276" text-anchor="middle" font-size="11" fill="#475569">  out₁,  out₂,  out₃</text>
  <text x="190" y="292" text-anchor="middle" font-size="11" fill="#475569">]</text>
</svg>
