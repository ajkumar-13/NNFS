<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="600" height="320" rx="16" fill="#fafafa" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- Title -->
  <text x="300" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">A Single Neuron with 3 Inputs</text>

  <!-- Input nodes -->
  <circle cx="80" cy="90" r="30" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="80" y="95" text-anchor="middle" font-size="15" font-weight="600" fill="#3730a3">X₁</text>

  <circle cx="80" cy="170" r="30" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="80" y="175" text-anchor="middle" font-size="15" font-weight="600" fill="#3730a3">X₂</text>

  <circle cx="80" cy="250" r="30" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="80" y="255" text-anchor="middle" font-size="15" font-weight="600" fill="#3730a3">X₃</text>

  <!-- Neuron -->
  <circle cx="330" cy="170" r="48" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="330" y="165" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">Σ + b</text>
  <text x="330" y="185" text-anchor="middle" font-size="11" fill="#92400e">Neuron</text>

  <!-- Connections with weight labels -->
  <line x1="110" y1="90" x2="282" y2="155" stroke="#6366f1" stroke-width="1.8" marker-end="url(#arrow1)"/>
  <text x="185" y="108" font-size="12" fill="#4f46e5" font-weight="600">W₁</text>

  <line x1="110" y1="170" x2="282" y2="170" stroke="#6366f1" stroke-width="1.8" marker-end="url(#arrow1)"/>
  <text x="195" y="163" font-size="12" fill="#4f46e5" font-weight="600">W₂</text>

  <line x1="110" y1="250" x2="282" y2="185" stroke="#6366f1" stroke-width="1.8" marker-end="url(#arrow1)"/>
  <text x="185" y="240" font-size="12" fill="#4f46e5" font-weight="600">W₃</text>

  <!-- Bias arrow from top -->
  <line x1="330" y1="60" x2="330" y2="122" stroke="#10b981" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrow1)"/>
  <text x="345" y="75" font-size="12" fill="#059669" font-weight="600">b</text>

  <!-- Output -->
  <line x1="378" y1="170" x2="490" y2="170" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow1)"/>
  <rect x="490" y="148" width="90" height="44" rx="10" fill="#fef9c3" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="535" y="175" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">Output</text>

  <!-- Formula at the bottom -->
  <text x="300" y="305" text-anchor="middle" font-size="13" fill="#475569">Output = X₁·W₁ + X₂·W₂ + X₃·W₃ + b</text>
</svg>
