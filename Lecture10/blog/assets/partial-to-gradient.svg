<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360">
  <rect width="700" height="360" rx="16" fill="#fafafa"/>
  <text x="350" y="30" text-anchor="middle" font-family="Segoe UI" font-size="17" font-weight="700" fill="#1e1e2e">Partial Derivatives → Gradient Vector</text>

  <!-- Function -->
  <rect x="150" y="46" width="400" height="36" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.2"/>
  <text x="350" y="70" text-anchor="middle" font-family="Consolas" font-size="14" fill="#3730a3">f(x, y, z) = 3x³z − y² + 5z + 2yz</text>

  <!-- Three partial derivative boxes -->
  <!-- ∂f/∂x -->
  <rect x="30" y="102" width="200" height="80" rx="10" fill="white" stroke="#6366f1" stroke-width="1.5"/>
  <text x="130" y="124" text-anchor="middle" font-family="Segoe UI" font-size="12" font-weight="700" fill="#3730a3">∂f/∂x</text>
  <text x="130" y="144" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#64748b">treat y, z as constants</text>
  <text x="130" y="168" text-anchor="middle" font-family="Consolas" font-size="13" font-weight="600" fill="#3730a3">= 9x²z</text>

  <!-- ∂f/∂y -->
  <rect x="250" y="102" width="200" height="80" rx="10" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <text x="350" y="124" text-anchor="middle" font-family="Segoe UI" font-size="12" font-weight="700" fill="#065f46">∂f/∂y</text>
  <text x="350" y="144" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#64748b">treat x, z as constants</text>
  <text x="350" y="168" text-anchor="middle" font-family="Consolas" font-size="13" font-weight="600" fill="#065f46">= −2y + 2z</text>

  <!-- ∂f/∂z -->
  <rect x="470" y="102" width="200" height="80" rx="10" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="570" y="124" text-anchor="middle" font-family="Segoe UI" font-size="12" font-weight="700" fill="#92400e">∂f/∂z</text>
  <text x="570" y="144" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#64748b">treat x, y as constants</text>
  <text x="570" y="168" text-anchor="middle" font-family="Consolas" font-size="13" font-weight="600" fill="#92400e">= 3x³ + 5 + 2y</text>

  <!-- Arrows converging down -->
  <line x1="130" y1="186" x2="300" y2="230" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="350" y1="186" x2="350" y2="230" stroke="#10b981" stroke-width="1.5"/>
  <line x1="570" y1="186" x2="400" y2="230" stroke="#f59e0b" stroke-width="1.5"/>

  <!-- Gradient vector box -->
  <rect x="180" y="230" width="340" height="110" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="350" y="254" text-anchor="middle" font-family="Segoe UI" font-size="13" font-weight="700" fill="#3730a3">Gradient Vector ∇f</text>
  <text x="350" y="282" text-anchor="middle" font-family="Consolas" font-size="14" fill="#3730a3">∇f = [ 9x²z          ]</text>
  <text x="350" y="302" text-anchor="middle" font-family="Consolas" font-size="14" fill="#065f46">      [ −2y + 2z      ]</text>
  <text x="350" y="322" text-anchor="middle" font-family="Consolas" font-size="14" fill="#92400e">      [ 3x³ + 5 + 2y  ]</text>

  <!-- Labels -->
  <text x="60" y="348" font-family="Segoe UI" font-size="11" fill="#6366f1">∇f → direction of steepest ascent</text>
  <text x="420" y="348" font-family="Segoe UI" font-size="11" fill="#ef4444">−∇f → direction of steepest descent (what we want!)</text>
</svg>