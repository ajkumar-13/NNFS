<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 430" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow15Anim" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="940" height="430" rx="20" fill="#fafafa"/>

  <text x="470" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Input-Gradient Accumulation</text>
  <text x="470" y="56" text-anchor="middle" font-size="12" fill="#64748b">One input fans out to many neurons, so its backward gradient adds one contribution from each connection.</text>

  <rect x="42" y="92" width="856" height="128" rx="18" fill="#ffffff" stroke="#dbeafe" stroke-width="1.5"/>
  <text x="470" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">Forward view</text>
  <text x="470" y="138" text-anchor="middle" font-size="11" fill="#64748b">The same input feature x1 connects to every neuron in the layer.</text>
  <circle cx="148" cy="176" r="24" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="148" y="182" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">x1</text>
  <circle cx="390" cy="176" r="22" fill="#dcfce7" stroke="#10b981" stroke-width="2"/>
  <circle cx="550" cy="176" r="22" fill="#dcfce7" stroke="#10b981" stroke-width="2"/>
  <circle cx="710" cy="176" r="22" fill="#dcfce7" stroke="#10b981" stroke-width="2"/>
  <text x="390" y="182" text-anchor="middle" font-size="12" font-weight="700" fill="#047857">z1</text>
  <text x="550" y="182" text-anchor="middle" font-size="12" font-weight="700" fill="#047857">z2</text>
  <text x="710" y="182" text-anchor="middle" font-size="12" font-weight="700" fill="#047857">z3</text>
  <line x1="172" y1="176" x2="368" y2="176" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow15Anim)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/>
  </line>
  <line x1="172" y1="176" x2="528" y2="176" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow15Anim)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
  </line>
  <line x1="172" y1="176" x2="688" y2="176" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow15Anim)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" begin="1s" repeatCount="indefinite"/>
  </line>
  <text x="390" y="150" text-anchor="middle" font-size="10" fill="#64748b">w11</text>
  <text x="550" y="150" text-anchor="middle" font-size="10" fill="#64748b">w21</text>
  <text x="710" y="150" text-anchor="middle" font-size="10" fill="#64748b">w31</text>

  <rect x="42" y="246" width="856" height="128" rx="18" fill="#ffffff" stroke="#fee2e2" stroke-width="1.5"/>
  <text x="470" y="272" text-anchor="middle" font-size="14" font-weight="700" fill="#b91c1c">Backward view</text>
  <text x="470" y="292" text-anchor="middle" font-size="11" fill="#64748b">Each connection returns one contribution, and those contributions add into dL/dx1.</text>
  <rect x="104" y="314" width="156" height="34" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.2">
    <animate attributeName="fill" values="#fef2f2;#fee2e2;#fef2f2;#fef2f2;#fef2f2" keyTimes="0;0.15;0.33;0.66;1" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="stroke-width" values="1.2;2.5;1.2;1.2;1.2" keyTimes="0;0.15;0.33;0.66;1" dur="4.5s" repeatCount="indefinite"/>
  </rect>
  <text x="182" y="336" text-anchor="middle" font-size="12" font-weight="700" fill="#b91c1c">43.2 × 0.1 = 4.32</text>
  <rect x="310" y="314" width="156" height="34" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.2">
    <animate attributeName="fill" values="#fef2f2;#fef2f2;#fee2e2;#fef2f2;#fef2f2" keyTimes="0;0.33;0.48;0.66;1" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="stroke-width" values="1.2;1.2;2.5;1.2;1.2" keyTimes="0;0.33;0.48;0.66;1" dur="4.5s" repeatCount="indefinite"/>
  </rect>
  <text x="388" y="336" text-anchor="middle" font-size="12" font-weight="700" fill="#b91c1c">43.2 × 0.5 = 21.6</text>
  <rect x="516" y="314" width="156" height="34" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.2">
    <animate attributeName="fill" values="#fef2f2;#fef2f2;#fef2f2;#fee2e2;#fef2f2" keyTimes="0;0.55;0.66;0.82;1" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="stroke-width" values="1.2;1.2;1.2;2.5;1.2" keyTimes="0;0.55;0.66;0.82;1" dur="4.5s" repeatCount="indefinite"/>
  </rect>
  <text x="594" y="336" text-anchor="middle" font-size="12" font-weight="700" fill="#b91c1c">43.2 × 0.9 = 38.88</text>
  <line x1="260" y1="331" x2="310" y2="331" stroke="#f97316" stroke-width="3" marker-end="url(#arrow15Anim)"/>
  <line x1="466" y1="331" x2="516" y2="331" stroke="#f97316" stroke-width="3" marker-end="url(#arrow15Anim)"/>
  <line x1="672" y1="331" x2="744" y2="331" stroke="#f97316" stroke-width="3" marker-end="url(#arrow15Anim)"/>
  <rect x="744" y="310" width="116" height="42" rx="12" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5">
    <animate attributeName="stroke-width" values="1.5;2.5;1.5" dur="1.8s" repeatCount="indefinite"/>
  </rect>
  <text x="802" y="323" text-anchor="middle" font-size="12" font-weight="700" fill="#c2410c">dL/dx1</text>
  <!-- Running sum that builds up as contributions arrive -->
  <text x="802" y="343" text-anchor="middle" font-size="11" fill="#c2410c">
    <animate attributeName="textContent" values="= 0;= 4.32;= 25.92;= 64.80;= 64.80" dur="4.5s" repeatCount="indefinite"/>
  </text>
  <text x="802" y="343" text-anchor="middle" font-size="11" font-weight="700" fill="#c2410c" opacity="0">
    = 4.32
    <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.15;0.22;0.33;1" dur="4.5s" repeatCount="indefinite"/>
  </text>
  <text x="802" y="343" text-anchor="middle" font-size="11" font-weight="700" fill="#c2410c" opacity="0">
    = 25.92
    <animate attributeName="opacity" values="0;0;0;1;0;0" keyTimes="0;0.33;0.4;0.48;0.66;1" dur="4.5s" repeatCount="indefinite"/>
  </text>
  <text x="802" y="343" text-anchor="middle" font-size="11" font-weight="700" fill="#c2410c" opacity="0">
    = 64.80
    <animate attributeName="opacity" values="0;0;0;0;1;1" keyTimes="0;0.55;0.66;0.73;0.82;1" dur="4.5s" repeatCount="indefinite"/>
  </text>

  <text x="470" y="400" text-anchor="middle" font-size="11" fill="#64748b">Weight gradients belong to one connection. Input gradients collect all downstream paths that started from that input.</text>
</svg>